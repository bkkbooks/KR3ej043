body:
  text: 卷之三治諸熱證陽在身中主發生奈何拂鬱熱熬煎嬰孩本是純陽體熱證推求有數般人身之中溫養臟腑流通榮衛者陽氣也有風寒傷之於外則榮衛之氣不行水穀傷之於內則臟腑之氣不行不行則陽氣拂鬱而熱生焉故隨其所發以為熱病之名也夫傷有輕重則熱有微盛病有新久則熱有虛實此其當辨者也錢氏有論詳見下文按錢氏云心熱者視其睡口中氣溫或合面而臥及上竄掐頭咬牙瀉心湯主之肝熱者手尋衣領及亂捻物瀉青丸主之脾熱者其熱在肌肉遇夜更深怠惰嗜臥身熱飲水四肢不收瀉黃散主之肺熱者手掐眉目日西熱甚喘嗽壯熱飲水瀉白散主之一云涼膈散腎熱者兩足不喜衣覆蓋臍之下皆腎之所主緣心下行於腎部也宜地黃丸主之一云東垣滋腎丸上按此論五臟之熱見前五臟歌內家傳涼驚丸金花丸三黃丸皆治五臟熱之方也家傳涼驚丸退熱解毒鎮驚安神黃連淨黃芩去腐山梔仁黃柏各等分硃砂雄黃俱飛減半研極細末和勻雪水煮麵糊為丸黍米大一歲兒十五丸以漸加至五十丸薄荷湯下此黃連解毒湯加減也大金花丸治中外諸熱寢汗咬牙大小便不利即前涼驚丸去膽草雄砂加九黃雪水丸又名既濟解毒丸三黃丸治三焦積熱小便赤澀大便秘結此三黃瀉心湯也即前金花丸去梔子黃柏是也煉蜜為丸如皂角子大白湯化服按錢氏云潮熱者肝熱也時間發熱過後即退次日又依時發熱此欲發驚也地骨皮散主之壯熱者心熱也熱而不已甚則發驚癇也導赤散主之風熱者肺熱也身熱口中氣熱有風症人參生犀散主之溫熱者脾熱也但溫而不熱瀉黃散主之上按此論四臟潮熱者如水之潮不失其候也若有寒熱則如瘧此只以時論也故痛屬肝如日晡潮熱又屬胃者謂身常有熱至日晡尤甚也此是宿食宜下之枳殼大黃丸主之地骨皮散治虛熱作潮及傷寒後餘熱又名人參地骨皮散人參地骨皮散知母柴胡炙甘草人參地骨皮自採者半夏水泡洗赤茯苓各等分共細末量兒大小加減入生薑一片水煎服按幼科引機要論表裡之熱為小兒之法似未精當機要之論表裡者乃風寒之氣邪自表入里者也小兒之熱乃自里而出表者也如胎毒之熱生於命門變蒸之熱生於臟腑飲食之熱生於脾胃其傷寒者僅十之一二耳惟直指之論得之按直指云小兒表裡俱熱面黃頰赤唇焦口乾小便赤澀大便焦黃先以四順清涼飲為之疏利其熱即去既去而復熱者里已清而表未解也當用惺惺散少加去節麻黃以取微汗則表盡除其或表裡已解而熱又時來此則表裡俱虛而氣不歸元蕩浮於外不可再用涼藥與之解表當為和其胃氣使陽氣斂而歸內身體自冷宜參苓白朮散方見脾臟薑棗引略煎服四順清涼飲治小兒臟腑蘊積實熱當歸大黃酒蒸甘草生赤芍各等分㕮咀水煎服惺惺散治小兒虛熱解表人參桔梗白茯苓白朮天花粉各一兩細辛二錢炙甘草七分防風川芎南星生各二錢半每服加生薑片半薄荷葉共藥末慢火煎此方前七味本方也加減惺惺散治傷風風熱及傷寒鼻塞發熱前方去人參白朮茯苓南星四味加蒼朮羌活白芷赤芍麻黃荊芥當歸上方治表虛熱此方治表實熱參苓白朮散治胃氣收斂浮陽退餘熱方見脾臟小兒有病惟熱居多夫熱有虛有實實則面赤濃黃氣粗口熱燥渴唇腫大小便難掀揭露身煩啼暴叫虛則面色青白恍惚神緩口中清冷噓氣軟弱瀉泄多溺夜出虛汗其或乍清乍溫拂鬱悸惕上盛下瀉水穀不分此冷熱不調之症虛熱者惺惺散實熱者四順清涼飲加柴胡冷熱不調則敗毒散加木香當歸按全嬰論云小兒氣稟純陽臟腑主熱陰陽氣變蒸薰於外致身熱也則兩眼赤痛流淚羞明或生翳障心熱則口內生瘡小便赤腫淋瀝不通肺熱則鼻衄不止大腸必結脾熱則多涎沫口內常流心脾熱則生重舌木舌胃熱則口臭腎熱則耳聾或出濃汁上所論五臟熱證與前錢氏不同大抵熱證俱多不能盡也今以上中下立方治之頭面之熱神芎上清丸主之中焦之熱涼膈散主之下焦之熱八正散主之手足熱者升陽散火湯主之表裡俱熱者通聖雙解散主之神芎上清丸治一切熱證清頭面利咽膈大黃黃芩各二兩滑石四兩薄荷葉川芎各半兩桔梗黃連甘草各二錢半蜜丸芡實大每服一丸或二丸滾白湯化下東垣涼膈散治上焦積熱煩躁多渴面赤咽喉痛口瘡黃芩梔子仁連翹甘草生桔梗各等分薄荷減半為極細末每用淡竹葉湯入蜜少許調服或煉蜜丸竹葉湯下河間涼膈散治中焦煩躁狂妄啼哭睡臥不安便溺赤澀即前方無桔梗有大黃朴硝是也本方加黃連名清心湯八正散治下焦熱二便秘結多渴咽乾口熱淋血大黃瞿麥木通滑石末萹蓄車前子山梔仁甘草梢各等分㕮咀入燈心煎服升陽散火湯治手足發熱此胃虛也升麻葛根獨活羌活人參白芍各五分防風二錢半柴胡八分甘草炙生各三錢㕮咀水作四劑煎服通聖雙解散治表裡俱熱又治瘡疹防風川芎桔梗芍藥黃芩薄荷當歸荊芥滑石石膏白朮連翹梔子麻黃大黃朴硝各等分甘草減半㕮咀入生薑水煎調益元散服或末蜜丸薑湯化下有表無里去硝黃有里無表去麻黃胎熱者兒初生十日之內便有諸熱症者宜育嬰解毒延齡丸目赤腫不開者用黃連磨乳汁洗之口瘡者黃連黃柏二味為末蜜水調搽兒生滿月後有傷發熱者惡寒病在表宜用推摩掐法除之惡熱病在裡用豬膽汁導之勿輕汗下之三歲以後方與大人同論前法主之夜熱者至夜則發熱啼哭不止日則無事此血熱也心主熱東垣安神丸主之乳母宜服小柴胡加參黃湯餘熱者三歲以後如傷寒後里已解又發熱者此虛熱也宜凝神散主之收斂胃氣清涼肌表凝神散人參白朮白茯苓山藥各一錢粳米白扁豆炒知母生地炙甘草各五分竹葉地骨皮麥冬各二分半三歲兒分作四劑薑棗引水煎頻頻服之食熱者傷食得之手心壯熱暖氣吐乳大便酸臭輕者胃苓丸重者保和丸甚者枳殼大黃丸不可猛浪傷兒胃氣也煩熱者心煩不安多啼此心熱也錢氏安神丸主之恐發驚搐虛熱者有二皆大病之後也如形氣未甚弱者此胃虛也宜參苓白朮散若形瘦頭髮成穗肚大足小者此疳病也宜集聖丸主之方見疳病癖熱者如瘧而不寒如潮熱而作止無時面黃消癖丸主之方見癖病誤服熱藥而發熱者宜大豆卷散主之用黑豆水浸生芽取出曬乾貫眾板藍根炙甘草各等分漿水煎服漿水者乃粟米泔水也凡人喜仰臥或合面臥者皆心熱也宜導赤散調理脾胃萬物五行皆藉土人身脾胃是根基四時調理和為貴胃氣常存怕損虧內經曰胃者五臟六腑之海也水穀皆入於胃五臟六腑皆稟氣於胃胃者五臟六腑之源也萬物借土而生故古人以調理脾胃為醫中王道厥有旨哉胃主納穀脾主消穀皆穀氣之本也谷多則傷胃谷少則傷脾全谷則昌絕谷則亡故人身之中谷為寶焉然脾喜溫而惡寒胃喜清而惡熱所以調理脾胃者節其飲食適其寒溫為中和之道也苟能飲食有節寒溫適宜則脾胃強實外邪不能侵內邪無由起何病之有哉若飲食無節寒暑不適則脾胃虛弱百病生矣況小兒脾常不足非大人可比幼小無知口腹是貪父母嬌愛縱其所欲是以脾胃之病視大人猶多也蓋調理脾胃必資於藥五氣屬天五味屬地味氣之中惟甘平者土之性也古人立法必四氣渾合五味相濟所以合於四時五臟陰陽揆度以為常也今幼科方中多用丁香豆蔻益智仁砂仁之例一切辛燥者集群成劑溫養脾胃耗散陽氣熬煎陰血甚非所宜也蓋調理脾胃之法固難而變通之法尤難熱則消於肌肉寒則減於飲食吾有家秘養脾丸以和中進飲食之傷肥兒丸以補脾胃之弱又加黃耆調元湯錢氏異功散參苓白朮散皆調理脾胃之要藥也茲於其間又取古方可用者以補其未盡之法於下加減異功散調理脾胃傷食不消炒神麯麥芽山楂肉傷食嘔吐加半夏藿香乾薑炒如吞酸水再加黃連將吳茱萸同炒去萸傷食胸膈痞悶加半夏枳實黃連薑汁炒去白朮傷食腹痛加木香砂仁常覺氣逆去人參白朮加半夏枳殼桔梗香附傷食泄瀉酸臭者加木香黃連澤瀉細末薑棗湯調服加味理中丸治脾胃虛寒不進飲食嘔吐瀉泄或服寒藥太過用白朮四錢人參白茯苓神麯各一錢砂仁乾薑煨麥芽炒各二錢炙甘草錢半煉蜜丸薑湯嚼下加味平胃散治胃脾不和不思飲食用平胃散一兩加人參一錢白茯苓一錢半棗肉和丸薑湯下健脾丸養脾進食調理胃氣和養榮衛即前胃苓丸方內加山藥蓮肉各二錢木香砂仁八分白朮錢半當歸麥芽炒神麯炒各一錢棗肉和丸米飲下人參白朮膏治脾胃虛弱肌膚瘦怯欲成疳症者人參白朮土炒茯苓山藥蓮肉去心各一兩山楂肉七錢當歸麥芽炒澤瀉各五錢末煉蜜丸龍眼大每服一丸米飲化下感冒四氣感冒天時四氣中小兒亦與大人同必先歲氣無輕犯寒熱溫涼有逆從天地之氣行乎四時者有四氣焉四氣者風寒暑濕之氣也人在氣中體之虛也感則病矣故春傷風夏傷暑秋傷濕冬傷寒此四時之正氣病也小兒失其調理尤易感之嫩弱故也治法與大人同但劑小耳又小兒病則發熱則發搐此與大人異也四時調理之法不同春宜食涼不可犯溫夏宜食寒不可犯熱秋宜食溫不可犯涼冬宜食熱不可犯寒然發表者必宜用辛甘溫之劑如有可汗之症必犯其禁而用之經云發表不遠熱者是也但於汗藥中少加涼藥以制之勿使熱甚而發搐也小兒四時感冒病幼科未備今特表而出之小兒傷風寒者口不能言脈無可診但以虎口之指之色驗之也錢氏云男體重面黃女面赤喘急惡寒口中氣熱呵欠頓悶項急者是也然病有表裡陰陽之症治有汗解溫下之法臨病之時當詳察之不可誤也如惡風寒者必偎藏其身於母懷內引衣密隱是為表症可微汗之人參敗毒散主之如惡熱出頭露面揚手擲足渴煩躁糞掀衣氣粗是為里症略與疏通之小柴胡加大黃湯主之方見驚風中病即止如頭額冷手足涼口中冷氣面色暗淡大便泄青此為陰病裡虛當以溫藥救其里以理中湯加附子主之方見脾臟如不惡風大熱大渴此表裡俱熱半表半裡也宜和解柴胡白虎湯主之又有夾食夾驚者不可與上症同治也夾驚傷寒者或因驚之時又感寒邪以發散為主宜脫甲散主之或因傷寒發熱以致驚風者宜退驚為主以薄荷散主之夾食傷寒者如先傷寒後傷食者此食傷證也枳實大黃丸主之如先傷食後傷寒無吐下者先解其表香葛散後去其宿食枳實大黃丸主之如有吐瀉者以藿香正氣散主之人參敗毒散治四時感冒及時行瘟疫並痘疹初發熱宜服羌活獨活前胡柴胡川芎枳實桔梗茯苓人參甘草各等分㕮咀水煎服斑疹加防風荊芥名荊防敗毒散痢疾時行加陳倉米名倉廩湯柴胡白虎湯治傷寒半表半裡大熱大渴自汗不止柴胡人參黃芩知母甘草石膏㕮咀淡竹葉水煎服脫甲散治夾驚傷寒煩渴柴胡軟當歸酒膽草炙甘草知母各三錢白茯苓人參川芎各二錢半麻黃去根節一錢用連根蔥白水煎服熱甚加升麻乾葛薄荷散治傷寒發驚痰涎壅甚薄荷葉半兩羌活全蠍去毒麻黃甘草炒殭蠶炒天竺黃白附子薄荷湯調下一匙略煎數沸入竹瀝少許服枳樸大黃丸治傷食腹滿煩熱及傷寒後食復症枳實厚朴大黃酒煨等分煉蜜丸芡實大每服一丸用大梔子一個劈破淡豆豉三粒水煎濃汁化下香葛散治夾食傷寒不吐利者香附子紫蘇葉等分葛根陳皮青皮各減半炙甘草又減半此香附散加減也㕮咀生薑蔥白引要溫服以汗微出為度傷食輕者本方去葛根薑蔥加小枳實一枚重者一分三黃枳朮丸治傷食乃下劑之輕者有熱者可服黃芩酒炒黃連炒大黃酒煨枳實炒白朮等分神麯糊丸黍米大每服二三十丸白湯下藿香正氣散治夾食傷寒有吐利者藿香白朮如發汗用蒼朮厚朴陳皮半夏白茯苓白芷桔梗大腹皮蘇葉甘草㕮咀入生薑片煎徐徐服之凡小兒風寒外感用推摩捏掐法亦妙中暑夏月有之其症面垢遍身大熱自汗煩躁不安而渴兒不能言但吮乳不止是渴也治有二法富貴家小兒居高厚深涼之處其有病也乃靜而得之謂之中暑也惡寒發熱者以人參白虎湯加減主之不惡寒而發熱者人參白朮湯皆可服熱退服調元生脈散如有吐泄者加味五苓散主之乳母服清暑湯尋常家小兒常在烈日之中坐於熱地之上浴於寒澗之內其有病者乃動而得之為中熱也或有寒熱者或吐瀉者並以薷苓飲加減主之如上暑熱二症有發驚搐者如先病熱後作搐者辰砂五苓散和益元散主之或先驚搐又中暑者以薷苓湯加減主之人參白虎湯方見肺臟有中暑不惡寒者只惡熱而渴加麥冬淡竹葉水煎調天水散用滑石水飛六錢甘草一錢和勻無汗惡寒者加麻黃不去根節杏仁不去皮尖有汗惡寒者加桂枝白芍藥調元湯見脾臟加麥冬五味子乃生脈散二方合也清暑湯小兒一歲內中暑以此方調其乳母人參白朮茯苓炙甘草生地麥冬黃連黃芩等分㕮咀煎食後服五苓散此治暑之要藥也方見腎臟加硃砂吐瀉加藿香木瓜砂仁煉蜜丸芡實大陳皮湯化下有寒熱加香薷厚朴薑汁炒白扁豆炒甘草炒名薷苓湯有吐泄再加藿香木瓜有驚搐者五苓散末二兩加辰砂三錢黃芩末甘草末各五錢和勻煉蜜丸芡實大麥冬湯下名卻暑丹如先驚後中暑者合香薷飲加人參黃連麥冬中濕凡小兒喜弄冷水者坐濕地者名此病其症頭重體重寒熱往來並宜五苓散平胃散為主二方合者乃治濕之要藥也蓋五苓散治中濕惡熱如瘧小柴胡湯合服名柴苓湯中濕吐瀉與平胃散相合名胃苓湯更加砂仁藿香木瓜平胃散治中濕體重兼補脾胃蒼朮米泔浸焙四兩厚朴薑汁炒陳皮各二兩炙甘草一兩半每薑湯服本方與五苓散合澤瀉蒼朮八兩同茯苓白朮厚朴陳皮等兩桂枝甘草等兩名胃苓丸小兒要藥也本方末半斤加川椒末二兩和勻別用紅棗蒸取肉四兩蒜去皮入獖豬肚內煎熱去肚不用取蒜與棗肉共搗爛和藥令勻為丸酒與米飲任下名椒術養脾丸男女並宜服之臟寒者最宜忌生冷醃臢等物本方㕮咀一料加小紅棗二百枚蒸去核生薑二兩和皮切共和水五升慢火煮乾搗作餅子曬乾淡鹽湯調服大人小兒溫養脾元調和胃氣最良中濕浮腫者胃苓湯加五皮湯主之生薑皮大腹皮茯苓皮桑白皮五加皮即五皮湯中濕黃者五苓加茵陳蒿名茵陳五苓散如時行溫疫小兒得染者用平胃散去厚朴加蘇葉香附為末雪水煮綠豆粉為丸芡實大雄黃硃砂為衣每服一丸薑棗湯化下面東服之可免不正之氣所中也常用雄黃磨水抹兒鼻孔乳母尤宜服之咳嗽喘各色證治風寒乘外從虛入肺主皮毛先受邪氣逆上衝成咳嗽綿延轉變入他家按錢氏論咳症云八九月間肺氣大旺其病乃實以葶藶丸下之十一二月間咳者乃傷風寒咳嗽也或以麻黃或以甘桔湯五七月間身熱痰甚吐乳者以褊銀丸下之有吐青綠水者以百祥丸下之虛者阿膠散補之後人信之得治咳大法不過如此愚竊有疑焉仲陽先生著論立方仲景之下一人而已仲景之治傷寒在表則汗之在裡則下之在半表半裡之間則和解之小兒咳嗽皆自風寒得之豈無在表裡之可發散者乎八九月間咳嗽者豈專可下之乎觀其下藥非牽牛巴豆則鉛綠輕粉也如此峻利之劑幼小嬌弱者豈能勝之乎欲治其肺先損其胃豈有不誤人者乎是書也皆出於閻孝忠之筆恐非先生法也或曰有之吾亦不敢用矣今採諸賢之論分三法於下初得之未有不因感冒而傷於肺內經曰皮毛者肺之合皮毛先受邪氣邪氣得從其合使氣上而不下逆而不收充塞咽嗌故令咳也乍暖脫衣風邪從背肺俞穴而入面赤唇紅氣粗發熱咳來痰鳴或因汗出未乾遽戰冷水者眼胞微浮額汗痰鳴如此數者當以鼻中辨之因乎風者則鼻流清涕有汗宜參蘇飲主之因於寒者則氣塞氣促聲濁無汗以麻黃湯主之參蘇飲治四時冒風寒頭痛發熱咳嗽痰壅人參茯苓枳殼半夏前胡桔梗蘇葉葛根陳皮等分甘草減半㕮咀蔥姜引溫服取微汗加味麻黃湯治肺感風寒痰涎咳嗽麻黃蘇葉桑白皮蜜炙等分甘草減半加茯苓陳皮名華蓋散其功同㕮咀以煎服得汗咳止身熱而渴者加知母石膏百部丸小兒未一歲不能服湯藥者以此代之百部麻黃各三錢杏仁去皮尖四十粒以水略煮又各取末和勻蜜丸皂角子大溫水化二三丸此以上初治之法凡咳嗽發熱後不止或有未發散看其兼症以法治之咳嗽氣上逆喘嗽有痰者此肺咳也宜清肺飲主之喘甚者葶藶丸下之方見肺脾臟清肺飲治肺氣上逆咳嗽前胡去蘆柴胡荊芥桑白皮蜜炒炙甘草枳殼各三分知母貝母薄荷茯苓桔梗紫蘇阿膠炒杏仁去皮另研天冬各五分散用烏梅同煎去渣服咳喉中介介有聲面赤發熱心煩或咽喉痛聲啞者此肺病兼見心症也以清寧散咽喉痛宜清心湯加桔梗方見諸熱心悶驚悸者以錢氏安神丸主之方見心臟清寧散治咳嗽心肺有熱者宜小便利出之桑白皮炒葶藶炒赤茯苓車前子梔子仁等分甘草炒減半細末每服半錢薑棗煎服咳嗽面黃痰涎壅塞或吐痰或吐乳食者食少喜臥此肺病見脾症也大抵咳嗽屬肺脾者多肺主氣脾主痰也橘皮湯治咳嗽痰甚嘔吐者半夏洗五錢茯苓陳皮各三錢細辛人參旋覆花各一錢青皮桔梗枳殼炙甘草各二錢為散入生薑水煎服玉液丸化痰涎止咳嗽此家傳治小兒咳嗽者寒水石煉研取末二兩半夏泡七次研七錢半枯礬三錢為極細末生薑自然汁煮飛羅麵糊丸黍米大淡薑湯下咳嗽痰涎壅塞搐咳不轉瞪目直視此肺病兼肝症也不治則發搐宜豁痰丸主之轉者琥珀抱龍丸主之方見家傳三法豁痰丸咳嗽痰涎壅塞通用南星三錢半夏二錢二味切片用濃皂角水浸一宿取出焙乾為末白附子五靈脂白殭蠶炒細辛枯白礬各一錢全蠍三分半為末皂角濃汁煮麵糊丸黍米大薑湯下咳嗽久不止吐痰涎水此肺病兼腎症也宜大阿膠丸主之大阿膠丸阿膠炒熟地黃白茯苓五味子山藥各一兩貝母百部柏子仁破故紙桂心杜仲薑汁炒麥冬焙乾末各半兩人參沉香各三錢蜜丸芡實大每服一丸紫蘇湯下凡咳嗽有熱者宜東垣涼膈散加瀉白散主之大小便不利者加大黃風化硝咳嗽氣盛者宜加減蘇子降氣湯加減蘇子降氣湯真蘇子半夏曲炙甘草前胡陳皮厚朴薑汁炒肉桂去皮大腹皮桑白皮各等分煎服兼治面浮腫咳嗽痰甚者輕者玉液丸壅塞者沉香化痰丸沉香化痰丸青礞石硝煅金色枯白礬豬牙皂炙南星泡半夏洗白茯苓陳皮各三錢枳殼炒黃芩各一錢半沉香五分共細末薑汁煮神麯糊為丸黍米大薄荷湯下咳嗽聲不止口鼻出血者此氣逆血亦逆也只宜止咳為主加味人參款花膏主之人參五味子天冬麥冬款冬花貝母桑白皮炒阿膠炒各一錢黃芩黃連炙甘草桔梗當歸各一錢半煉蜜丸圓眼大每服一丸陳皮湯化下以上中治之法也調理之後其咳不止此肺虛也只以補肺為主錢氏阿膠散方見肺臟然補肺不補脾非其治也虛則補其母脾為肺之母也況病久者胃氣亦虛尤宜補其胃氣也用人參五味子丸主之人參五味子丸人參五味子桔梗白朮白茯苓炙甘草熟地黃當歸各五錢地骨皮前胡桑白皮枳殼炒黃耆炒陳皮去白柴胡各三錢蜜丸芡實大每服一丸或三丸薑棗湯化下久咳不已經驗方名提金散此劫劑也用罌粟殼水潤去其筋膜曬乾二兩烏梅擇肥者水洗去煙取肉焙乾七錢甘草陳皮去白各七錢蘇州薄荷葉二兩蜜丸圓眼大臥時令噙化一丸妙以上為末治之法也久咳須防百晬中痰涎作搐類多凶胸高其狀如龜殼咳血無憂只怕濃小兒百日內有痰嗽者謂之百晬嗽或因出胎之時暴受風寒或因浴兒之時為風所襲或因解換褓裳或出懷餵乳皆風邪之自外入者也因乳脈湧出吞嚥不及而錯喉者或因啼哭未定以乳哺之氣逆嗆出者此病之從內出者也皆能為咳如前汗下調理之劑難其服之蓋胃氣方生恐藥傷也故曰小兒百晬咳難治如上百晬咳者一歲及三歲者加以痰涎壅塞逆氣衝並以致發驚搐者多不可治蓋小几無知痰在咽中不會吐吞往來自任故也將作搐者急進硃砂膏以降去之搐止者吉頻搐者凶故頭搖者目帶上視者閉目呻吟者手足擺舞者肩息胸突者喉中痰鳴者口噤不乳者喘不休者手足冷者咬牙者皆死也久咳不止胸高骨起其狀如龜者謂之龜胸此肺熱也天冬去心焙杏仁去皮尖微炒百合水洗木通桑白皮炒葶藶隔紙炒石膏各等分蜜丸芡實大服一丸紫蘇湯下嗽者吉如龜胸已成乃終身之痼疾也久嗽不止咯唾血者如前治之唾膿血腥臭者此肺癰也多死欲治此者無如桔梗湯桔梗當歸貝母瓜蔞漢防己甘草節杏仁炒百合枳殼炒薏苡仁黃耆桑白皮炒加玄參等分生薑煎頻服有熱口乾燥加黃芩大便秘加大黃小便赤少加木通喘氣喘綿綿自肺生有寒有熱有痰浞尋常哮喘無他慮病篤應喘嫌急添內經曰諸氣膹郁皆屬於肺喘者肺氣之膹郁逆而上行也有因感寒而得之者必惡寒發熱面赤唇紅鼻息不利清便自調邪在表也宜發散之用五虎湯主之內有寒痰者芎蠍散麻黃七分杏仁去皮尖一錢甘草四分細茶炒八分石膏錢半煎服有因熱而得之者必口燥咽乾大小便不利宜葶藶丸下之有因宿痰而得者必痰涎壅上喘息有聲以千緡湯主之千緡湯半夏七個湯泡七次甘草炒一寸生薑一指皂角一寸㕮咀作一服煎以上皆素無而暴有者也素有哮喘之疾遇天寒暄不常犯則連綿不已發過自愈不須上方但人有苦於此必欲治之可預為之防也有一發而吐痰涎者宜服補腎地黃丸加五味子破故紙炒方見腎臟有發而不吐痰涎者宜丹溪治痰喘方南星半夏人參瓜蔞香附陳皮去白皂角炭蘿蔔子為末薑汁煮神麯糊丸黍米大每服二十丸薑湯下切不可輕聽時醫妄用砒信有毒之物臨時宜用九寶湯此常治經年喘嗽屢驗麻黃去節陳皮去白薄荷各五分辣桂紫蘇桑白皮炒大腹皮杏仁去皮尖各三分炙甘草六分銼烏梅生薑童便少許煎服小兒胸膈積熱大喘者此肺脹也名馬脾風用牛黃奪命散主之方見驚風又方用甘遂一錢雄黃五分每服五分新汲水五七匙清油三點調下吐痰後喘定大抵喘者惡候也有因利下而愈者亦有因利下而殂者有數年𤴺痼而自瘳者亦有因他痰火而不救者如汗出發潤喘者為肺絕自汗如油喘者為命絕直視譫語喘滿者不治諸有篤疾正氣欲絕絕時邪氣盛行多壅逆而為喘也諸疳榮衛皆從水穀生衰水減便成疳症只因飢飽失調理肥瘦空將口訣記兒童十六歲以下其病為疳十六歲以上其病為癆疳癆皆血氣虛憊脾胃受病之所致同出而異名也蓋胃者水穀之海也水穀之精氣為榮榮者血也悍氣為衛衛者氣也氣以呴之充皮毛肥腠理者氣也以濡之潤皮膚美顏色者血也故水穀實者無病水穀少減者病水去谷亡則死矣凡病疳而形不魁者氣衰也色不華者血弱也氣衰血弱而脾胃傷則水穀少矣疳之生於脾胃也明矣蓋小兒臟腑嬌嫩飽則易傷乳食二者失常不成疳者鮮矣疳皆飲食不調肥甘無節而然或嬰兒厥乳粥飯太早或二三歲後穀肉菜果恣其欲則肝已傷得因而太飽停滯中焦食久成積積成疳或因取積轉下太過耗散胃氣或轉下之後又傷食一傷一取重亡津液疳之病起於積者也或因大病之後吐瀉瘧痢乳食減少脾胃失養氣血益虛此疳之生於大病之後者也其候頭皮光急毛髮焦稀腮縮鼻乾口饞唇白兩眼昏爛揉鼻揉眉脊聳體黃鬥牙咬甲焦渴自汗尿白瀉酸肚脹腸鳴癖結潮熱酷食瓜果鹼炭水泥者皆其候也按錢氏云大抵疳病多辨冷熱肥瘦其初病者名肥熱疳病久者多瘦冷疳冷者木香丸熱者黃連主之斯言也亦其讓人附會之誤也故楊氏云疳之為病皆虛使然其熱有虛中之熱冷者虛中之冷治熱不可妄瀉過涼治冷不可妄補過溫積溫成熱積涼成冷當識此意今木香丸內檳榔續隨子乃下蟲轉下之劑豈久病者可服乎吾為之解曰凡病得於傷食之後者其病雖虛宿食猶存此受有餘之病曰肥熱疳得於大病之後者正氣已傷此為不足之病謂之曰瘦冷疳熱者宜加減集聖丸冷者宜加減肥兒丸加減集聖丸治肥熱疳黃連乾蟾燒存性各二錢莪朮煨青皮木香砂仁當歸使君子肉夜明砂五靈脂神麯炒山楂肉各一錢半用粟米糊為丸黍米大量兒大小加減米飲下如未至成疳者只服祖傳保和丸方見脾臟加減肥兒丸治瘦冷疳黃耆炙人參白朮茯苓炙甘草陳皮青皮當歸川芎白芍鱉甲九肋醋炙使君子肉黃連乾蟾燒存性木香等分另取山藥煮糊丸黍米大量兒加減米湯下如未成疳者只服肥兒丸方見家傳三法凡有疳熱者不可妄用推摩掐法吾見殺兒多矣不問諸疳總屬脾胃無津液致羸疲只將集聖丸為主隨症從權加減大抵疳之為病皆由乳食過飽或因無乳而以他物飼之或因病後被食所傷於脾胃一家有積不治傳之他臟亦有兒飢食少或病後食少脾胃亦虛五臟六腑皆無所稟乃成五疳之症治此者只以脾胃為主集聖丸主之其有五臟兼症或因他病變成疳者各視其症從權加減不必多求方法也集聖丸不問冷熱諸疳病皆治之此治疳之神方也蘆薈五靈脂夜明砂陶砂仁陳皮青皮莪朮煨使君子肉木香當歸川芎各二錢黃連乾蟾炙焦各三錢用豬膽一個取汁和藥粟米糊丸黍米大服三十丸米飲下病有咬牙舒舌舌上生瘡愛飲冷水唇紅面赤喜伏地而睡此心疳也又名驚疳前方去莪縮青陳芎木香六味加生地白茯苓膽南星各二錢甘草炙硃砂水飛各一錢目生眵淚髮際左臉多青或目生白膜泄痢夾水或如青色此肝疳又名風疳前方去莪縮陳木香四味加龍膽草山梔仁防風天麻蟬蛻各二錢青黛一錢半病愛吃泥土冷物飲食無度身面俱黃發稀作穗頭大項小腹脹腳弱間或釀瀉肌瘦晝涼夜熱不思乳食此脾疳也又名食積疳宜前方主之病鼻下赤爛手足枯細口出腥氣或作喘咳嗽右腮㿠白名肺疳宜前方去莪朮縮砂青芎木香五味加桑白皮焙桔梗炙甘草紫蘇葉阿膠炒各二錢為丸外用蘭香葉燒灰一錢銅青五分輕粉二錢半細末貼鼻下赤爛處一方用熊膽泡湯筆蘸洗鼻中病兩耳內外生瘡腳如鶴膝頭縫不合或未能行或齒生遲或齒縫臭爛傳變作走馬疳之例名曰腎疳前方去莪縮陳木香五靈脂六味加澤瀉茯苓丹皮山茱萸山藥各二錢地黃焙三錢為丸外治兩耳前後赤爛用黃丹煅赤色枯白礬綠豆粉各一錢研末搽之或以唾調亦可又方治牙疳取尿桶內白莖颳起新瓦上火煅過五分鼠婦七枚文蛤內蟲二分枯礬半分末效病積成疳又復傷食其症形瘦腹緊時發潮熱羞與人見見之則哭依前方去蘆薈五靈脂二味加人參黃耆白朮茯苓炙甘草半夏曲枳實炒厚朴炒神麯炒麥芽炒鱉甲醋炙三稜煨各二錢為丸痢有瀉久不止胃虛成疳者此疳瀉也宜前法去蘆薈莪朮五靈脂三味加人參白朮茯苓肉豆蔻煨訶子肉各二錢粳米糊丸如先病疳又病瀉者宜先止泄用錢氏異功散加白芍訶子肉豆蔻乾薑炙各等分山藥作糊丸服待瀉止又服治疳瀉本方病痢久不止胃虛成疳此痢疳也以前方去蘆薈莪朮青皮五靈脂四味加訶子石蓮子各三錢粳米糊丸如先有疳病復病痢者以治痢為主宜和中丸方見後痢門痢止再服本方治疳痢病瘧未已胃虛成疳者此必有癖謂之疳瘧宜前方去蘆薈五靈脂二味加黃耆炙人參鱉甲炙柴胡半夏神麯三稜各一錢粳米糊丸如先病疳又病瘧者用平瘧養脾丸與前方相間服之病驚後成疳者即心疳肝疳也宜前方但疳病變驚風者謂之慢脾風難治如腫脹者此疳之外候即脾疳也咳久成疳者肺疳也瘡痍成疳者此腎疳也各有本方病腦疳者頭皮光急滿頭餅疹腦熱如火髮結如穗遍身多汗腮腫囟高令兒眼痛其病在肝宜前方去莪縮青陳木香五味加膽草川芎升麻羌活防風各末二錢豬膽汁浸爛糊丸薄荷湯泡下外用鯽魚膽滴鼻中連三五日甚效產婦月中多忿令兒有此病瘠疳者蟲食脊膂發熱羸黃積中生熱煩渴下痢拍背如鼓鳴脊骨如鋸齒或十指皆瘡頻齧爪甲宜前方去莪縮青陳歸芎六味加苦楝根皮白者綠色貫眾蕪荑檳榔各二錢為末名安蟲丸蓋五疳成有停食成積積久成蟲或如絲髮或如馬尾多出於頭項腹背之間黃白或赤者可治青黑則難治也按岐伯云三伏內用桃柳枝煎水浴兒於午時當日中灸兒尾翠骨上三寸陷中三壯後用青帛拭之有見疳蟲隨汗出也此法甚效病蛔疳者皺眉多啼嘔吐清沫腹中乍痛中則成聚肚腹青筋唇口紫黑腸頭齧癢者是也蛔雖食蟲蟲不可動從口鼻出者難治用下蟲丸方見蟲痛輕者前安蟲丸主之病手足極細項小骨高尻削體痿腹大臍突號哭胸陷是為丁奚虛熱往來頭骨分開翻食吐蟲煩渴嘔噦是為哺露是為疳病之狀也宜集聖丸主之病無辜疳者腦後項邊有核如彈按之隨動軟而不痛其間有蟲如米粉不速攻之則蟲隨熱氣流散臟腑淫蝕精血以致遍身癰瘡便利膿血壯熱羸瘦頭露骨高幼科書中稱是妖鳥之毒此或有之亦客忤中惡之類耳天地間遊魂為變之氣甚多不但妖鳥也宜刺其核用紫金丹塗之內服前方去莪縮五靈脂三味加人參黃耆炙鱉甲醋炙檳榔二錢共末取青蒿自然汁煮飛羅面為丸米飲下病疳熱者脾胃虛弱陽浮於外氣不歸元只以補脾胃為主使陽氣收斂熱自退也參苓白朮散主之多服佳見脾臟病疳渴者此胃氣下陷津液不生故渴也宜補其胃氣使清氣上升津液漸生渴自止矣七味白朮散主之見泄瀉多服佳病走馬疳者蟲也一名䘌謂匿於臟腑之間不見也以走馬名者齒屬腎腎主虛才受熱邪直奔上焦故以走馬為喻狀如狐𧌒傷寒唇瘡之證初作口氣名曰臭息次第齒黑名曰崩砂盛則斷爛名潰糟熱血迸出名曰宣露甚者齒皆脫落名曰腐根其根既腐縱得全活齒不復生外證腦熱肌削手足如冰寒熱時來滑瀉肚痛口臭乾渴齒齦生瘡爪黑麵黧身多瘡疥瘡疹之後多有此病不可救者毒歸於腎故也宜服加味清胃湯黃連當歸升麻生地黃丹皮白芷梢等分細辛減半噙漱咽之外用燒鹽散用橡斗子不拘多少擇兩個入鹽滿殼蓋作一合或十數個安在火內和鹽燒透取放地上退火毒以碗蓋定存性候冷入麝香少許乳缽內擂極細先用鹽湯洗瘡上後以敷之又方治走馬疳蝕透損骨用天南星一個當心剜坑安雄黃一塊在內以麵裹煨候雄黃作汁以碗蓋定出火毒去面入麝少許為細末搽瘡甚驗或發滿腮鼻穿牙落飲食不進氣促痰鳴乃不生之症也兒方周歲母腹有孕乳汁成毒斂郁小兒神氣亦致骨主尪羸是為魁病宜龍膽湯主之龍膽草微炒鉤藤皮柴胡桔梗赤芍川芎茯苓甘草炙大黃濕紙煨各等分人參減半井水煎服仍以夜明砂不拘多少紅紗作袋盛之常佩霍亂霍亂無嫌吐瀉頻絞腸干痛腹中尋治其吐瀉多寒熱干痛須防喘與驚霍亂之病起於倉卒多因夾食傷寒陰陽乖隔上吐下瀉而躁煩悶亂也人有三焦上主納水穀入而不出中主腐化水穀流行臟腑下焦主分別水穀出而不入上焦者上胃脘也邪在上焦則吐下焦者下胃脘也邪在下焦則瀉中焦者中胃脘也邪在中焦則上吐下瀉霍亂者得吐瀉則邪氣上下得出無苦也陳莝出盡吐瀉自止不吐不瀉者乾霍亂又名絞腸沙其病因胃邪氣無從出也若加喘滿驚搐者十不救一其吐瀉者須分寒熱主治大要斷其乳食恐增痰也故霍亂飲米湯必死霍亂吐瀉宜用藿香正氣散主之方見感冒四氣其先瀉後吐者乃脾胃虛食故先瀉白水吐亦不多口氣緩而神色慢額前有汗六脈沉滯此為冷也宜補溫之錢氏益黃散方見脾臟及理中湯加藿香木瓜主之理中湯治霍亂吐瀉水穀不化手足厥冷人參白朮甘草炙乾薑煨各等分加藿香木瓜㕮咀水煎服或為末蜜丸芡實大米飲化下霍亂薑湯送下其先吐後瀉者乃脾胃有熱故促唇紅吐來面赤渴飲水漿脈洪而數此為熱也宜和解之五苓散加藿香主之五苓散治小兒霍亂吐瀉躁渴飲水豬苓澤瀉白朮茯苓加藿香上末水煎其乾霍亂不得吐瀉者有鹽湯吐法最佳但小兒必待探吐之或以針刺手十指甲縫令血出或於委中刺血皆良法也或發驚搐或腹脹氣喘者皆死候也急用枳實一枚銼製半夏一枚劈破黃連三分切細用水煎湯入甘遂末五釐沉香磨水一匙和勻灌之得吐住後進合香丸病素有積者發則吐瀉不止非霍亂也宜下之脾積丸主之方見積聚嘔吐小兒嘔吐有三因因熱因寒因食停藥食難嘗成格拒吐多清水是蟲名幼科云小兒嘔吐大概難舉有寒有熱有食積然寒吐熱吐未有不因於食積者故嘔之病多屬於胃也又有溢乳有哯乳有嘔噦皆與吐相似不可以吐瀉治之又有格拒者有蟲者當仿法外求之大抵小兒嘔吐莫如節乳節者減少之謂非斷其乳食也嘔吐多渴勿急飲之水入復吐終不得止必強忍一二時而後以薄粥與之吐自止矣按劉河間論吐者分三焦此言甚善如食入即吐者有積在上焦胃脘也上胃脘在咽喉之下太倉之上口名曰賁門食方下咽被積堵塞不得入胃故吐出也宜瓜蒂散吐之此在上者因而越之吐是用吐法使積去乳食得入也如食入少頃吐出者有積在中焦胃脘也中胃脘太倉下口之上小腸上口之上名曰幽門飲食入胃不得入於小腸故轉而上出則吐也吐出皆完穀未腐熟者是也如食半日後復吐者此積在下焦胃脘也下胃脘在小腸下口之下大腸上名曰闌門有積壅塞傳化不去復轉向上出為吐吐多糟粕之物是也此二吐並宜下之去陳莝菀物使腸胃之氣得通水穀之物得行吐自止矣丁香脾積丸主之方見前傷寒瓜蒂散瓜蒂炒黃君赤小豆臣共末每少許淡豆豉煎濃湯調服量兒加減寒吐者乳片不消多吐而少出面白眼慢氣緩神昏額上有汗出脈息沉微宜溫中消食輕者胃苓丸煨薑湯研碎服之不止用理中丸加藿香如諸藥不止以參香散治之參香散治小兒胃虛作吐諸藥不止者人參沉香丁香去丁藿香葉木香等分細末木瓜湯調下如服以上藥並乳食不得入入則吐者此陰盛格陽謂之格拒也宜理中切成劑用豶豬膽汁童便各少許拌藥炒焦煎服即止內經曰熱因寒用之法蓋陰寒氣太甚陽熱之藥難入故理中湯溫熱用膽汁童便之寒涼與之服其始則同其終則異入咽之後陰體漸消陽氣乃發伏其所主先其所因此仲景之秘論也熱吐者面赤唇紅吐次少而多出乳片消而色黃遍身熱甚而煩躁夏月多此證宜胃苓丸用向東陳壁土一塊杵細炒熱入水煎數沸澄清將丸研服不止用黃連厚朴炒藿香等分香薷加倍水煎服吐久不止用理中湯煎熱調天水散冷服即止食積吐者眼胞浮腫而微黃足冷熱日輕夜重或吐酸餿之氣或吐黃水或吐青痰脈弦實而滑此有宿食也宜下去其積乃止脾積丸主之傷乳吐者才哺乳即吐或少停而吐此因乳食無度脾胃嫩弱不能運化譬如小瓶注水滿則溢出也宜節其乳自止哯乳者時時吐乳而不多似吐非吐非吐是吐此胃虛吐也參香散主之溢乳者謂乳多而溢出非真吐乳也苟不知禁即成真吐矣百日內小兒多有之蓋身小身軟不能自立必待母擁抱之苟有傾則乳即溢出譬以瓶注水瓶側而水出矣不須治之嗽吐者必待兒嗽定而後乳也或嗽未定以乳哺之其氣必逆乳不得消化而為痰痰氣壅塞嗽不得轉故嗽而吐乳也宜玉液丸薑湯下小兒初生三日內吐者錢氏方用白餅子下之誤也初生小兒出離母腹惟乳可食安可當此毒藥也此由拭口不盡使惡穢之物損其胃氣只用丁香一小粒去苞陳皮一分木瓜一分共研細末每半分乳調納兒口中令自咽用煎皆是嘔噦者有聲無物也不問大小但病久危困嘔穢者不治經云木陳者葉必落弦絕者聲必嘶是也蠱者腹有蟲時作痠痛痛則吐清水涎沫宜下之下蟲丸白苦楝根皮酒浸焙綠色貫眾木香桃仁去皮尖蕪荑焙尖檳榔各二錢鶴蝨炒乾蟾炙焦各一錢輕粉五分使君子肉五十枚上末麵糊丸麻子大每服一二十丸俟天明先以肉汁味臭鼻內使香聞鼻中即仍肉汁下丸傷食證治傷食無如損節奇視其輕重法何為欲求陳莝推將去消導不行攻取之內經曰飲食自倍脾胃乃傷東垣先生解云飲者無形之氣也食者有形之血也由此推之乳為血所化飲之類也乳食之類宜有辨矣幼科消乳丸有三稜莪朮誤也小兒之病傷食最多故乳食停留中焦不化而成病者必發熱惡食或噫氣作酸或惡聞食臭或欲吐不吐或吐出酸氣或氣短痞悶或腹痛啼哭此皆傷食之候也方見傷食之證不必悉具便宜損之損之者謂姑止之勿與食也使其自消所謂傷之輕者損谷自愈也損之不減則用胃苓丸以調之調之者調其脾胃使乳谷自消化也調之不減則用保和丸以導之導之者謂腐化乳食導之使去勿留胃中也導之不去敗攻下之輕則枳樸大黃丸重則備急丸主之枳樸大黃丸枳實炒厚朴薑汁炒大黃酒蒸各等分檳榔減半共細末神麯糊丸黍米大量兒減加薑湯下備急丸大黃巴豆去膜乾薑等分須得精新好藥研末煉蜜丸黍米大每服三五丸量兒加減白湯下凡用消導攻取之藥必的見其所傷之物則胃氣不傷而食物去卻無遺毒矣故傷熱物者如酒肉濕面辛辣之類則以枳實青皮黃連大黃牽牛主之傷冷物者如瓜果冰水豆粉之類則以丁香木香砂仁草果巴豆治之又如山楂之消肉食神麯麥芽之消穀食半夏乾薑之消菜果生冷各有所宜也苟不問寒熱而以寒治寒以熱治熱則所傷之物雖去而偏寒偏熱之藥性留於胃者或為熱中或為寒中作兒終身之害者皆一時之誤也小兒傷食最關利害父母不可輕忽醫人不可粗率也如棄而不治則成積癖治之失法則成疳癆故兒之強壯者脾胃素實恃其能食父母縱之以致太過停留不化此乃食傷脾胃真傷食也可用前法治之如小兒之怯弱者脾胃素虛所食亦少或因少加則必停蓄不化此乃脾虛不能消穀轉運遲耳非其傷食也治以前法則誤矣宜用養脾丸主之小兒易虛易實者也如使壯實者縱其口腹則飲食自倍脾胃乃傷而實者亦虛矣其虛怯者節飲食則脾胃無傷穀氣漸長而虛者可實矣胃苓散之方如五苓散之利水平胃散之消穀可以調理脾胃可以消導飲食誠小兒之要藥也如傷食又感風寒者此內傷夾外感也不吐瀉者謂之夾食傷寒先解其表宜藿香正氣散主之表解後攻其食積枳樸大黃丸有吐瀉者謂之霍亂宜藿香正氣散主之詳見感冒四氣如傷食發熱變驚風者先去食積使食去熱除而搐自止宜加減宣風散主之發搐者人參羌活散詳見驚風宣風散檳榔二個草果仁陳皮各半兩黑牽牛生熟各半二兩大枳實五枚大黃一兩共末每半錢蜜湯調服人參羌活散柴胡防風天麻前胡人參川芎當歸枳殼茯苓羌活桔梗甘草蟬退各等分末薄荷同煎服傷食或吐或瀉則其所傷之物去矣只以肥兒丸調之和其胃氣或錢氏之異功散蜜湯調服積聚證治宿食停傷脾胃中是名食積法宜攻必詢原物分寒熱莫犯虛虛可立功按東垣云食者有形之物傷之則宜損其谷其次莫若消之不止則攻之此治初傷乳食之法也只因不早治之或治之晚以致陳莝菀聚乃成積也小兒病積者多其候面黃色白腹大或緊食少或腹作痛無時發作發作則數日不止治其積者若不問平日所傷之物是寒是熱觀兒之形或虛或實一概用偏寒偏熱峻下之劑而犯虛虛之戒其害大矣如曾傷乳熱食熱者則為熱積如傷冷乳冷食者則為冷積傷五穀者則為食積傷五畜之肉者則為肉積熱積傷五果之類者則為果子積生冷積傷五菜之類者則為菜積有冷有熱冷積宜丁香脾積丸下之以原食生冷之物作湯熱積宜丁香檳榔丸下之以原傷穀肉之物作湯謂之溯源湯凡用攻下取之藥必先補其胃氣如異功散之類而後下之所謂補而瀉之勿犯胃氣也家傳丁香脾積丸治冷積腹痛又治傷食積瀉效丁香木香良薑清油炒各一錢青皮皂角燒存性檳榔各二錢三稜煨莪朮煨各三錢巴豆四十九粒去殼膜另研如泥上前八味細末入巴豆泥研令勻用醋煮麵糊丸麻子大每五丸原物湯下如取蟲苦楝根皮湯下木香檳榔丸治熱痰腹痛又治痢疾木香檳榔青皮陳皮枳殼炒莪朮煨黃連黃柏各一兩香附大黃各三兩黑牽牛取頭末三兩上細末滴水為丸麻子大每服十丸原物湯下原物湯取原日所傷之物用韭菜搗爛捏成餅子燒存性研細煎湯送下名取積丸如素弱者不可輕下當以補藥去之用錢氏益黃散加莪朮木香黃連炒共細末水煎神麯糊丸黍米大服二三十丸米湯下泄瀉證治泄瀉先須辨五因治分三法見於經養其脾胃嘗為本莫使五虛成慢驚泄有五者謂風寒暑濕食積也皆屬濕論故風濕寒濕濕熱中濕此者濕之生於外者也食積則濕之生於內者也叔和云濕多分五瀉者是也治有三法者按仲景傷寒論云下利不止者宜理中丸理中者理中氣也治瀉不利小便非其治也五苓散主之不止者利在下焦也宜赤石脂禹餘糧湯止之故初則溫中理其胃氣也次則分利使陰陽和暢水穀分別也末則止澀澀可去脫恐腸胃滑而穀氣不收也此三者治瀉之大法也故予家傳心法初用理中湯中用五苓散末用七味豆蔻丸或一粒白玉丹即是仲景之法七味豆蔻丸治泄瀉不止澀可去脫之法也又治虛泄肉豆蔻麵裹煨木香砂仁各三錢白龍骨訶子肉各五錢赤石脂枯礬各七錢共細末麵糊丸麻子大量兒加減小者十五丸服止五十丸米飲下白玉丹又名一粒丹治滑瀉不止神效大人通用寒水石煉研水飛二兩枯白礬一兩共細末麵糊丸小者麻子大大者皂子大中者豌豆大母服一丸米飲下久者宜用初則勿用傷風泄瀉其症口中氣熱呵欠頓悶乍涼乍熱睡多氣粗大便黃白色嘔吐乳食不消令咳嗽宜發散加減惺惺散主之加減惺惺散治小兒風泄補脾胃發散風邪為主人參白朮白茯苓各一錢炙甘草七分防風川芎藿香各三錢半細辛二錢按小兒科論夏至後泄者熱多秋分後泄者寒多中間按節氣分寒熱多少之說似太瑣細不若原病式明白蓋冷泄熱泄四時有之但暑月多熱冬月多寒熱瀉者原病式云穀雖不化而色變非白煩渴小便赤澀凡穀消化無間色及他症便為熱也寒瀉而穀消化者未之有也然熱瀉亦有不化谷者邪熱不殺穀也穀雖不化乃糟粕耳非若邪氣之完穀出也此宜辨之如夏月得之大渴者宜五苓散作湯調玉露散另身熱與渴略減者只服五苓散不可更加玉露散恐生中寒之症瀉仍不止用胃苓丸和一粒丹止之神效非夏有此熱瀉者渴飲水白朮散乃聖藥也寒瀉者原病式云完穀不化而色不變吐利腥穢澄清冷小便清白不澀身涼不渴此為寒也冬月得之宜理中湯丸不止以五苓散加薑棗煎再不止者七味肉豆蔻丸主之春秋月同惟夏月得之先服理中湯丸後以五苓散和玉露散玉露散一名甘露飲治傷熱瀉黃色石膏二兩寒水石煅研水飛二兩生甘草七分半上極細末每服一字或半錢溫水調下如寒泄久不止一日三四次溏而不多腹中鳴宜黃耆補胃湯黃耆補胃湯黃耆炙歸身川芎柴胡益智仁陳皮炙甘草各二錢升麻六分共末水煎服濕瀉者身重泄水風濕者水穀混雜宜升麻除濕湯濕熱者宜五苓散加玉露散濕不渴宜胃苓湯此病夏秋間多有之益黃散尤妙升麻除濕湯治風濕作瀉自下而上者引而竭之升麻柴胡神麯炒防風澤瀉豬苓各五分蒼朮一錢陳皮炙甘草麥芽炒各五分如胃寒腸鳴加益智仁半夏等分入薑棗煎非腸鳴不得用也上㕮咀分作五服水煎胃苓湯治夏秋間脾胃傷冷水穀不分泄瀉不止五苓散平胃散二方相合入薑棗同煎服今治泄瀉者不問大人小兒通用此方如寒濕瀉不止宜益黃散此治寒濕之要藥也食積泄者因飲食過多遂傷脾胃以致泄瀉其候大便不聚臭如敗卵或作酸臭之氣或色黃白腹中或有痛者宜先補胃氣而後下之補用錢氏異功散加神麯下用丁香脾積丸小下積之方惟此能去痛止瀉也有巴豆按藥性巴豆能令未瀉者瀉能令已瀉者止故也凡大瀉引飲者其病不論新久皆服白朮散痢病亦同蓋脾惡濕腎惡燥飲水太多其腎益燥津液不升則渴益不止水止於脾濕傷脾胃瀉亦不止故白朮散治渴瀉之聖藥也常宜服之以代湯水不可再飲湯水兼之不效矣白朮散治泄瀉胃熱煩渴間陰陽並宜服之人參白朮茯苓木香甘草藿香各一錢葛根二錢共細末水煎服本方治小兒陽明經本虛陰陽不和吐瀉亡津液煩熱口乾以參朮甘草甘溫補胃和里木香藿香辛溫以助脾茯苓甘平分陰陽利水濕葛根甘平倍於眾藥其氣輕浮鼓舞胃氣上行津液又解肌熱治脾胃虛弱泄瀉之聖藥也不問泄痢但久不止者並服之錢氏云瀉黃者傷熱乳也瀉青者傷冷乳也予家通用胃苓湯為丸主之熱者用車前草湯下寒者用煨薑湯下又瀉不止非清氣之下陷則腸滑不禁及肺虛不行收令也宜家傳升陽固脫湯主之人參白朮白茯苓甘草炙當歸白芍地黃升麻豬苓澤瀉葛根陳皮烏梅訶子肉共十四味等分量兒大小㕮咀水煎服無時即大人亦可服之久瀉不止多屬虛寒無有熱也故經曰暴瀉無寒久瀉無熱宜豆蔻丸和胃苓丸各半相合陳米炒熟煎湯送下即止如再不止宜用人參白朮散加肉豆蔻麵裹煨訶子肉為丸服庶不成虛變慢驚風也有先瀉未止而成疳者易治宜參苓白朮散加肉豆蔻訶子肉丸服之則泄自止津液漸生不致成疳也有先疳而後瀉者謂之疳瀉難治宜用集聖丸去蘆薈莪朮五靈脂三味加肉豆蔻訶子肉等分為末山藥糊丸黍米大每二十五丸四君子湯下經曰五虛者一脈細二皮寒三少氣四泄瀉不止五飲食不入五虛悉具者生能食者生又瀉不定精神好者脾敗也吐瀉唇深紅者內熱故也不退必死面黑氣喘者不治大渴不定止之又渴腎敗也遺泄不覺者死痢疾證治赤白無分寒熱議多因食積宜通利育嬰家寶只三分傳自河間真秘密按內經曰飲食不節起居不時陰受之則入五臟陽受之則入六腑填滿閉塞不為飧瀉久為腸癖飧瀉者為米穀不化也腸癖者下痢是也又按五十七難曰胃瀉者飲食不化色黃脾瀉者腹脹滿泄注食即嘔吐逆大腸泄者食已窘迫大便色白腸鳴切痛小腸泄者溲而便膿血小腹痛大瘕泄者裡急後重數至圊而不能便莖痛大瘕泄者痢也由素難之文觀之則痢起於食積也況小兒之病傷食者多惟有宿食為積故因四時之感而成痢也赤白皆屬熱說見原病式中或謂赤者屬熱白者屬寒未敢聽之但謂痢久不止則為虛寒或服冷藥過多熱變為寒者則有之矣此當以脈證別之身熱而渴脈數大有力而能食者為熱身涼不渴脈沉無力而不食者為寒明矣治痢之法初起腹中若痛裡急後重者其痛為實宜急下之三黃承氣丸不可用巴豆牽牛之劑巴豆損血牽牛損氣也如有外症不可遽下宜發散之倉廩湯主之初治不止各隨其證施治也三黃承氣丸治痢疾初起兩眉皺而啼哭者腹痛也裡急後重煩躁不安者以此下之大黃酒蒸一兩枳實炒厚朴炒檳榔各五錢黃連酒炒黃芩酒炒黃柏酒炒當歸各三錢木香二錢共細末神麯糊丸黍米大兒小者十五丸兒大者三十丸滾白水下倉廩湯治傷風痢疾及時行疫痢大小相似者宜先服此方即人參敗毒散方見前加陳倉米煎服一方加陳皮因傷風得之者則純下清血宜胃風湯主之如下純血宜黃連四物湯家秘剪紅丸不止者阿膠梅連丸大效胃風湯治風冷客於腸胃泄下鮮血及腸胃濕毒下如豆汁或下瘀血人參白茯苓川芎當歸白朮白芍辣桂各等分上㕮咀量兒加減入粟米數十粒同煎食前熱服黃連四物湯治下痢純血黃連當歸川芎白芍生地槐花炒荊芥穗等分加犀角上㕮咀量兒大小水煎服家傳剪紅丸治痢下純血及大人腸風下血神效枳殼炒槐子炒側柏葉炒荊芥穗等分共細末酒糊丸黍子大量兒加減米飲下阿膠梅連丸治下痢無問新舊赤白黑疼痛諸症真阿膠銼碎用蛤粉炒成珠赤茯苓去皮烏梅洗淨去核焙乾赤芍黃柏黃連乾薑炮當歸酒洗日乾等分共細末水丸黍米大米飲下忌雞魚油膩諸物以上皆初治之法也赤白痢者心主血因傷熱得之則心移熱於小腸是為赤痢故赤者從小腸而來也肺主氣因傷熱得之則肺移熱於大腸是為白痢故白者從大腸而來也劉河間據內經云溲而便膿血知氣行而血止也以芍藥湯主之行血則便自愈調氣則後重除此治痢之要法也吾之先祖以此立法用黃連阿膠丸加當歸木香治血痢於血中行氣胃苓丸加當歸芍藥治白痢於氣中養血赤白相兼者香連丸有積者家秘治痢保和丸相兼服之無不效者河間芍藥湯行血則便自愈調氣則後重除芍藥一錢當歸黃連黃芩各五分炙甘草二分大黃三分檳榔木香各二分桂二分半㕮咀兒小分三劑大則一劑水煎食前溫服黃連阿膠湯治赤痢黃連三錢阿膠炒二錢白茯苓當歸木香各一錢細末水丸米飲下胃苓丸治白痢加當歸白芍白朮研末水糊丸米飲下香連丸治赤白痢此吾家傳秘方也黃連大如雞爪者去枝梗切吳茱萸木香石蓮子肉各三錢共末酒糊丸黍米大量兒加減陳米炒煎湯下家傳治痢保和丸其積有未盡有久痢原未得下脾虛不可下者俱宜服下之陳皮半夏白茯苓枳殼炒厚朴炒黃連炒山楂肉蘿蔔子炒神麯麥芽炒各五分木香檳榔炙甘草各減半上細末別取神麯糊丸米飲下此以上中治之法也痢久不止名休息痢不可驟用肉豆蔻訶子肉罌粟殼止之恐有滯積未盡反成重病也必腹中不痛雖有虛痛切不可止之吾有家秘和中丸不犯此禁如有可止者幼科中秘傳香連丸萬金散擇而用之家傳和中丸專治休息痢及疳痢屢驗人參炙甘草當歸川芎車前子豬苓澤瀉神麯麥芽俱炒訶子肉麵裹煨石蓮肉各二錢白朮白茯苓陳皮白芍黃連炒各三錢木香乾薑炒豆肉蔻麵裹煨各二錢共細末酒煮麵糊丸黍米大米飲下秘傳香連丸治男女小兒諸般痢疾作痛並久痢虛脫膿血不止者服之神效如初痢一二日間不可服恐攔住積滯熱毒變生他症又反為害也黃連酒潤炒一兩木香肉豆蔻煨各三錢乳香沒藥各一錢上末麵糊丸芡實大服一丸赤痢甘草湯白痢薑湯下萬金散治水瀉下痢久不瘥者粟殼去蒂二兩銼細醋炒一兩生用一兩甘草留節生一兩炙一兩陳皮去白二兩烏梅和核一兩銼碎合成劑量兒大小熱渴略煎二沸和渣傾出碗內蓋定澄清去渣空心溫服以上末治之法也瀉痢從來更變多久而休息轉沉疴脫肛不禁堪惆悵膝腫其如鶴膝何有泄瀉變痢疾有痢疾變泄瀉者先正有言曰先瀉後痢者此脾傳腎也為賊邪難治先痢後瀉者此胃傳脾也為微邪易治斯言也謂瀉痢久而傳變者愚亦有說焉瀉久不止復變痢者其後重者胃氣之下陷也其膿血者腸垢之下濁也水穀竭而胃敗如之何不死痢久不止而變瀉者其後重除者乃濕熱之毒盡矣其膿血止者乃陳莝之物去也腸胃通而水穀行故可治也若初瀉便變痢者此氣病傳入血中宜養血為主加調氣之藥不可復下傷胃氣也初痢即變瀉者此血病傳入氣中以調氣為主加養血之藥不可遽澀使毒留而不去覆成痢也瀉變痢者宜四物湯加黃連木香白茯苓痢變瀉者宜四君子湯加當歸白芍主之痢久不止無津液欲成疳病者宜參苓白朮散大補胃氣可也有素病疳又新病痢者此重傷食感冒四氣之所致也宜錢氏異功散加當歸白芍木香訶子肉神麯炒各等分為丸服不可作痢治之痢久不止謂之休息痢脾胃受傷其氣之下陷也則為脫肛其上逆也則為食入即吐不思乳食謂之噤口腎開竅於二陰痢久則腎敗矣兩膝紅腫謂之鶴膝更有不治之症俱宜辨之脫肛者胃氣之下陷也後重不除努責太過故腸頭脫肛出也肛門名魄門肺是主之腸頭脫出又肺氣不行收令也宜用養血調氣升提之劑使痢止則肛自不出矣升麻湯主之外用洗法托法灸法升麻湯升麻一錢人參白朮白茯苓陳皮當歸白芍麻子仁各五分甘草防風各三分荊芥穗二分烏梅去核一個上㕮咀分二劑食前服洗法獨澆散治脫肛不收五倍子半兩研末井花水三碗入瓷罐內慢火煎半入朴硝荊芥穗各一錢乘熱熏洗仍以五倍子末付之一方用綠桑螺燒存性研末以豬膏和塗腸頭上托法用木賊燒存性為末摻之以軟帛按入又方用赤石脂伏龍肝等分末敷之又方用龍骨末木賊燒存性等分為末敷之灸法脫肛不收灸尾翠骨穴神效又能治痢噤口者乃胃虛逆氣上衝而吐也有不思食者皆虛損也宜用參苓白朮散米飲調服大抵此病難治凡瀉痢者能食則吉不能食則凶鶴膝者兩膝紅腫如鶴之膝也小兒痢後多此疾乃腎虛之症也宜補腎地黃丸加虎脛骨牛膝主之有五色痢者此五臟之真色見也不可治痢疾腹脹者屬中氣不足也宜胃苓丸調之慎勿下之下之則死亦有餘毒之未盡誤服澀藥太早腹脹者此為實也腹中必痛宜下之三黃枳朮丸主之痢疾不治症小兒下痢如塵腐色者死如屋漏水者死下痢日久大吼如竹筒者死如魚腥者死凡赤白同下久而不禁小便赤澀腹痛發熱唇紅舌苔氣促心煩坐臥不安大渴飲水穀道傾陷面容似妝噤口不食眼胞腫足背腫者皆不可治內經曰腸癖身熱脈躁疾者死身涼脈遲者生又脈大而有力者死脈微而無力者生
