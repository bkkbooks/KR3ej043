body:
  text: 卷之二胎疾孩兒初生襁褓中如苗秀實漸成童四因內外能分辨治不乖方大有功幼科立方古有定製兒初生後病者惟以膏丸化而服之蓋以變蒸未定腸胃脆弱恐不勝藥則立調治乳母之法一歲之後則有湯藥與大人同但劑小耳有因氣動而病生於內者如驚病蟲癖之屬驚用安神丸內瘹用木香丸蟲用安蟲丸癖用消癖丸有不因氣動而病生於內者如傷乳食之屬初傷以胃苓丸和之和之不去以保和丸消之消之不去以脾積丸取之量兒虛實勿損胃氣有因氣動而病生於外者如結核蟲疥丹瘤之屬結核用家祕內消丸蟲疥用苦參丸丹瘤用砭法有不因氣動而病生於外者如傷風傷寒傷暑傷濕之屬風用瀉青丸防風惺惺散寒用理中丸藿香正氣散暑用涼驚丸黃連香薷飲濕用胃苓天水五苓散胎疾初生治較難幼科證治莫空談丹溪妙論如繩墨家祕書中次第看小兒胎病有不必治有不可治者嘗觀內經巔疾之文東垣紅絲瘤之論則兒疾之生於父母者似乎不必治矣一臘之臍風不治百晬之痰咳難醫未三月而驚搐者凶恰一月而丹瘤者死又不可治者矣今幼科有胎熱胎寒胎肥胎瘦胎驚胎黃之論證治雖詳豈小兒常服之藥也況寒熱者胎胚之餘毒也肥怯者父母之賦豫也非惟不可治亦且不必治矣惟丹溪論治胎毒者只調治乳母其法誠幼科之繩墨歟胎寒者母娠時多熱病乃服寒涼之藥令兒受之生後昏昏多睡間或吮乳瀉白此其候也或百日之內忽病戰栗口冷手卷曲不伸手亦握拳腹痛晝夜啼哭不止此生後受寒得之亦名胎毒宜服溫補之劑當歸散主之乳母宜服釀乳當歸散當歸散治小兒胎中受寒生下再感外風面色青白四肢厥冷大便青黑及腹痛盤腸內瘹歸尾酒洗黃耆蜜炙人參細辛龍骨桂心赤芍甘草炙各半分為細末每服一字以乳調下釀乳當歸散乳母服之當歸川芎赤芍生地香附炙甘草各等分桂心煨姜各減半㕮咀水煎食後服少頃捏去宿乳與兒吮之胎熱者母娠時喜食辛熱煎炒之物或患熱病失於清解使兒受之生後目閉面赤眼胞浮腫常以身努呢呢作聲或時啼叫或時驚煩遍身壯熱小便黃澀此胎熱也若不早治則丹瘤瘡癤由此生宜用淨黃連炙甘草各等分為末入硃砂減半和勻生蜜調成劑每取豆許大納兒口中令其咽下乳母宜服釀乳赤芍散釀乳赤芍散生地黃酒洗黃芩川芎當歸木通酒洗炙甘草赤芍天花粉連翹各等分㕮咀加淡竹葉水煎食後服令乳母捏去宿乳亦須少與兒吮之胎驚者母娠時曾因驚悸氣傳於子子受之生後頻頻發驚此胎癇也不可治治之無功如因有熱發搐者必先啼哭亦名胎驚用燈心湯下東垣安神丸效搐不止者此真搐也勿治又方治小兒胎中受驚生未滿月而驚啼用牛黃硃砂麝香少許研細取豬乳調稀納入口中又用全蠍一枚以生薄荷葉裹之線扎定火上炙焦為末分四服入硃砂麝香少許麥冬湯調下胎黃者兒生下面目身盡黃者亦胎熱也治同法胎肥者兒生下遍身肌肥肉如血色紅滿月以後漸漸羸瘦胎怯者兒生下目無晶光面無華彩身無血色此二症者乃胎稟不足之病宜服地黃丸方見前又用浴體法天麻二錢蠍梢五分硃砂五分白礬青黛各三錢麝香一字烏梢蛇肉酒洗焙乾三錢同研末每用三錢水三碗桃枝一握並葉五六片同煮十沸去渣溫熱浴之勿沐背一小兒初生遍身無皮俱是赤肉用白果粉遍身摻上候生皮乃止一小兒初生如魚泡又如水晶破則水流用密陀僧研極細擦之小兒胎疾有胎稟不足並宜地黃丸有胎毒者如胎熱法所謂胎稟不足者各隨五臟論之如語遲心氣不足也心主言行遲者肝氣不足也肝主筋齒髮不生者腎氣不足也發者血之餘腎主血齒者骨之餘腎主骨吐瀉頻並者脾胃之氣不足也脾胃為水穀之府啼聲短小者肺氣不足也肺主聲臍風證治臍在身中號命關衝任在此養靈根最宜調護無傷損才少差池減壽元臍在兩腎之間謂之命門乃人之根本也衝任胃三脈皆起於臍之下任脈自中而上至於人中與腎脈合衝脈二道夾任脈而上散於舌下與脾脈合胃脈二道又夾衝脈任脈而上入於齦中上下往來如環無端故男子十六歲而精行女子十四歲而血動任脈行衝脈滿胃脈實也小兒初生三脈方具而臍之干係尤重也所以斷臍之時不可不慎或剪臍帶太短或結縛不緊致外風侵於臍中或用鐵器斷臍為冷所侵浴兒時或牽動臍帶水入生瘡客風乘虛而入內傷於腎腎傳肝肝傳心心傳脾脾傳肺肺蘊蓄其毒發為臍風之病其證面赤啼哭者心病也手足微搐者肝病也唇青口撮痰涎壅塞者脾病也牙關緊者腎病也啼聲不出者肺病也五臟之中略見一二臟之證者病猶可治悉見不能矣臍風幼子幾遭傷一臘之中最不祥識得病在何處起欲求無患早提防小兒初生一臘之內惟臍風為惡候也如臍腫腹痛啼哭不止唇青口撮者曰臍風牙關緊急吮乳不得啼聲不出者曰噤風肚腹緊脹腸若雷鳴大小便不通者曰鎖肚此三者同一病也但症不同耳俗名馬牙風者是也三證多死臍腫唇撮者脾胃之氣絶於中也噤風乳食不入者心肺之氣絶於上也鎖肚大小便不通者肝腎之氣絶於下也任脈止衝脈閉胃脈散如之何不死欲免此症須要提防預防法小兒初生十日之內但見噴嚏多啼不乳者此將發之候也急抱兒嚮明處視其喉中懸癰上齶有小泡如珠之樣相聚者即用銀挖耳或手指甲刮去之以軟綿蘸甘草汁拭去其血去之早而泡白者無慮也其色黃或有泡痕在而落入腹中者急用硃砂牛黃麝香各少許研細取豬乳汁調稀抹入口中或取豬乳汁一二匙與兒吞之佳蓋豬乳汁主小兒口噤不開最良又法五苓散加當歸川芎木通木香除此不煎磨汁入藥內與乳母服如上法若失預防之法其病將來而口漸撮啼多乳少者此腹中痛也內瘹同宜五苓散加當歸酒洗吳茱萸炒木香乳香沒藥鉤藤各二分為極細末乳拌如芡實大納兒口中服之無時乳母仍服上五苓散又取附子肉桂等分為末生薑自然汁調作餅約一分厚與臍相等放在兒臍上以紙托住上用尉斗火尉之如諸證悉見不可治也近古方治臍風者初用控涎膏以吐風痰次用益胃散和胃又用辰砂膏利驚此良法也又用殭蠶全蠍蜈蚣蜘蛛諸毒藥以祛噤風者此皆治其標也不治其本而治其標故鮮克有濟者矣然父母愛子之心必欲救之醫有活人之心不可不救也病輕各如上以五苓散為主蓋五苓散是太陽膀胱之裡藥也澤瀉茯苓以養心安神官桂吳茱萸當歸以伐肝臟寒邪之氣白朮茯苓以去脾臟寒濕之氣木香乳香沒藥以止腹中之痛官桂茯苓澤瀉豬苓又去腎中之濕以鉤藤官桂去風之搐以人乳和之蓋乳母血之所化其氣用也若有痰者本方加膽星末口噤者加白殭蠶末更加人參末服之如大便不通者宜三黃解毒丸下此急則治其標也去其惡毒之後如此法治之臍風之病有胎毒者十無一生吾見人家難於子息者所生之子多以臍風死如東垣所論紅絲瘤之事是以知之臍瘡者其帶因有所犯而落故根未斂潰腫而成瘡也宜白龍骨枯礬黃柏三味為末敷之甚妙要宜常看勿使抱裙之內有尿濕也臍突者小兒多啼所致也臍下為氣海啼哭不止則觸動氣氣動於中臍突於外理之常也其狀突出者光浮如吹起者捏按則微有聲此症鄉俗但遇婦人挑水來者即抱兒以突臍當擔頭上觸之不拘日數以臍入為度每試輒效亦良法也吾見小兒臍突者多難養由於多哭也不乳似臍風小兒生下三日之內忽有不乳者當審問之勿以不乳似臍風治也臍風有多啼撮唇之症若此無之但不乳也有吐乳乳之又吐者或因拭口不淨惡物入腹也用黃連甘草木香木瓜各少許為末每用少許納兒口中乳汁下如有啼哭不乳者此腹痛也乃胎寒症宜上方去黃連甘草加乳香沒藥以當歸湯少許調藥如上喂之如無上症無故不乳者問其母之乳汁多少有乳多者傷乳也宜少節之不久自思乳矣乳少者必有他症心誠求之變蒸證治草木逢春變化新太和元氣日熏蒸細推物理皆如是莫把芽兒作病名天地之造化陽主生長陰主收斂故草木之生長於春夏者陽之舒也收藏於秋冬者陰之慘也幼科書中變者變生五臟也蒸者蒸養六腑也以變蒸二字分臟腑論又有變蒸之後有三大蒸之說後人因之莫有覺其非者故豫直解之曰變者變易也謂兒之知覺運動以漸而發也蒸者蒸然發熱也形神變易之時真陽發舒之象也人之生也一歲而變蒸是男子八歲而真牙更十六歲而精動六十餘歲而精竭女子七歲而真牙更十四歲而經行四十九歲而經止此天地陽陰之氣其分數固已定矣其一歲之外復有三大蒸之論者誠未達其旨也若一歲之內變蒸之日似亦不可執也形有強弱氣有清濁變有遲速故形壯氣清者其變常速形弱氣濁其變常遲謂三十二日一變者乃舉其大數如是也至於形之強弱氣之清濁則又稟於父母出於造化陰陽之殊也幼科中治變蒸者發熱方用黑散子麻黃杏仁發表藥也大黃攻裡藥也表裡無邪不知此法如何而立變蒸之熱生於其中發於其外自有微汗而解按仲景論有傷寒不宜汗下之戒如是方者誤兒多矣兒當變蒸之時或有傷風或有傷食者法當治之先後補瀉不可不辨如先有所傷兒後變蒸者邪氣盛而正氣受傷當先瀉後補也先變蒸而後有所傷者正氣虛而邪氣乃湊也當先補後瀉家祕之法挾外感者宜拿捏之法以發散挾內傷者宜枳朮丸研細與之更節其乳有客忤者宜至聖保命丹薄荷湯研服或吐瀉者錢氏異功散加藿香葉共作細末蜜為丸如芡實大每服一丸米湯化下小兒變蒸過如蒸不除者調其乳母用加減小柴胡湯人參柴胡甘草麥冬生地木通陳皮等分淡竹葉水煎食後服如前法有變蒸咳嗽痰壅鼻塞聲重惺惺散要方也方見傷寒又浴法用白芷或苦參煎湯抱兒向避風處浴之有變蒸發搐者此熱甚生風亦胎驚也宜尋驚風法治之瀉肝瀉青丸瀉心導赤散如先發驚搐方治正後變蒸又發者此胎驚將成癇也勿用正法此有痰伏心中宜安神去痰錢氏安神丸主之方見心臟急慢驚風兒在母腹中只是一塊血肉耳及其生也啼聲一發然後九竅開張四肢蠕動如夢初覺之象肌骨嬌嫩又如草木萌芽之象故曰芽兒以漸壯健全賴父母之養一旦有病醫藥之助不可無之然病有三因須明辨之有因於胎毒者如丹疹瘡癰之類宜解其毒如幼嬰解毒延齡丸溯源解毒湯之類是也有因胎稟不足者如解顱五軟之類是也宜地黃丸主之有因外感風寒暑濕之氣得者謂之外因有因飲食寒熱之傷得者謂之內因有客忤傾跌湯火得之者謂之不內外因如外因者發散之內因者消導之不內外因者各從其症治之臨機應變不失其宜可也幼嬰延齡解毒丹解胎毒兒初生下便宜服之用胞衣余帶近衣者不拘長短剪下炭火上焙乾為末每一錢加甘草一錢淨黃連五分硃砂飛三分為細末用生蜜和勻分作七服每日取豆大許納兒口中以乳送下七日去其腹中之穢毒自無臍風之疾溯源解毒湯兒有胎疾乳母服之此四物湯加減也當歸川芎生地人參連翹黃連陳皮甘草木通水煎濃入竹瀝服之丹溪曰乳母致病事起於默人多玩忽醫所不知故乳母稟受之厚薄性情之緩急骨肉之堅脆德行之善惡令兒相肖為大關係不可不擇也驚風總論小兒大病是驚風急慢陰陽便不同採集前賢諸祕訣指揮後學救孩童錢氏云急驚或聞大聲或大驚而發搐發過則如故此無陰也當下之此症本因熱生於心身熱面赤嗜飲口中氣熱大小便黃赤劇則熱也蓋熱甚則生風風屬肝此陽盛陰虛也故下之以除其痰也不可與巴豆大溫藥下之恐觸虛熱不消也小兒熱痰客於心間因聞非常之聲則動而驚搐矣若熱極不聞聲及驚亦自發搐也按錢氏治之用利驚丸亦以硃砂膏代之慢驚因疾後或吐瀉脾胃虛損遍身冷口鼻出氣亦冷手足時瘈瘲昏睡露睛此無陽也按錢氏用瓜蔞湯不知其義今用調元合建中湯急慢驚陰陽異證切宜辨而治之急驚合涼瀉慢驚合溫補如不分別則誤甚矣陳氏曰小兒平常無事忽發壯熱手足搐搦眼目戴上涎潮壅塞牙關緊急身熱面赤此急驚風屬陽病在腑當治以涼如面白身無熱口中氣冷多啼不寐目睛上視項背強直牙關緊急涎潮或自汗此慢驚風屬陰病在臟當治以溫肝驚眼赤面青糞下青白心驚麵皮紅赤夜啼至晚肺驚氣喘飲水喉中痰鳴腎驚夢中咬牙睡中驚哭脾驚五心煩熱乾嘔腹脹不食又陳氏治慢驚風初去痰用芎蠍散次溫中用油珠膏後補元氣用補脾益中湯多辛燥之藥今改用沉香礞石丸以降其痰調元建中湯加附子以溫其中十全大補湯以復其元氣或用參苓白朮散潔古云急驚陽證也俱腑受病耳小兒客痰熱於心膈是少陽相火旺經云熱生風因時火盛而作蓋東方震木得火氣而發搐木火不動得風而動兩用利驚丸導赤散瀉青丸地黃丸主之搐止服安神丸乃東垣安神丸也慢驚陰證也俱臟受病耳小兒吐瀉病久脾胃虛損若不早治則成慢驚名曰瘈瘲似搐而非真搐也因脾虛損故大便不聚當去脾間風則其利自止既以失治則脾肺俱虛致肝木所乘是為慢驚也當用溫補按潔古用宣風散以導脾間之風不知其義蓋脾胃虛損豈可用牽牛大瀉元氣此不可服也用益黃散羌活膏皆犯辛熱大耗真氣之藥不如東垣之論其義最精見後東垣曰外物驚宜鎮心以黃連安神丸若氣動所驚宜錢氏寒水石安神丸大忌防風丸治風以辛溫之藥必殺人何也辛散溫浮熱火也因驚而瀉青色先治肝以硃砂之類勿犯寒涼之氣大禁涼驚丸風木旺必克脾胃當先實其土後瀉其木閻孝忠集錢氏方以益黃散補土誤矣其藥有丁香辛熱以助其火火旺土愈虛矣青橘皮瀉肺丁香辛熱大瀉肺與大腸脾實當瀉子今脾胃虛反更瀉子而助火重虛其土殺人無疑矣其風木既旺有關脈洪大掌中熱腹皮熱豈可以助火瀉金今立一方先瀉火補金大補其土之為神治之法宜黃耆湯主之乃治慢驚之神藥也即調元湯加芍藥是也丹溪曰驚風有二慢驚屬脾虛所主多死宜溫補一云溫補宜參朮煎湯下安神丸急驚屬痰熱宜涼驚一云用養血藥作湯下降火清痰丸子錢氏涼驚丸世以一概通治二證甚謬急慢發熱口瘡心肺伏熱痰熱痰嗽痰喘並用湧法重則瓜蒂散輕則用苦參末小豆末以淡豆豉湯調服吐之吐後搐定更宜防風通聖散為末蜜丸服之全嬰方云驚證因風則目青面紅發搐其病在肝因驚舌瘡面赤忽然作聲發搐其病在心因食則嗄吐氣而發搐其病在脾皆陽癇也脾胃經虛則生黏痰痰涎者脾胃所出也痰則凝滯在於咽喉如牽鋸之聲時復瘈瘲或因吐瀉所致脾虛則肺亦虛痰涎流溢其證亦然此陰癇也身熱脈浮精神恍惚或吐瀉不思乳食發搐即半陰半陽合病身熱脈沉精神倦怠或吐不瀉又能乳食發搐亦半陰半陽合病者也亦有急驚涼瀉而不愈或與吐下藥太過者變為慢驚又有慢驚溫補而不愈變為急驚者急慢驚風症有陰陽證有順逆搐有真假治有次第不可不知其候可預防者如目鮮目眩目白目青目斜目閉目轉目瞪聲實聲嗄聲戰聲輕咂口弄舌捲舌露筋噓風撮口噎乳噎食忽然定睛吐涎沫扭項搖頭仰身擦面藏頭畏明手攣手戰腳攣不伸忽撩忽亂失張失志精神恍惚睡臥不寧睡中喜笑困齧齒齦心煩躁啼哭咬人面臉色變或紅或青身舒用力呢呢作聲者已上應乃急驚之先兆也宜預防之驅風膏錢氏抱龍丸凡見搖頭斜視以手抹人昏睡喜臥額上多汗身亦黏汗其脈沉細即是慢驚之候宜急溫之調元湯建中湯定心丸主之病有陰陽急驚風屬實熱病在肝心二臟謂之陽癇慢驚風屬虛寒病在脾肺二臟謂之陰癇此以寒熱分陰陽也五臟為陰六腑為陽急驚發於六腑為易治慢驚發於五臟為難治此以臟腑分陰陽也證分順逆者男發搐目左視握拳拇指在外者為順反此者逆女發搐目右視握拳拇指在內者為順反此者逆蓋天地之道陽左陰右陽外陰內也錢氏云男發搐目左視無聲右視有聲女發搐目右視無聲左視有聲相勝故也蓋震東兌西男女之定位也震屬乙木兌屬辛金肝肺之分位也男子生於寅而左行女子生於申而右行左右者陰陽之道路也今男搐左視無聲寅乃甲之旺位乙之從甲妹之從兄也故為順而無聲右則從庚乙與庚合金木相擊而有聲也女搐右視無聲申乃庚金旺位辛之從庚妹之從兄也故為順而無聲左則從丙辛與丙合火金釘灼而有聲也活幼心書順搐散可取用之如此觀之急驚風為順而易治慢驚風為逆而難治搐有真假此錢氏論百日內發搐之證也真者不過三兩次必死假者發頻不為重真者內生驚癇假者外生風冷蓋血氣未實不能勝任乃發搐也欲知假者口中氣出熱也治之可發散按錢氏肝主病云氣溫則內生氣熱則外生外生者病在表故可治發散宜瀉青丸去大黃加天麻全蠍主之內生者病在裡乃氣動之病也周歲以後小兒宜瀉其本臟當歸龍薈丸主之治有次第初發搐時卒然昏絶牙關緊急俗用掐法灸法以醒其驚者蓋不知昏絶口噤皆痰涎壅塞之所為也輕者可掐可灸即醒重則先用嚏驚散吹鼻中嚏出可治不出則用霹靂散必醒如不嚏不醒不可治也次用開關散擦牙涎出自開然後進藥急慢同法如痰涎壅塞或吐之或利之皆非其治也蓋痰之上壅者火載而上也譬如釜中之水溢沸故云揚湯止沸不如釜底去薪今不瀉火而但吐之利之前痰雖去後痰壅塞復至矣急驚風用硃砂膏揭風湯甚則用礞石滾痰丸慢驚風用星香散甚則以礞石丸降之痰去則搐自止矣搐不止者依後法治之搐止驚退可以安也急用錢氏涼驚丸慢用溫驚定心丸此治急慢驚風始終之要藥也急慢驚風氣喘氣鳴手足冷皆不可治急慢二證貴先知風在肝經食在脾驚恐傷心神志亂觀其發搐在何時錢氏曰傷風得之口中氣出熱呵久頓悶手足搖動當發散小兒本怯者多此病也錢氏曰因食得之身體溫多睡多唾或吐不思食而搐當先定搐後安神兒因嬉戲指蟲蟻以阻之者或因啼哭扮稱異類以止之者皆能作搐蓋心藏神心主驚驚則傷神腎藏志腎主恐恐則傷志神志既傷則心腎俱虛而膽亦怯矣如此搐者若作驚搐治之誤矣宜補心腎之神志定志丸主之錢氏曰病潮熱寅卯辰時身體壯熱目上視手足搖動口內生熱涎頓悶項急此肝旺也潔古云潮熱於寅卯辰時木旺之位是肝旺也當先補腎水以制心火地黃丸後瀉肝以止其搐瀉青丸因潮熱巳午未時發搐心神驚悸目上視白睛赤色牙關緊急口內涎潮此心旺也潔古云巳午未時火旺之位而熱搐者心熱也導赤散涼驚丸錢氏方或木通散以瀉心肝之火因潮熱申酉戍時不甚搐而喘目微斜視身體似熱睡露睛手足冷大便淡黃水是肺旺也潔古云申酉戍時金旺之位而肝木強法當補脾恐被木之賊所克害當瀉心肝以挫其勢而後補肺按瀉心肝宜木通散補脾錢氏異功散治肺又小阿膠散因潮熱亥子丑時不甚搐而臥不穩身體溫壯目睛緊斜視喉中有痰大便銀褐色乳食不消多睡不醒潔古云皆因大病之後脾胃虛損多有此病故宜補脾涼心按補脾宜異功散涼心宜涼驚丸皆錢氏方按錢氏潔古論日夜發搐之證治亦有陰陽之分寅卯辰巳午未陽之位也申酉戍亥子醜陰之位也故肝心之搐多用涼瀉肺脾之搐多用溫補也他病傳來發搐多或因搐後發他疴能將脈證分虛實從本從標治不訛臍風發搐此胎毒也兒生一臘之內多啼不乳或撮唇或牙關緊或肚大或臍突發搐者此胎驚也謂之真搐生於內者氣喘痰鳴手足冷者不治詳見臍風變蒸發搐此胎病也因變蒸之後或傷風或傷乳或吃驚或發搐百日之內搐有真假說見前皆曰胎驚真搐者頻發必死假搐者少宜散風化痰安神至聖保命丹主之百日以後發搐口中氣熱此肝旺病也宜瀉青丸竹葉湯入砂糖少許化服後以至聖保命丹安神如逢變蒸之期必發搐者此胎癇也自內生者若不急治後成終身之病宜安魂鎮心定魄頻頻細與服之以不發為度祕傳三聖散主之白滑石飛兩半甘草二錢半和勻作三分用青黛一錢和勻名安魂散早以淡竹葉湯下用硃砂飛一錢和勻名鎮心散午用燈心湯下用苦梗細末和勻名定魄散晚用蘇葉湯下外感傷風發搐其病在肝即前傷風發搐也治同法如肝有風甚則角弓反張似天瘹似痙痓此有搐也宜瀉肝散風蓋足厥陰經之脈隨腎脈循脊裡上至巔頂脊旁兩行則足太陽膀胱脈也故風甚同見證也宜加減穹合湯主之如脊下客三指者不治人參柴胡黃芩杏仁去尖麻黃不去根蘆一分甘草川芎葛根升麻羌活當歸防風石膏此瀉青柴胡麻黃葛根四方加減也共為細末鉤藤湯調服傷食發搐其病在脾謂之食癇即傷食發搐病也搐甚者如前治法夭甚者宜用輕劑下之去其食熱三黃枳朮丸主之黃芩二錢黃連酒洗大黃酒煨神麯炒陳皮白朮各一錢枳實五分為末湯浸蒸餅丸百沸湯下中暑發搐一名暑風宜清暑涼心下痰安神卻暑湯主之五苓散一兩黃連末甘草末各二錢五分硃砂飛一錢半和勻蜜丸如芡實大每服一丸麥門冬煎湯下此辰砂五苓散也霍亂髮搐其病在胃此乾霍亂也神氣變亂心腹絞痛不吐不瀉所以邪氣上下不得出陳氏所謂氣逆而作搐痰聚發驚是也不急治之必死先用湧吐法宜瓜蒂散吐出積食痰散氣順後和其胃氣以藿香正氣散主之藿香紫蘇白芷各二錢厚朴姜白朮陳皮去白桔梗半夏各四分甘草炙二錢加枳實麩六分為細末薑汁調服吐法瓜蒂豬牙皂硃砂共為末每少許以淡豆豉湯服即吐吐瀉發搐者病在肝先病吐瀉後發搐者此因吐瀉不止脾虛生風乃慢驚風也治法同後但吐瀉未止又加發搐者宜參苓白朮散加肉豆蔻作丸服如先發搐後吐瀉者此因病時多服利驚之藥脾胃受傷所致宜參苓白朮散或散或蜜丸如龍眼大每用一丸米飲下如搐甚脹泄者乃遺屎也不治痢疾發搐者其病在肝先病未止而又發搐者此因誤服丁香木香豆蔻等辛熱止痢之劑太多以致內有積熱則生風也蓋肝為厥陰風木在裡則便膿血在外則為癰脹肝乃屬火反服辛熱助火之藥安得不發搐也宜用瀉青丸加黃芩黃連蜜丸甘草湯下此瀉青三黃丸二方合也如痢止後發搐者作脾虛治同慢驚風法東垣調元湯加白芍湯主之搐後變痢此表邪入里也蓋風傷脾入里則便膿血先用小柴胡湯加大黃下之後以加減龍薈丸主之當歸川芎陳皮青皮各一錢黃連酒炒黃芩酒炒各一錢半山梔仁木香各五分人參一錢炙草一錢為末別用阿膠三錢溶化作丸陳米飲下瘧疾發搐者其病在肝脾此有三證或並病者瘧至發熱則搐瘧止搐止日日如之病如是者不必治搐但治其瘧瘧退搐亦退也初起宜用劫藥風瘧小柴胡湯暑瘧用白虎湯食瘧用平胃散痰瘧用檳榔吐出其痰即愈久瘧補脾平肝宜加減平瘧養脾丸主之黃耆炙人參各一錢白朮當歸白茯苓半夏曲黃芩陳皮常山鱉甲九肋者醋炙使君子肉各一分柴胡草果厚朴姜神麯炒各七分肉桂五分青皮六分炙草五分神麯糊丸陳米湯下先搐後瘧者此肝傳脾也宜養脾平瘧丸主之先瘧後搐者脾虛損肝木乘之也為慢驚風治同慢驚咳嗽發搐者病在肝肺肝木肺金金木相搏故成此病得此者多不治但觀新久衰旺何如如初得咳嗽數十聲不止而發搐此痰盛氣逆也所謂氣逆而作搐痰聚而發驚是也宜丹溪薄荷散主之如久咳發搐者面目唇白咳而喘促此肺虛而肝木乘之也病不可治無上證者身熱而渴宜小阿膠散或搐甚者宜先補肺後瀉肝補肺以阿膠散瀉肝以瀉青丸主之如搐後咳嗽者驚痰未去也宜丹溪鎮驚丸主之以上方並見前丹毒發搐者病在少陽少陽者膽之相火也先搐後發丹瘤者此毒火自內出外也可治先發丹後發搐者毒自外入內也必死自內出者火之餘宜發散解毒及砭法防風通聖散主之或用加減升麻葛根湯桔梗乾葛升麻川芎赤芍歸尾羌活柴胡甘草各等分井水煎服此驚丹之要藥也瘡癰發搐此胎毒也小兒身生蟲疥浸淫癢痛不知用藥內服解毒之劑外用砒硫毒藥搽之瘡忽自平或不搽自平者其候腹脹便祕膚無血色目閉不開而發搐者乃惡候也急進解毒之劑瘡出方生瘡不出加喘者死雄黃解毒丸主之雄黃另研鬱金各一兩巴豆去油炒焦八錢乳香另研沒藥另研各二錢各製為末醋糊丸硃砂衣此方治諸惡病甚妙凡小兒未周歲者不問癰毒瘡疥丹瘤但發搐者皆難治脾胃嫩脆穀氣未實難以藥攻也痘疹發搐者其病在心初發熱時作搐此瘡毒欲出也宜清心安神導赤散入硃砂末調服神效瘡出搐止者吉瘡出搐不止者凶瘡正發時作搐者宜錢氏涼驚丸加硃砂主之搐不止者不治瘡結靨作搐者此非正靨乃倒靨也瘡毒陷於內乃凶惡之候急用雄黃解毒丸紫草井水煎湯下瘡復起者吉搐不止者凶搐後餘症病有搐久不止其舌黑者熱劇也內服涼驚丸外用生薄荷葉煎湯洗之舌轉紅者可治玉涵歌曰傷寒舌黑洗不紅藥洗分明見吉凶即此意也病有搐久未止大小便祕者宜八正散主之如大便四五日不通者不可利之恐損其胃氣宜豬膽汁導法通之神效病有唇內生瘡者此熱在心脾二經也內服洗心散外以柏連散加硃砂搽之神效病有日久其搐似止不止神昏有痰者不早治之必成癇證此病在心宜利驚丸主之龍膽草防風真青黛蘆薈膽星鉤藤各二錢鐵花粉牙硝各一錢硃砂飛一錢冰片麝香各少許蜜丸芡實大每服一丸金銀煎湯下病有搐時失音者宜木通湯主之木通石菖蒲防風苦梗真桑螵蛸全蠍焙炙甘草殭蠶各二錢半膽星一錢共末每服二字紫蘇三片煎湯調服病有搐後失音者此痰入心肺竅中故也如不早治必喑成廢人矣宜加減錢氏安神丸主之黃耆炙人參歸身川芎麥門冬去心石菖蒲木通炙甘草遠志去心薑汁浸焙乾各一錢寒水石一錢半蜜丸芡實大每服一丸蘇葉三片煎湯下每日取獖豬心連肺管處割一半煎湯飲之以助藥力久服神效病有搐時鼻血不止者此肺熱症肝乘肺也又有心火上炎者以心火乘肺也宜瀉心肝之火硃砂涼膈丸主之黃芩黃連山梔仁連翹桔梗甘草人參各等分薄荷葉減半硃砂飛為衣蜜丸芡實大麥冬湯下病有搐後目不明者此肝虛也地黃丸主之病有餘熱不退者當察其虛實治之如身壯熱面赤唇燥大小便不利此熱為實因服補脾之藥太早宜小柴胡湯加大黃主之如面㿠白大小便自調唇潤者此虛熱也宜清心丸主之人參麥冬茯苓柴胡防風炙甘草各一錢硃砂飛五分蜜丸芡實大金箔十片為衣每服一丸淡竹葉湯下一病後發熱喘咳者當察其虛實治之如身熱飲水鼻乾唇燥脈疾有力者此熱在心肺為實宜從小便利之寧肺散主之桑白皮炒葶藶子炒赤茯苓車前子山梔仁各等分炙甘草減半薑棗引煎服如面㿠白不熱不渴此虛也阿膠散主之病後肌膚消瘦精神昏憒者此驚疳也宜安神丸主之茯神去心蘆薈琥珀黃連赤茯苓各三錢膽星遠志甘草湯煮曬乾蝦䗫灰各一錢石菖蒲使君子肉各一錢山藥煮糊丸燈心湯下病後食少形瘦者宜補脾和中丸主之錢氏異功散一兩加青皮砂仁使君子各一錢另取神麯作糊為丸陳米湯下凡病搐止後宜補胃參苓白朮散或蜜為丸甚效凡病搐後以養心安神定志丸主之方俱見前癇驚自心生風自肝凡因病後見癇癱急求妙手施方法父母因循作廢殘癇者其候卒然忽倒四肢強直目閉或翻上不轉口噤或有咬其舌者口中涎出或有無涎者面色或青或白或作六畜聲其狀不一乃小兒之惡候也一時即醒如常矣其發也或以旬日計或以月計或以年計古人有三癇五癇之名證治太多又與急慢驚同論似無一定之說故後學不知其所從也雖有論者不過依樣畫葫蘆耳愚不自惴強為辨之所謂三癇者原其得病之因也所謂五癇者敘其病發之狀也驚久成癇癇者慢驚風之變症也不然何以小兒之發搐者皆有治法而發癇者至終身更無治法耶管見如是惟高明者擇之癇之所起由於父母之因循醫之無遠慮也且如初發搐時或有不治自愈者或有因掐法而愈者父母喜之見其易退兒無他苦恬不加意或有頻發之時不過請醫掐之請巫禱之而已不知求上智之醫以斷之乃為終身不治之症此父母之過也其為醫者當初起病之時如風癇則發之食癇則下之驚癇則安之幸其病退以為能也及其再發不過仍用前法更不思有結痰在心以致沉疴為終身之病此醫之過也治癇之法幼科所載其方甚多而無可取者也惟錢氏五色丸寶鑑琥珀壽星丸及甘遂豬膽湯和蘇丸三者誠治癇之要藥也今豫本此三法新立一方屢試屢驗如神乃名為斷癇丸黃連礞石石菖蒲硃砂珍珠鐵花粉膽星各五分甘遂三分沉香二分茯苓二錢共末熬膏為末別用人參一錢白朮三錢煮糊為丸芡實大每用一丸取獖豬心一個劈開入藥在內將線扎住長流水煮熟取出丸子研細燈心湯調下以豬心及汁與兒食之三日服一丸又宜常服參砂膏以通心氣硃砂五錢牙硝雄黃飛二錢半麝香一錢金銀箔各十五片真白附子枳殼麩各三錢川芎白茯苓各四錢人參黃連遠志肉各二錢前五味另研勻後七味共末和勻蜜丸芡實大每服一丸用麥冬煎湯下此硃砂膏加減也癇之為病乃痰迷心竅之所致也初病之時便宜服通竅化痰鎮心之劑醫者慮不及此執用平日治驚之法父母不肯早治淹延年久其狀如癡如健忘者終不可治也常見在火水而卒發者後致夭傷亦多矣胎癇由兒在母腹中受驚氣得之生來便有是病者不可治也按大無雲一小兒周歲因長老摩頂受記僧人念咒恐懼發搐痰涎有聲目多白睛強項背一時許方醒安後見皂衣人即發多服犀珠腦麝鎮墜之藥已四年餘此症尚在又添行步動作神思如癡診其脈沉弦而急針經云心脈洪大癇瘈筋柔病久氣弱多服鎮墜寒涼之劑復損其氣故添動作如癡先灸兩蹻各二壯然後服藥後肝脈小急蓋小兒神氣尚弱因而被驚神思無依又動於肝肝主筋故瘈瘲筋攣立方名沉香天麻湯經曰恐則氣下精怯而上焦閉以羌活獨活之苦溫引氣上行又入太陽為引故用以為君天麻防風辛溫以散火甘草當歸辛甘溫以補氣血之不足故養脾氣是以為臣附子川烏益智大辛溫行陽退陰又主助胃腎主五液入脾為涎以生薑半夏燥濕化痰沉香辛溫體重氣清去怯安神故以為使錢氏云一小兒吐瀉諸醫藥下之至虛變慢驚手足瘈瘲而身冷醫復與八正散口不能食而胃中虛故利大小便即死久則脾腎俱虛常身冷而目閉必用益黃散四君子丸補脾遂能飲食又不愈以地黃丸補腎一月而安引此一事以為治癇者之法灸法按針經云癲癇瘈瘲不知所苦兩蹻男陽女陰潔古云晝發灸陽蹻中脈穴夜發灸陰蹻照海穴各二七壯癱者手足或攣曲強直或軟緩無力不能舉動或左或右其人目視不正口中流涎語言蹇澀因受風寒之氣得之未得發散初病搐時日久不醒以致風濕之氣深入筋骨後雖搐止手足之病未平如五軟五硬之狀父母因循不知早治遂成廢疾治癱之法當視其在左在右在左者為血虛其治在肝肝主筋肝血虛則筋無所養故筋急拘攣強直宜補腎地黃丸主之乃虛則補其母也山藥山茱萸酒洗取肉熟地各三錢獨活川續斷酒洗茯苓丹皮澤瀉各二錢手不利加肉桂足不利加牛膝手足俱不利並加之各二錢蜜丸空心溫酒下此地黃丸加減法也在右者為痰其治在脾脾主四肢手足為痰涎流注經絡故手足緩而不能舉也宜補脾行痰大補丸主之炙黃耆人參白朮白茯苓炙甘草當歸酒川芎白芍酒炒半夏泡陳皮各二錢川烏炮三分酒糊丸薑湯下此十全大補湯加減也更灸曲池三里絶骨肩髃各二七壯若口眼逆向一邊者灸頰車穴左灸右右灸左即止驚風諸證兒多異病狀如癇莫作真搐一例看家祕幼科皆有法非人勿示泄心傳天瘹似癇天瘹者壯熱驚悸眼目翻騰手足搐掣或哭或笑喜怒無常甚者爪甲皆青紫之狀此肝病也但不睡臥耳宜解利風邪則愈鉤藤散主之鉤藤白茯苓各五分大黃包煨二分半防風硃砂蟬蛻羌活獨活青皮甘草各三分末姜蜜調服此瀉青丸加減也又方用鉤藤人參犀角屑各五分炙甘草天麻全蠍各二分半為末薄荷湯調服內瘹似癇內瘹者腹痛多啼唇黑囊腫傴僂反張眼內有紅筋斑黑者也此肝病也但不昏困耳乃受寒氣所致先是內臟抽掣極病狂叫則泄瀉縮腳腸痛而啼內瘹一過外證抽掣又來內外交攻極難調理須分內外用藥治之內瘹甚者宜乳香膏主之乳香五分沉香一錢為極細末蜜丸如梧桐子大每服二丸用石菖蒲鉤藤煎湯下又方木香丸沒藥茴香木香炒各等分鉤藤同上全蠍乳香各半分先研乳香另放後研上諸藥為末取蒜少許研和勻為丸梧桐子大每服二丸酒下按此二方治內瘹之要藥也內瘹甚者宜鉤藤丸主之鉤藤白茯苓各五分天麻防風硃砂飛蟬蛻羌活獨活青皮炙甘草各二分半除硃砂另研余為末水煎調硃砂末服按天瘹內瘹二證百日內小兒多有之此二者皆肝之病也蓋厥陰肝經內行於小腸外行於背故外感傷風熱則為天瘹內傷寒冷則為內瘹故曰天瘹者陽也內瘹者陰也病有盤腸腹痛似內瘹者乃小腸氣痛也亦令腹痛作啼傴僂腰曲干痛多啼額上有汗此小腸為冷氣所搏然耳宜用和平溫氣之劑川楝子散主之眼內無紅筋黑斑囊不腫者木香小茴香鹽炒去鹽各一錢川楝肉二錢用巴豆二粒炒去豆共末酒調服客忤似癇小兒神氣怯弱外邪客氣獸馬異物暴觸而忤之其候口吐青黃白沫水穀鮮雜面色變異喘急腹痛反側瘈瘲狀似驚癇脈來弦急而數視其口中懸雍在左右若有小腫核即以竹針刺潰或以指甲摘破治之當辟邪正氣散驚安神久延則難為力也古方作客忤及中惡者急作醋炭服蘇合丸此方治客忤中惡之要藥也全按客忤者謂客邪之氣忤其兒之正氣也論其所忤不但外邪之氣與人物之氣自鼻而入乃外因之客忤也聞見之驚自心而生乃內因之客忤也然邪之所湊其氣必虛小兒神氣既虛故易動耳邪有微甚治有輕重幼科混同論之所謂辨之未辨者矣夫癇則病發而困忤則病發而醒此似癇而非癇也若發而困亦真癇矣豫特表而出之按手指三關紋經曰脈候若深青情知四足驚赤因水火得紅色是人驚此治客忤者以此辨養小兒之法詳見前卷育嬰四要中凡小兒客忤中惡諸病皆父母及抱養者之過也或因生人遠來忤者或因六畜忤者或因戲冷水忤者皆外生者也人物之氣自鼻而入上衝巔頂經曰五氣入鼻藏於心肺肺主皮毛心主血脈頂巔之上諸陽之所會也邪中之即病矣宜用沐體法塗囟法治其外吹鼻法搐之內服對證之藥以扶正氣為主正氣勝則邪氣自退也並用釀乳湯病時睡不醒醒而喜睡者忤之微也宜發散惺惺散人參白朮白茯苓炙甘草桔梗天花粉各等分細辛減半一方加防風川芎各等分水煎薄荷葉引微汗妙浴體法治客忤中惡自利諸證有邪者當宜浴之川芎蒼朮白芷藁本零陵香各等分長流水煎去渣向無風處浴之浴後睡片時塗囟法治客忤白虎證伏龍肝散灶心黃土一錢雄黃五分麝香少許棗肉和丸捏作餅子如錢樣四圍出囟一分囟門上安餅取艾作小炷灸三壯搐鼻法一名救苦散治傷風寒頭目不清並客忤川芎藿香藜蘆各三錢玄胡索牡丹皮硃砂飛各二錢為極細末少許吹鼻得嚏則邪氣出矣如病時客忤症悉具者此忤之甚也宜表裡發散攝生飲安神驚氣丸主之攝生飲治一切卒中大小科同南星包煨木香半夏泡各一錢半北細辛生蒼朮石菖蒲甘草各一錢為末每用生薑同水煎調驚氣丸服驚氣丸治驚憂積氣又受風邪發則牙關緊急涎潮昏塞醒則精神如癡又可治癇木香白殭蠶白花蛇肉酒洗焙橘紅去白天麻麻黃去根節鐵花粉各半兩全蠍二錢半蘇子一兩膽星半兩硃砂飛二錢半腦麝少許另入此許學士方也蜜丸芡實大每服一丸癇用薄荷金銀湯下以上治外中客忤之法如抱兒騎馬或父母騎馬遠歸未及換衣薰衣即抱其兒或戲抱兒在馬鞍上坐得病者此名馬客忤或聞馬嘶著驚者取馬尾燒煙燻兒面頻熏以醒為度如見生人異扮人或六畜跳躍異者或鬼神惡狀者或迅雷擊鼓一切大聲使兒成客忤者此內生之病也宜安神去痰不爾病根日深但見聞原忤之例即發兒成癇矣抱龍丸主之水銀二兩鉛一兩五錢溶化入水銀製死以柳枝燒成珠又入硃砂末乳香末各一兩在內乘熱用柳木槌擂勻為丸芡實丸大每一丸空心井花水下服後令睡不可驚動或作小丸服亦妙此錢氏五色丸加減也如見平常慣熟之人喜啖之果玩戲之物有所不得則忤其意但見神昏不食即其病也宜順意更與之及服安神之劑沉香丸主之人參五分白朮陳皮去白枳殼麩桔梗青礞石硝煅金色各一兩炙甘草沉香各五分硃砂飛一錢黃連一錢半神麯糊為丸黍米大麥冬湯下小兒客忤者吾以為父母之過有所喜者乃戲而奪之則怒而哭矣有所畏者乃戲而嚇之則恐而驚矣夫失所喜者思則傷脾遇所畏者驚則傷心因循而成癇誰之過哉中惡似癇此客忤之甚者乃小兒危惡症也其候因初中惡毒心腹刺痛腹皮青黑不能啼息悶亂欲死古方治此先用皂角末吹鼻急服蘇合香丸全按中惡與尸厥同但腹不鳴心腹俱暖也此有二證幼科未辨有中惡毒之氣自鼻而入心肺受之故忽然倒地四肢厥冷兩手握拳不能喘息也有中惡毒之物自口而入腸胃受之故心腹刺痛腹皮青黑悶亂欲死者先用霹靂散搐鼻令醒進藥仍以殺鬼丸房內燒之以熏百鬼惡氣霹靂散治卒惡死者牙皂三分細辛川芎白芷各五錢羊躑躅花一分半雄黃二分麝香少許共末每用少許燈心三寸長蘸點鼻內噴嚏為驗殺鬼丸雄雌黃各二兩牯羊骨虎頭骨各一兩龍骨鱉甲鯪鯉甲刺蝟皮各三兩樗雞十五枚無即以芫青五枚代之川芎白蒺藜鬼臼禹餘糧東門上雄雞頭一枚用蠟二十兩為丸梧子大門口房內燒之男左女右臂上帶一丸可闢百鬼如中惡毒之氣即死者宜返魂湯主之即仲景麻黃湯也麻黃去根節三錢杏仁去皮尖七個炙甘草一錢水一盞煎半盞分開細服如中惡毒之物卒死者宜雄黃解毒丸主之方見驚風又方通治中毒用降真香白膠香沉香虎頭骨鬼臼龍膽草人參白茯苓雄黃各五錢麝香一錢煉蜜丸芡實大乳香湯下或令兒佩帶一丸即燒臥房妙兒忽大叫一聲而悶絶者亦中惡例不治白虎似癇白虎者流年白虎神太歲後五位是所占之方不可犯也小兒變蒸未滿者乳母無知抱兒向其方頑戲更觸犯之使兒不精爽兩目視物不轉手如數物此客忤之輕者也宜用浴體法更以殺鬼丸房內燒之使兒聞其煙又取伏龍肝搗醋和丸球大摩兒頭及五心效鄉俗婦人以雞子一枚遍身摩之送糞地埋之亦禳法也邪祟似癇汗濯兒衣不可夜露恐為雎鳥落羽所汙染觸兒身未有不為癇者其後面色變異見人羞怕宜常用前浴體法房中燒殺鬼丸又以囊盛一丸掛兒背上男左女右宜辟邪丸主之人參白茯苓炙甘草使君子肉夜明砂乾蟾灰各一錢沉香五分雄黃飛硃砂飛各一錢黃連一錢五分麝香少許豬膽汁和粟米糊為丸黍米大每服二十一丸至三十五丸米飲下馬脾風似癇小兒肺脹喘溺胸高氣逆兩脅扇動鼻張悶亂嗽喝聲嗄痰涎潮塞俗謂之馬脾風者宜雄黃奪命散主之黑白醜各兩半取頭末半兩大黃檳榔各半兩木香三錢為末三歲者服二錢溫水調服涎多者加輕粉少許方見丹溪附余蟲痛似癇小兒本怯致胃虛冷則蟲痛而心痛口中沫及涎水出發痛有時但目不斜手不搐也宜木香化蟲丸主之檳榔一錢木香鶴蝨貫仲錫灰乾漆炒盡煙使君子肉各五分輕粉二錢巴豆肉雷丸各二錢半飛羅面作糊為丸五更米飲下痓痙似癇其症項背強直腰身反張搖頭掣手瘈瘲噤口不語發熱腹痛鎮目不醒病在足太陽經其候有二如面紅眼赤牙緊手張痰涎壅甚昏憒煩渴小便赤澀先譫語而發者此剛痙也宜小柴胡加大黃湯方見前如大便滑泄不渴不語手足先冷而發者此柔痓也宜理中加桂枝湯主之理中湯加桂枝白芍水煎服
