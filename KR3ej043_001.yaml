body:
  text: 卷之一十三科古來醫有十三科分例分門證治多何事幼科門例少豈因難治廢吟哦大方脈科小方脈科婦人科傷寒科風科眼科口齒咽喉科瘡腫科針灸科正骨科金鏃科祝由科養生科以上一十三科分門分例詳悉俱備惟小方脈一科錢陳二先生外不多見也蓋小兒初生只是一塊血肉耳雖有神臟形臟有其具而未能用也百日之後知覺運動以漸而生至於有疾口不能言脈無可診名曰啞科一二三歲口雖能言而胃氣未實經脈未滿其脈難辨故曰子生三年然後免於父母之懷其有疾也而欲治之則腸胃脆薄不勝湯丸榮衛微弱難施針灸四歲以後諸病與大人同但藥劑小耳驚疳痘疹四證當別論之經曰不能察其幼小者謂冠壯易明童稚難治也育嬰四法集成篇博採諸書盡格言人欲求嗣能讀此何憂丹桂不森森嗟夫世之求嗣者惟知問命卜禱鬼神而不知當務之為急也余嘗集廣嗣紀要列例十條一修德二寡欲三擇配四調元五感孕六保胎七護産八育嬰九風水十祈禱求嗣之道盡矣今集育嬰家祕又分四目一曰預養以培其元二曰胎養以保其真三曰蓐養以防其變四曰鞠養以慎其疾預養者即調元之意也胎養者即保胎之道也蓐養者即護産之法也鞠養者即育嬰之教也二書之論並行而不悖也有志求嗣者合而觀之篤信而守之則桂子森森厥後其昌矣預養以培其元一孕元立本章云易曰大哉乾元萬物資始至哉坤元萬物資生有生之初雖陽豫之正育而充必陰之主因形移易日改月化無非神道之代終也天之德地之氣陰陽之至和相與流通於一體能順時數謹人事勿動勿傷則生育之道得矣昧者曾不知此乃拂自然之理謬為求息之術方且推生死於五行祈補養於藥石以僞勝真以人助天雖或有子孕而不育育而不壽者多矣昔人論年老有子者男不過盡八八女不過盡七七則知氣血在人固有自量豈外陰陽之定數哉出大全良方凝形殊稟章云易曰男女媾精萬物化生天地陰陽之形氣寓焉其稟賦也體有剛柔脈有強弱氣有多寡血有盛衰皆一定而不易也以至分野奠域則所産有多寡之宜吉事有祥則所夢各應其類是故荊楊薄壤多女雍冀厚壤多男熊羆為男子之祥虺蛇為女子之祥是皆理之可推也同上娠子論云昔有人以婦人無子問西京常器之者乃曰女人自少多病服燥藥無節使天癸耗動且早夭終身無子又有問袞伯宋大亨者亦然同上按道藏經云有床子法云婦人月信初止後一日三日五日值男女旺相日陽日陽時交合有子多男若男女稟受皆壯則多子一有怯弱則少子同上按道藏經云有床子法云婦人月信初止後一日三日五日值男女旺相日陽日陽時交合有子多男若男女稟受皆壯則多子一有怯弱則少子同上褚氏遺書曰男女交合二情交暢陰血先至陽精後沖血開裹精精入為骨而男形成矣陽精先入陰血後參精開裹血血入居本而女形成矣陰陽均至非男非女之身精血散分駢胎品胎之兆父少母老産女必羸母壯父衰生男必弱古之良工首察乎此補羸女先養血壯脾補弱男則滋腎節色氣之偏瘁與之補也東垣云李和叔問中年以來得一子至一歲以後身生紅瘤不救後生四子一二歲皆病瘤而死何緣至此翌日見之謂曰汝乃腎中伏火精氣中多有紅絲以氣相傳生子故有此疾俗名胎瘤是也試觀之果如其言逐以滋腎丸數服以瀉腎中火邪補真陰不足忌酒辛熱之物其妻以六味地黃丸以養陰血受胎五月之後以黃芩白朮二味作散啖五七服後生子前證不復作矣按東垣先生此論誠求子之要百世不可易也丹溪云無子之因多起於父氣之不足豈可獨歸於母血之虛寒況母之血豈止於虛與寒而已哉無子多因血少不能攝精俗醫率從子宮虛冷投以熱劑如泰桂丸之類煎熬臟腑氣血沸騰禍不旋踵按丹溪先生此論誠可為婦人服熱藥子之戒全按易曰天地絪縕萬物化醇設使陰陽偏勝則不能成變化而生萬物矣男女亦然故男之無子者責精之不足也女之無子者責血之不足也精氣之不足腎實主之六味地黃丸其要藥也補腎地黃丸熟地八兩乾山藥四兩山茱萸肉四兩澤瀉四兩牡丹皮去心肉蓯蓉酒洗去鱗甲三兩共為細末煉蜜為丸如梧桐子大每五十丸空心食前服淡鹽湯送下今人不知此理男女喜服壯陽之藥以快其欲如附子陽起石鹿茸硫黃沉香母丁香之類女子喜飲暖宮之藥亟欲生子如桂枝吳茱萸沉香附子之類以致自誤終身無生反成熱中內則津液消耗為消渴祕結之類外則經脈壅滯為癰疽之發也生子之道不在於藥石也設使情欲之感不節變合之神不交雖湯丸兢進無益也必於平日男子清心寡欲以養其精女子忍性戒怒以養其血至於交合之時男悅其女女悅其男兩情欣洽自然精血混合而生子也胎養以保其真二娠子論云夫至精才化一氣方凝始受胞胎漸成形質子在腹中隨母聽聞自妊娠之後則須行坐端嚴性情和悅常處靜室多聽美言令人講讀詩書陳說禮樂耳不聞非言目不觀惡事如此則生男女福壽敦厚忠孝賢明不然則生男女多鄙賤不壽而愚頑此所謂因外象而內感也昔太妊懷文王耳不聽惡聲目不視惡色口不出惡言世傳胎教之道此之謂也妊娠三月名胎始當此之時血不流行形象始化未有定儀見物而變須知端正嚴莊當令母見貴人不可見狀貌醜惡人也欲生男宜操弓矢乘牡馬欲生女宜著珥璫施環珮欲子美好宜玩白璧視孔雀欲子賢能宜看詩書務和雅吾見鄙俗婦人懷胎時看搬傀儡裝神像舞猴戲者後來生子貌多肖之胎養之法有所謂轉女成男者亦皆理之自然也如食雄雞取陽精之全於天産者帶雄黃取陽氣之全於地産者操弓矢藉芩芹取陽物之見於人事者氣類潛通造化祕密必於三月兆形之先儀象未具陽可以勝用變女為男理固然也氣質生成章云具天地之勝集萬物之靈陰陽平均氣質完備成具自爾然而奇偶異常有衍有耗剛柔異用有強有羸血榮氣衛不能逃於消息盈虛之理則稟賦之初詎可一概而論是以附贅垂疣駢母枝指侏儒跛躄形氣所賦有如此者瘡瘍癰腫矇聾喑啞瘦瘠㽻瘵形氣之疾有如此者然則胚胎造化之始精通氣變之後保衛輔翼固有道矣按此條稟賦之症除瘡瘍屬胎毒皆稟賦之偏不可治矣天有五氣各有所湊地有五味各有所入所湊有節適所入有度量凡所畏忌悉當戒懼慎物以為養者理固然也以致調喜怒節嗜欲作勞不妄而氣血從之皆所以保攝妊娠使諸邪不得干焉苟為不然方稟受之時一失調養則內不足以為守中外不足以為強身氣形弗充而疾病因之如食兔唇缺食犬無聲食雜魚而疥癬之囑皆以食物不戒之故也心氣被驚而顛疾腎氣不足而解囟脾胃不和而羸瘦心氣虛乏而神不足之類皆以氣血不調之故也全嘗由此推廣之兒在母腹中借母五臟之氣以為養也苟一臟受傷則一臟之氣失養而不足矣如風則傷肝熱則傷心與肺濕則傷脾寒則傷腎此天之四氣所傷也酸多則傷肝苦多則傷心甘多則傷脾辛多則傷肺咸多則傷腎此地之五味所傷也怒則傷肝喜則傷心思則傷脾憂則傷肺恐則傷腎此人之七情所傷也是以風寒暑濕則避之五味之食則節之七情之感則絶之皆胎養之道也若夫勿登高勿臨險勿獨處暗室勿入廟社勿恣肥甘之味勿啖瓜果之物勿犯禁忌之方所以調護輔翼者各有道也如不利嗣息或驕倨太甚者動必成咎雖鄰家有所興修亦犯其胎氣令兒破形殞命如刀犯者形必傷泥犯者竅必塞打驚者色青黯繫縛者相拘攣如此諸例驗於形影可不慎哉妊婦有疾不可妄投藥餌必在醫者審度病勢之輕重藥性之上下處以中庸不必多品視其病勢已衰藥宜便止則病去於母而子亦無殞矣全嘗集女科凡孕婦無疾不可服藥設有疾只以和胎為主其疾以末治之中病即已勿過用劑也故孕婦之病宜柴胡和胎飲主之柴胡和胎飲柴胡黃芩君條實沉水者佳白朮君無油者佳二味乃安胎之聖藥當歸身酒洗白芍臣陳皮甘草紫蘇莖葉佐挾傷風者加葛根蔥白挾傷食者加枳殼神麯挾傷熱者加知母石膏胸滿者加枳殼桔梗腹滿者加大腹皮胎中痛者加枳殼砂仁漏下血者加阿膠陳艾葉如方加減不可輕忽水煎食前服婦人有孕至八九月間宜服丹溪達生散庶免難産之症大腹皮酒洗一錢人參陳皮各五分白芍白朮當歸各一錢甘草炙二錢上細切作一服入姜七片蔥五葉水煎服春加防風川芎夏加黃芩黃連五味子秋加澤瀉冬加砂仁臨産之時胞漿已破急進祕傳催生如聖散以免難産即五苓散加車前子順取長流水煎服蓐養以防其變三蓐養之時順而易者無苦也設使逆而難者必得穩婆之老慣熟謹慎輕便者輔翼調護之苟非其人則母子之免於患者亦罕矣回氣捷法兒才生下即氣絶不啼哭俗名悶臍生即寤生也必是難産或冒寒所致急以綿絮包裹抱懷中不可斷臍帶且將胞衣置火上鍋銚滾水中煮之仍以熱水於臍帶抹之使暖氣由臍入腹須臾氣回啼哭如常方可浴洗斷去臍帶今鄉俗見寤生者即連呼其父乳名縱有醒者如兒寐中呼喚驚醒也拭口時法兒初生穩婆急以綿裹指拭兒口中惡物令淨方可浴穢若不急拭啼哭一聲咽下則生百病矣然倉卒之際或有不及如法者古人有甘草法黃連法朱蜜法用之殊佳其法臨月預備甘草一錢切煎以綿裹指蘸甘草汁拭其口中令淨次用黃連細切五分捶碎綿裹放甘草沸湯中同浸泡湯如上法拭口拭畢更用硃砂大豆許研極細入蜜螺殼許和之拭兒口中然後以乳乳之此葛稚川真人時方也非獨能解惡穢之毒亦可安神免瘡疹驚風之疾又祕方取兒胞衣上臍帶一二寸許焙為末五分黃連末二分半硃砂末一分共研用蜜和當生下三日內抹兒口中令咽之以解胎毒名曰育嬰解毒延齡膏又方兒生下一日之內用甘草一節長炙透切細以水二合煮取一合以綿裹指蘸汁點兒口中約一蜆殼吐出胸中惡汁待其飢渴更與之若兩服不吐盡一合止則小兒智慧無病浴兒法臨産時預取豶豬膽一枚以水七升煮取四升澄清浴兒令長大及終身永無瘡疥如兒生下浴水未到且以綿絮包裹暖抱大人懷中浴湯須調和若冷熱失宜則令兒驚亦致五臟疾矣雖浴出亦當暖之雖遇夏月亦未可去其綿絮以乍出母腹不可令冒寒氣也兒生三日浴用五枝湯桃柳棘梅槐各取嫩枝加苦參白芷煎湯去渣澄清入豬膽汁浴之不生瘡疥斷臍法兒生下浴後方可斷臍口咬最好或以火燎而斷之或以剪放火燒熱剪之斷後艾炷從斷處燒三壯令暖氣入腹可免臍風之疾斷臍後用蘄艾杵爛和綿絮包護其臍勿令犯脫使寒濕之氣入之則成臍風內瘹之疾斷臍後或臍已落未乾時或傷於風濕或尿在抱裙之內必成臍風內瘹腹痛誤兒命矣慎之慎之哺兒法兒生下後産母乳汁未行必擇乳母年壯體厚乳汁濃白者以乳之可也産母乳汁既行必須揉而捏去之此乳不可哺也積滯之氣恐損兒也凡兒吮乳初則乳汁漸行其來尚緩而少久則如泉湧出急而且多急取出之恐兒氣弱吞咽不及錯喉噴吐傷胃氣也兒生七日助穀神以導達腸胃用粟杵爛煮粥飲與乳母日與一二匙吃或用粳米研爛亦佳刮泡法兒生後十日之內常抱嚮明處視其口中懸癰上齶有小泡子如珠堆積者急用銀挖耳刮去之或以手指甲刮去之任以軟綿拭去惡血煎甘草湯洗之不然則泡落成疾不可救矣通便法兒初生後大小便不通腹脹欲絶者急令婦人以溫水漱口亟吸咂兒前後心並臍兩手足心共七處每一處凡三五次漱口吸咂取紅赤為度須臾自通不爾無生意又古方用皂角燒存性研為細末煉蜜作丸如棗核樣內穀道中即通貼囟法兒生後鼻塞氣倨吮乳不得者用天南星一錢北細辛五分共為細末生薑汁生蔥汁共調成膏塗貼囟上自愈牛黃法兒生三日去驚邪除惡氣用真牛黃大豆許細研以後蜜加酸棗許共研勻以綿蘸之與吃一日令盡鞠養以慎其疾四養子須調護看成莫縱馳乳多終損胃食壅即傷脾衾厚非為益衣單正所宜無風頻見日寒暑順天時丹溪曰人生十六歲以前氣血俱盛如日方升如月將圓惟陰常不足故童子裳不裘帛前哲格言裳下體之服帛溫軟甚於布也裘皮衣溫軟甚於帛也蓋下體主陰得寒則陰易長得溫暖則陰暗消是以下體不與絹帛夾厚溫暖之服恐陰氣受傷是為確論小兒始生肌膚未實不可暖衣暖甚則令肌膚緩弱宜頻見風日若不見風日則肌膚脆軟易得損傷當以父母著過破絮舊衣勿加新綿天氣和暖之時宜抱向日中嬉戲數見風日則血凝易剛肌膚堅實可耐風寒不致疾病若藏於帳幃之內重衣溫暖譬如陰地草木不見風日軟脆不任風寒當以薄衣但令背暖薄衣之法當初秋習之不可卒減其衣否則令中風寒所以從秋初習之者以漸稍寒如此則必耐寒冬月但著兩薄襦一復裳耳若不忍見其寒適當略加耳若愛而暖之適所以害之也又當消息勿令汗出如汗出則表虛風邪易入也晝夜寤寐當常慎之丹溪曰小兒氣血俱盛食物易消故食無時然腸胃尚脆而薄若稠黏乾硬酸鹹辣甜一切魚肉瓜果酒面燒炙煨炒但是發熱難化之物皆宜禁絶只如生栗乾柿熟菜白粥非惟不能縱其口且可養其德蓋生栗味鹹柿乾性涼可以養陰之助然栗大補柿大澀俱為難化亦宜少與婦人無知惟務姑息畏其啼哭無所不與積成痼疾雖悔何及所以富貴驕養有子多疾按陳氏曰小兒宜吃七分飽者謂節之也小兒無知見物則愛豈能節之節之者父母也父母不知縱其所欲如甜膩粑餅瓜果生冷之類無不與之任其無度以致生疾雖曰愛之其實害之丹溪曰乳子之母尤宜謹節飲食下咽乳汁便通情欲動中乳脈便應病氣到乳汁必凝滯兒得此乳疾病立至不吐則泄不瘡則熱或為口糜或為驚搐或為夜啼或為腹脹病之初來其溺必少便須詢問隨證調治母安子亦安可消患於未形也小兒啼哭正甚其母強以乳哺之啼哭未息逆氣未定被乳所阻乳又被氣滯積於胸中便成疾也吐瀉噎痢腹痛痞滿疳癆之病從此起矣小兒在腹中賴血以養之及其生也賴乳以養之乳積血所化也未及一歲之後不可便以肉果啖之胃薄脾脆不能消化也乳者飲食之津液其母亦當淡滋味一切酒面肥甘之熱物瓜果生冷之寒物皆當禁之苟不知禁氣通於乳猶兒食之以成寒熱之病乳母之過也凡乳母大醉後勿乳大勞後勿乳大怒後勿乳房事後勿乳有熱病勿乳其子啼哭未止勿乳睡未醒勿乳飽後勿乳夜間母必起坐床上抱起兒乳之勿側臥乳乳後抱其子使其身直恐軟弱傾側致乳溢出也不爾皆令兒病陳氏養子十法云一要背暖二要肚暖三要足暖四要頭涼五要心胸涼六勿令忽見一非常之人七脾胃要溫八兒哭未定勿使飲乳九勿服輕朱十宜少洗浴大凡小兒冬不可久洗浴則傷冷夏不可久浴浴則傷熱頻浴則背冷而發驚若遇熱時以軟絹蘸湯拭之可也小兒臍帶未落時不可頻浴浴則水入臍中臍風撮口皆從此起小兒神氣衰弱忽見非常之物或見未識之人或聞雞鳴犬吠或見牛馬禽獸嬉戲驚嚇或聞人之叫呼雷霆銃爆之聲未有不驚動者也皆成客忤驚癇之病蓋心藏神驚則傷神腎藏志恐則志失大人皆然小兒為甚也凡小兒嬉戲不可妄指他物作蟲作蛇小兒啼哭不可令人裝扮欺詐以止其啼使神志昏亂心小膽怯成客忤也不可不慎小兒玩弄嬉戲常在目前之物不可去之但勿使之弄刀劍銜銅鐵近水火見鬼神耳小兒能言必教之以正言如鄙俚之言勿語也能食則教以恭敬若褻慢之習勿作也能坐能行則扶持之勿使傾跌也宗族鄉黨之人則教以親疏尊卑長幼之分勿使諜嫚言語問答教以誠實勿使欺妄也賓客往來教以拜揖迎送勿使退避也衣服器用五穀六畜之類遇物則教之使其知之也或教以數目或教以方隅或教以歲月時日之類如此則不但無疾而知識亦早矣凡小兒專愛一人懷抱見他人則避之此神怯弱也抱之則喜放之行坐則哭者此氣虛弱也喜食甘味腹有蟲也小兒周歲有病者勿妄用藥調其乳母可也不得已而用必中病之藥病衰則已勿過其則也幼科有拿掐法者乃按摩之變也小兒未周歲者難以藥餌治誠宜之則可以治外邪而不能治內病也能治小疾及氣實者如大病氣虛者用之必誤兒也為父母者喜拿而惡藥致令夭折者是誰之過歟父母常將幼子憐幾因愛恤取愁煩育嬰家祕無多術要受三分飢與寒人之無子者置姬妾覓方術問命卜禱鬼神其心勞矣及其生子愛恤之深保養之失過於熱也熱則生風過於飽也飽則成積醫不擇良藥或犯毒不可救也柳子種木傳云雖曰愛之其實害之所以取闢也諺云若要小兒安常受三分飢與寒飢謂節其飲食也寒謂適其寒溫也勿令太飽太暖之意非不食不衣之謬說也頭要清涼背要溫露其下體養真陰天時勿犯如春候寒熱乖違客氣侵此言適其寒溫之法也頭者六陽之會常要涼不可纏裹腹為陰背為陽皆臟腑之俞募也常要和暖不可使露小兒純陽之氣嫌於無陰故下體要露使近地氣以養其陰也天時者即寒熱也春者溫和之氣萬物皆賴以生長也謂襁褓之中寒不犯寒熱不犯熱常如春氣溫和時以長養兒之身體若有乖違寒熱之客氣來侵矣乳為血化美如飴肉谷雖甘更亂真到得後來能食日莫教縱恣損脾陰此言節其飲食之法也兒在母腹之時賴血以養既生之後飲食之乳亦血之所化也雖有穀肉不可與之以亂其腸胃中和之氣至於能食猶當節之不可縱其所好以快其心因而致病者多矣內經曰飲食自倍腸胃乃傷不可不慎也耳目之神寄在心異聞異見易生驚痰生氣逆因成癇恨煞終身作廢人初生小兒未與物接卒有見聞必驚其神為父母者必慎之可也若失防間致成驚癇為終身之痼疾有子何益醫不執泥曰上工能知富貴與貧窮生來氣體分清濁居來看承又不同人有恆言富貴之子多病者其氣清其體薄而過於飽暖也貧賤之子少病者其氣濁其體厚而常受飢寒也上智之醫識得此意觀父母而知其氣稟之厚薄觀形色而知臟腑之虛實猛峻之藥不可妄加和平之方亦不可執用也人之受病者有富貴貧賤之殊自天地視之皆其所生者也無一人不養焉則無一人不愛矣醫者仁術也博愛之心也當以天地之心為心視人之子猶己之子勿以勢利之心易之也如使救人之疾而有所得此一時之利也苟能活人之多則一世之功也一時之利小一世之功大與其積利不若積功故曰古來醫道通仙道半積陰功半養身小兒初誕多胎疾能食過多為食積於斯二者作提綱仲陽復起從吾議小兒之疾如痘疹丹瘤臍風變蒸斑黃蟲疥解顱五軟之類皆胎疾也如吐瀉瘧痢腫脹痞積疳癆之類皆傷食之疾也惟發熱咳嗽或有外感風寒者故曰小兒之疾屬胎毒者十之四屬食傷者十之五外感者十之一二驚癇原來肝有餘脾常不足致疳虛形體不全知腎弱上醫會得謹其初大抵小兒脾常不足肝常有餘腎主虛亦不足也故小兒之病驚風屬肝疳癆屬脾胎氣不足屬腎上醫治病必先所屬而預防之故曰不治已病治未病家傳三法家傳三法救孩童驚癇須防用抱龍胎稟怯時宜補腎肥兒痼病有奇功治癇用琥珀抱龍丸治疳用肥兒丸治胎稟不足用補腎地黃丸此三方者祖訓相傳子孫敬守抱龍丸解抱者養也龍者純陽之物蓋震為龍東方乙木也為少陽之氣時至乎春乃萬物發生之始氣也乙者肝木也肝為風木初生小兒純陽無陰龍之象也肝為有餘少陽之氣壯也肝主風小兒病則有熱熱則生風上醫慮之制此方以平肝木防驚風此抱龍之名義錢氏抱龍丸壯實兒宜用之然內有雄朱金石之藥不可服如麝香之耗真氣能引風邪入里如油之入面不得出也故人皆禁之不可用也琥珀抱龍丸內用補益之藥人皆喜而用之然有枳殼枳實二味能散滯氣無滯氣者能損胸中至高之氣如急慢驚風及元氣弱者減去此二味可用當歸川芎各二兩代之然琥珀天竺黃二味須擇真者錢氏抱龍丸治傷風瘟疫身熱昏睡氣粗痰實壅嗽又治驚風潮搐及蠱毒者盛暑沐浴後並可服壯實小兒宜時與服之雄黃二錢半飛辰砂五錢另研天竺黃一兩膽南星四兩麝香五分共為末煮甘草水為丸皂角子大溫水化下百日兒每丸分作三服琥珀抱龍丸理小兒諸驚四時感冒風寒濕痰邪熱至煩躁不寧痰嗽氣急及瘡疹欲出發搐並宜可服真琥珀天竺黃檀香細銼人參去蘆白茯苓各一兩半粉甘草去節三兩枳殼麩炒枳實麩炒各一兩硃砂飛五錢膽南星一兩山藥一斤去黑皮金箔百片取見成藥末一兩同在乳鉢內研極細杵仍和前末用上為末和勻取新汲井水為丸如此樣大粒陰乾每服用薄荷湯化下肥兒丸小兒脾胃素弱食少而瘦或素強健偶因傷食成積而瘦或因大病之後而瘦者宜服之人參白朮各二錢陳皮白茯苓去皮各一錢半甘草炙木香砂仁青皮神麯炒麥芽炒使君子肉各一錢山藥蓮肉去心各二錢桔梗一錢共為細末荷葉浸水煮粳米粉為丸米飲下此參苓白朮散加減以治疳病將成之聖藥也腹中有癖者加三稜莪朮各煨九肋鱉甲醋炙各一錢半有熱者加北柴胡二錢黃芩黃連蘆薈乾蟾燒存性各一錢半瘦太甚者加當歸川芎各二錢泄瀉者加肉豆蔻麵包煨訶子肉各一錢疳瘦食少者去麥芽神麯乳母須求不病人擇其體厚性和平不貪口腹無淫欲鞠養何求子不成養子之道當擇乳母必取無病婦人肌肉豐肥性情和平者為之則其乳汁濃厚甘美瑩白溫和於子有益如病寒者乳寒病瘡者乳毒貪口腹者則味不純喜淫欲者則氣不清何益於子故宜遠之幼科精熟是專門壽夭平時認得明色脈合觀知五臟補虛瀉實藥通神古語云三折股肱為良醫謂歷練熟也故幼科精專者凡小兒之壽夭先了然於目中矣病不可治必不可治也至於臨病之時觀形察色便知五臟之證治所以補之瀉之意之所生有通神之妙也辨小兒壽夭小兒壽夭最難明只在良工眼力精形氣有餘為壽相如其不足豈遐齡小兒壽夭須觀形氣如形實氣實者此稟氣有餘為壽相無病易養如形虛氣虛者此稟氣不足為夭相多病難養蓋兒之生也受氣於父成形於母父母俱強者則形氣有餘父母俱弱者則形氣不足父強母弱則氣有餘父弱母強則氣不足而形有餘也大抵壽夭窮通聰明愚癡皆以預定豈能逃乎小兒所稟全賴父母之餘氣以長形質故肥不可生瘦瘦不可生肥大小與父母不等則難養也雖初生多患若形體相稱則壽也小兒面舒轉首遲滯稍費人雕琢者壽之兆也若小兒預知人意身輕力弱者難養也古人有言譬如梅花早發不睹歲寒甘菊晚榮終於年事故知晚成者壽之兆也若小兒陰小而黑與身相等者可養之子若陰大而白者難養也若小兒形體弱頭面多青脈精神昏瘁者難養若小兒剛悍眼目俊朗神氣爽健發紺而澤者壽之相也若小兒精神實則少病故易長成也若形瘁而多病者難養也若小兒黑珠少白睛多面色㿠白者非壽之相也縱長不及天年若青珠大而白睛少面色黑形不淡者亦要觀其眼中黑白分明表裡相稱曰壽曰康若黑珠動搖光明閃爛縱長亦應目疾壽亦不及四旬也頭圓背厚腹如垂目秀眉清鼻準齊耳角分明口方正腎堅肉實體豐肥頭者髓之海也腎主骨髓頭圓則腎足矣背者五臟之所附也背厚則五臟安矣腹者水穀之海也腹大則水穀盈矣目者肝之竅耳者腎之竅鼻者肺之竅口者脾之竅七竅無闕則形全矣脾主肉肉實者脾氣足也肝主筋筋強者肝氣足也腎主骨骨堅者則腎氣足矣腮妍發紺形表端二便調和裡氣安腳健項肥囊緊小肌膚溫潤更紅鮮腮妍如桃發黑如漆此表實也小便長大便潤此裡實也腳者身之柱也柱壯而強則身不撓項者頭之莖也項長而肥則頭不欹囊者宗筋之會也囊黑而小如荔枝者壽肌肉者榮衛之所舍也溫潤紅鮮則榮衛宣暢而氣血足矣性靜神安狀若愚自然精彩與人殊樂然後笑不多哭若到眠時不久噓英華不露神氣內藏此非凡兒相也心主笑不妄笑者心氣足也肺主哭不多哭者肺氣足也又哭氣不絶連綿者肺氣實也脾主睡睡不久者脾氣實也此上三條皆壽相也其兒無病而易養也頭破露縫眼露睛鼻乾唇縮口流津發稀項軟腓腨小滿面紛紛青紫筋諸陽皆會於頭頭破則陽上衰矣諸陰皆起於足腓腨者足肚肉也小則陰下衰矣鼻為肺竅鼻乾則肺氣衰矣唇口為脾竅唇縮流津脾氣衰矣發為血餘發稀則血衰矣項為天柱項軟則柱折矣青紫之筋皆風熱之候散見於面必多驚癇之病形枯色夭缺火晶肚大筋浮瀉利頻蟲疥浸淫多叫哭見人語笑弄精神形枯色夭者此表虛也瀉利無時者此裡虛也疥瘡啼哭多笑語者皆陽火妄動之候此上三條皆夭相也其兒多病而難養辨小兒形色小兒有病觀形色青主驚風紅主熱黃為傷食白主疳若中惡時其面黑肝主風其色青心主熱其色紅脾主谷其色黃白者氣血不榮於面也故主疳黑者凶色也故主中惡氣色須看何部中心主正額火光紅左頰木肝右金肺頦為腎部鼻脾宮此以五形分部位也肝屬木東方故於左頰候之肺屬金西方故於右頰候之心屬火南方故於額上天庭候之腎屬水北方故於頦下地閣候之脾屬土中央故於鼻準候也肝病須觀眼目中脾唇心舌自相通肺有病時常在鼻腎居耳內認其宗此以五竅分五臟也肝之病見於目心之病見於舌脾之病見於唇肺之病見於鼻腎之病見於耳各隨寒熱虛實決之目揚面赤熱生風眉皺呻吟腹痛攻面腫色黃知癖疾發稀面白有疳蟲肝主風目揚者肝病也揚者直視也心主熱面赤者心病也風熱相搏必生驚搐人有痛則眉皺而呻吟訣云痢疾眉頭皺腸中痛脾主濕濕勝則腫面腫色黃故知脾病宿食成積積久成癖疳者津液不足之病也發稀面白血之虛也疳病多蟲下痢應嫌面貌妍驚風面赤亦堪憐咳嗽面白為真色青繞唇傍青紫筋訣云瀉不定精神好者死風病面如塗朱者死咳久不止面㿠白者肺之真臟色見也小兒疾厄命宮尋虎口三關食指紋欲知死生無錯誤不離五色認分明命宮謂山根也小兒山根斷絶青紅紫黑筋橫攔者多病難養相法云山根青色出胎頻見災危是也男左女右手指橫紋初節曰風關中節曰氣關三節曰命關謂之虎口紋青主驚赤主熱黑主水其紋曲向內者病在內曲向外者病在外其紋初節止者病輕上至次節者病重過三關者死下大上小者吉下小上大者凶要知虎口氣紋脈到指看紋分五色黃紅安樂五臟和紅紫依稀有損益紫青傷食氣虛煩青黑之時證候逆忽然純黑在其間好叫醫人心膽寒若也直上到風關粒米短長分兩端如槍沖射驚風至分作枝叉有數般弓反里順外為逆順逆交連命似難叉頭長知猶可救如此醫師仔細看辨小兒脈息小兒未損天真氣指下脈來宜有力大滑數實最為良細澀遲虛終不吉脈大者氣實也脈滑者血實也六至為數脈來有力皆稟賦有餘之脈也脈細者氣虛也脈澀者血虛也三至為遲虛則無力皆稟賦不足之脈也小兒壽夭以此辨之一息六至號平和八至之說不可憑四至以下虛冷憊八九十至熱生驚小兒之脈一呼三至一吸三至謂之一息六至乃和平無病之脈也訣云八至為平和脈者勿從一息四至曰離經三至以下謂之損脈為虛冷疳癆之病一息八至曰離經九至以上謂之至脈為實熱驚風之病辨小兒脈證治上醫色脈盡須明虛實證治如法行有一乖違即不中為兒作禍犯天刑內經曰能合色脈可以萬全蓋上醫之治小兒也以色合脈以脈合色實則瀉之虛則補之不違其制萬全之道也且如兩腮紅者色實也脈急數者脈實也大便祕小便黃渴不止上氣急足脛熱者實證也有此三實者宜以寒涼之藥瀉之所謂不可服熱藥者有七也如面㿠白者色虛也脈微沉者脈虛也糞色青腹虛脹嘔乳見眼珠青足脛冷虛證也有此三虛者宜以溫熱之藥補之所謂不可服寒藥者有七也今之粗工色脈證治茫然無知妄作湯丸夭兒性命天必譴之藥必對證無差錯中病即已勿太過待其來復真氣生食養盡之無補佐謂此治病之要術也色脈證治瞭然在心故以寒治熱以熱治寒實則瀉之虛則補之皆對病之方藥也服藥之後中病即已勿過其制者即內經大毒治病十去其三小毒治病十去其五無毒治病十去其七之法也內經曰及其衰也待其來復謂病衰其半即止其藥以待其真氣之發生又以乳食之養助其發生之氣諺云藥補不如食補者是也粗工不知此理攻寒令熱寒未退而內熱已生制熱令寒熱未除而中寒又起欲求其適安可得乎夭札之由必始於此此條治法亦吾吃緊為人處小兒用藥擇其良毒藥毫釐不可嘗邪氣未除真氣損可憐嫩草不耐霜良謂氣味平和無毒之藥也毒謂猛峻蝕利瞑眩之藥也故小兒之病實則瀉之如瀉青導赤瀉白瀉黃之類虛則補之如安神異功阿膠地黃之類如涼驚治熱理中治癇抱龍治病肥兒治疳之類皆和平無毒之劑此吾家祕傳之良方也如巴豆牽牛雖未嘗不用亦不敢專用也豫見今之行幼科者以硇砂治積輕粉治痰以砒治瘧以硫治寒皆是大毒之藥小兒之腸胃嬌脆安能當此毒也小兒汗下勿輕嘗實實虛虛必損傷寒熱誤投如太過溫中解毒有奇方按仲景治傷寒法云不應汗而汗之者為斑疹驚惕汗不止之證所謂桂枝下咽陽盛則斃也不應下而下之者為痞滿腹痛吐瀉腸滑不止之證所謂承氣入胃陰盛乃亡也小兒有病不可下不熱自汗兼自瀉神困囟陷四肢冷乾嘔氣虛神怯怕吐蟲面白髮焦穗疳瘦潮熱食不化鼻塞咳嗽及虛痰脈細腸鳴煩躁呀若將有積與疏通是謂虛虛誠可怕孩兒實熱下無妨面赤睛紅氣壯強脈上弦洪肚上熱痄腮喉痛尿如湯屎硬腹脹脅肋滿四肢浮腫夜啼長遍身生瘡肚隱痛下之必愈是為良如誤服寒涼藥過多者以致脾胃虛弱胃脘痛宜溫胃散主之陳皮黃耆炙各七錢砂仁甘草炙厚朴薑汁炒益智仁各四錢白豆蔻仁澤瀉乾薑炮薑黃各三錢人參二錢共為細末每服五分至一錢水煎去滓食前溫服如誤服熱藥太過者以致煩躁悶亂或作吐或狂或渴宜先解毒緑豆粉飲主之緑豆粉一兩黃連炙乾葛甘草生各半兩三味共為末同緑豆粉杵勻每服五分至一錢淡豆豉湯溫調服如小兒病驚多用藥性太溫及熱藥治之有驚未退而別生熱證有病愈而致熱證者有反為急驚者甚多當問病家因何得之曾以何藥調之可用解毒之藥無不效也以豆卷散主之貫衆板藍根甘草炙大豆黃卷以水浸黑豆生卷是也曬乾各一兩共為末服五分至一錢水煎去渣服芽兒嫩小不耐傷針灸湯丸莫妄嘗破肉損筋成瘦疾壞腸敗胃作餘殃初生小兒內外脆薄藥石針灸必不能耐也良工當以愛其己子之心而愛人之子憐惜之撫摩之未可輕治為兒作禍也書曰如保赤子其愛養之謂歟為父母者不可不知病來發熱不惺惺不信醫師信鬼神龍術祝由真人訣未聞牲殺解病驚經曰惑於鬼神者不足與言至德故有信巫不信醫之戒祝由科龍術所傳乃移精變氣之術如禱鬼神之事徒殺牲耳何益哉病不可治對人言病可醫時用意專三法始經常記憶勿傷脾胃反成愆古語云病不可治即宜早告不可隱忍遭人恥笑誠哉是言也其病可治視人之子如己子調護保養無所不至可也然有三法初用猛法以攻病之藥去之不可惡攻而愛補反助其邪為兒之害中用寬猛相濟病久不除乳食必少脾胃失養於補脾藥中加攻病藥看兒強弱加減末則用寬法兒病既久久則成疳只以補脾胃為主正氣完則邪氣自盡矣五臟證治總論五臟之理與五臟之方真萬氏獨步是病皆從五臟生不知臟腑亦徒然細將色脈相參合對證裁方治不難五臟平和則病不生或寒暑之違和或飲食之失節則風傷肝暑傷心寒傷肺濕傷腎飲食傷脾而病生矣語其色則肝青心赤脾黃肺白腎黑也語其脈則肝弦心洪脾緩肺毛腎沉也語其證則肝主風心主驚脾主困肺主喘腎主虛也語其治則心肺脾三臟有補有瀉肝則有瀉無補腎則有補無瀉也色脈證治本諸五臟心中了了謂之上工五臟之中肝有餘脾常不足腎常虛心熱為火同肝論嬌肺遭傷不易愈人皆曰肝常有餘脾常不足豫亦曰心常有餘肺常不足有餘為實不足為虛內經曰邪氣盛則實真氣奪則虛此所謂有餘不足者非經云虛實之謂也蓋肝之有餘者肝屬木旺於春春乃少陽之氣萬物之所資以發生者也兒之初生曰芽兒者謂如草木之芽受氣初生其氣方盛亦少陽之氣方長而未已故曰肝有餘有餘者乃陽自然有餘也脾常不足者脾司土氣兒之初生所飲食者乳耳水穀未入脾未用事其氣尚弱故曰不足不足者乃穀氣之自然不足也心亦曰有餘者心屬火旺於夏所謂壯火之氣也腎主虛者此父母有生之後稟氣不足之謂也肺亦不足者肺為嬌臟難調而易傷也脾肺皆屬太陰天地之寒熱傷人也感則肺先受之水穀之寒熱傷人也感則脾先受之故曰脾肺皆不足肝臟證治肝為風木主生風形證昭然在目中雖然瀉之無用補少陽生氣與春同肝者足厥陰風木也木生風故主風錢氏云肝主風實則目直視大叫呵缺頓悶項急虛則咬牙多缺氣熱則外生氣濕則內生此肝病之證也肝之竅在目故有病常以目候之如肝有風則目連劄肝有熱則目直視肝疳則白膜遮睛之類是也又肝主筋肝病則筋急為項強為搐搦牽引肝主怒病則性急大叫哭甚則為卵腫俗呼氣卵是也肝在下焦熱則大小便難肝藏魂肝熱手尋衣領及亂捻物甚則撮空摸床此喪魂之病也肝病錢氏有瀉青丸一方而無補者謂其氣有餘也然肝乃少陽之氣所以養生者也肝無病固不可瀉以伐生氣亦不可補以助長也肝膽原來從火治木中有火無人識水不能勝號龍雷惟有甘溫差可制肝膽之病從火治者木中原有火燧人氏傳云知空有火麗木則明此其驗也肝膽之火水不能滅寒不能勝又謂龍雷之火惟甘溫之劑如人參甘草之類可以制之也故曰甘能瀉火也內經曰辛以散之如川芎防風之類又曰辛甘發散為陽以辛甘之藥合而用之所謂火鬱則發之此治肝病之大略也肝熱以瀉青丸當歸蘆薈丸瀉之肝實同法肝虛以六味地黃丸補之肝乃腎之子虛則補其母也肝寒以溫膽湯及吳茱萸生薑之類兒病目視物不轉睛者或斜視不轉者或目合不開或目開不合或哭無淚或不哭淚自出者皆肝絶也瀉青丸治肝熱急驚搐搦錢氏云氣溫則內生氣熱則外生謂口中之氣也此方治氣熱則外生急搐之症羌活大黃包煨川芎山梔子仁膽草當歸防風各等分煉蜜為丸雞頭子大每服半丸至一丸竹葉湯同砂糖溫水化下當歸龍薈丸治腎水陰虛風熱蘊積時發驚悸筋惕搐搦神志不寧榮衛壅滯頭目昏眩肌肉瞤瘈胸膈咽嗌不利腸胃燥澀躁擾狂越詈罵驚駭火熱等症錢氏云氣溫則內生驚搐者此方主之當歸龍膽草大梔子黃連黃柏黃芩各一兩大黃蘆薈溫青黛各半兩木香一錢麝香五分蜜丸如小豆大薑湯下每二三十丸六味地黃丸見後腎臟溫膽湯治心膽虛怯觸事多驚亦治水氣怔悸半夏制枳殼制白茯苓各一兩橘紅一兩半甘草炙五錢銼和勻每服三錢半姜七片棗三枚刮竹青一塊如錢大水煎服或加制遠志尤妙不睡者膽寒也加酸棗仁炒若喜睡者膽熱也酸棗仁生用心臟證治心為神舍易生驚色脈相通惡熱侵實則避嫌惟瀉腑如虛叢脞要安神內經曰心者君主之官神明出焉兒之初生知覺未開見聞易動故神怯而易生驚也錢氏云心主驚實則叫哭發熱飲水而搐虛則困臥悸動不安此心病之證也心主血脈色者血之萃脈者心之合也如色見紅潤脈來大數者此心氣有餘之象其兒易養如色見昏黯脈來沉細者此為不足其兒多病難養此觀其形色脈以知其心中之虛實也心惡熱與風相搏則發搐故肝生風得心熱則搐也心屬火火盛則津液干而病渴心藏神熱則神亂而臥不安喜合面睡臥者心氣熱則胸中亦熱欲言不能而有就冷之意故合面臥心氣實則氣上下行澀合面則氣不通故喜仰臥有努其身而直伸者謂之上竄亦心熱也舌者心之苗熱則舌破成瘡又為重舌木舌舌長出不收之病內經曰諸痛癢瘡瘍皆屬於心火兒病瘤丹斑疹龍纏虎帶蟲疥瘭瘡皆心火之病也錢氏治心熱病以導赤散夫導赤乃瀉小腸之藥也心為君主不可犯之瀉其腑者以避嫌也心虛則主不安故以安神丸補其臟也心為君主豈容邪客熱來侵事可嗟瀉實補虛有成法何須方外覓靈砂心為火臟常苦緩散而不收孫真人立生脈散夏月取之以五味子之酸能收耗散之氣也治兒心病者擴而充之可也故心熱病生於內者宜導赤散瀉心湯東垣安神丸之類生於外者如口舌生瘡洗心散主之心氣虛者錢氏安神丸虛易驚者琥珀抱龍丸內經曰以苦瀉之黃連是也以咸補之澤瀉車前子是也神氣浮越多驚悸者宜硃砂赤石脂龍骨以鎮之如心病久汗出發潤或舌出不收或暴啞不語或神昏憒亂或斑疹變黑此皆心絶之候不治導赤散治心熱及小便赤夜啼生地木通甘草炙各等分共為粗末每用二錢水一盞入淡竹葉七片同煎至五分食後溫服錢氏安神丸治邪熱驚啼心疳面黃煩赤壯熱麥冬焙馬牙硝白茯苓寒水石甘草各五錢硃砂一分龍腦一錢蜜為丸雞頭子大每服半丸砂糖水化下不拘時候東垣安神丸內經曰熱淫所勝治以甘寒以苦瀉之以黃連之苦寒去心煩除濕熱為君以生地甘草之甘寒瀉火補氣滋生陰血為臣以當歸補血之不足硃砂納浮游之火而安神明也甘草五錢五分黃連淨酒洗六錢當歸去蘆二錢五分生地一錢五分上四味為細末湯浸蒸餅為丸如黍米以硃砂五錢另研水飛為衣每服十五丸或二十丸津唾咽下食後或溫水或涼水少許送下亦得此近而奇偶制之緩也瀉心湯實熱宜服黃連淨一兩為末每服一字至五分一錢臨臥時溫水調下洗心散治壯熱煩躁風熱壅塞大小便閉澀口舌生瘡大黃包煨甘草炙當歸芍藥麻黃不去節荊芥穗各三分白朮七錢五分共為末每服二錢五分生薑薄荷少許同煎食後服琥珀抱龍丸見家傳立法內脾臟證治幼科方中脾病多只因乳食致沉疴失飢失飽皆成疾寒熱交侵氣不和內經曰脾胃者倉廩之官謂為水穀之所聚也兒之初生脾薄而弱乳食易傷故曰脾常不足也錢氏云脾主困實則困睡身熱飲水虛則吐瀉生風此脾病之證也脾屬土其體靜故脾病喜困土主濕濕傷則為腫為脹為黃為吐瀉不止則成慢驚風內經曰土氣之下木氣承之土為坤土坤為腹故脾病則腹中痛脾疳則肚大筋青也脾之竅在口唇脾有風則口喎唇動熱則口臭唇瘡寒則口角流涎謂之滯頤氣不和則口頻撮脾主舌本熱則吐舌弄舌脾主肉脾虛則瘦大肉折脾主味脾虛則不喜食脾熱則食不作肌膚傷於食則成積積久則成癖脾主津液脾熱則口乾飲水虛則津液不生而成疳也脾與胃異同論蓋胃受谷脾消穀也調其脾胃者當適其寒溫節其飲食也故飽則傷胃飢則傷脾熱則傷胃寒則傷脾胃愛清涼脾愛溫難將脾胃一般論陰陽相濟和為貴偏熱偏寒不可憑脾喜溫而惡寒胃喜清涼而惡熱喜惡不同故難拘於一法也蓋脾胃屬土居中以應四傍其立法也必四氣俱備五味調和而後可四氣者謂寒熱溫涼也五味者謂酸苦甘辛咸也辛甘溫熱為陽酸苦鹹寒為陰氣味合而服之謂之陰陽相濟得其中和之法也如偏熱則傷胃偏寒則傷脾非中道也錢氏立方以益黃散十二補脾東垣老人謂其偏熱而以異功散代之其慮深矣祖訓錢氏諸方法當遵守惟脾胃一條吾於脾熱者瀉黃散胃熱者人參白虎湯脾胃寒者理中湯丸脾胃虛者異功散調元湯人參白朮散養脾丸傷食者消積丸保和丸宿食成積者枳朴大黃丸濕勝者胃苓丸欲成疳者肥兒丸已成疳者集聖丸此吾家祕之法也不可輕泄如脾病久大肉消削肚大青筋或口噤不開或唇口開張或遍身虛腫或腳背腫眼下胞腫或吐瀉不止飲食不入或睡則露睛口開不合或多食而瘦口饞喜啖甜物或蟲出於口或唇騫而縮此皆脾絶之證也不可治益黃散陳橘皮一兩青橘皮訶子肉甘草炙各五錢丁香二錢為粗末每二錢水一盞煎六分食前溫服按益黃散治脾胃寒濕太甚神品之藥也以補脾胃之虛則誤矣東垣云丁香辛熱助火火旺土愈虛矣青橘皮瀉肺丁香大瀉肺與大腸脾實當瀉子今脾虛反更瀉子而助火重虛其土殺人無疑故以異功散代之病非嘔吐腹痛瀉利青白不可服錢氏異功散溫中和氣治吐瀉不思飲食凡治小兒虛冷病先與數服以正其氣人參茯苓去皮白朮甘草炒陳橘皮各等分為末每一錢水一盞姜五棗三引煎食前溫服調元湯此平肝木益脾土瀉邪火補元氣之要藥也黃耆炙二錢人參一錢甘草炙五分銼細末水煎食遠服養脾丸健脾消食甘草炙麥芽炒枳實炒各五錢白朮一兩陳皮七錢五分半夏曲青皮厚朴薑汁炒神麯炒各五錢為極細末薄荷葉浸水煮粳米粉作糊為丸米飲送下此枳實丸變化法也胃苓丸補脾胃消積退熱解渴祛瘧疾止吐瀉去腫脹乃幼科之要藥也蒼朮制陳皮澤瀉白朮白茯苓各一兩豬苓甘草各七錢厚朴二錢半共為末水煎麵糊為丸補脾胃常服米飲下祛瘧退熱竹葉炒陳米煎湯下腫用五加皮燈芯長流水順取煎湯下小便黃白鹽湯下參苓白朮散治脾胃虛弱飲食不進或嘔吐瀉利大病後補助脾胃此藥極妙人參白朮山藥白扁豆去殼薑汁浸炒各一兩五錢甘草桔梗薏苡仁蓮肉各一兩半共為細末棗湯調服瀉黃散治脾熱弄舌藿香葉七錢山梔仁一兩石膏五錢甘草七錢半防風四兩共銼用酒蜜微炒香為末水煎溫服人參白虎湯瀉胃火此治大熱大渴之聖藥也石膏君知母臣甘草佐粳米使㕮咀水煎待米熟去渣溫服保和丸治一切飲食所傷胸腹飽悶不安或腹中有食積痞塊多服日漸消散脾胃虛者勿服山楂肉五錢神麯炒半夏湯泡各三兩茯苓陳皮去白蘿蔔子炒連翹發蘖面炒各一兩為細末別用生神麯五兩入生薑汁一小盞水調打糊為丸每服白湯或米飲送下此方脾胃虛者服之虛虛之禍疾如反掌蓋山楂一味大能克化食物若胃中無食脾虛不運不思食者服之則克伐之氣勝故云然也家傳保和丸治氣虛傷食者傷食之病有二小兒素強者偶被飲食所傷此食傷脾胃也宜用上丹溪保和丸治之如脾胃素弱者飲食略多便成內傷此脾不能傳化宜服此方以助傳化之職也參白朮去蘆各三錢白茯苓去皮一錢半甘草炙山楂肉麥芽神麯炒各一錢為細末另用神麯水煎作糊為丸加減保和丸消痰利氣扶脾胃進飲食治痢疾山楂神麯炒半夏湯泡七次茯苓去皮各三兩陳皮連翹蘿蔔子各二兩白朮五兩蒼朮米泔浸去粗皮枳實各一兩香附酒浸去皮厚朴薑汁炒各二兩黃芩云腐酒浸炒黃連去須酒浸炒各一兩共為末薑汁煮麵糊為丸每食後服水湯下祕傳保和丸治小兒五疳及痢吐瀉肚大青筋面黃肌瘦疳積等證神效白朮泔浸土炒三兩神麯炒木香檳榔茯苓三稜各一兩莪朮一兩半使君子厚朴薑汁炒青皮甘草炙各一兩蒼朮茅山二兩陳皮去白枳實去穰麩炒人參砂仁炒黃連豬膽制麥芽炒益智炒肉豆蔻制去油藿香白豆蔻各五兩共末煉蜜為丸龍眼大每服一丸用清水磨化送下嘔吐薑湯下肉積加山楂一兩喘加蘿蔔子一兩泄加豬苓澤瀉各一兩如無他症只服本方神效保和丸有四丹溪保和丸乃二陳湯加消導藥氣實者宜用之家傳保和丸乃異功散加消導藥氣虛者宜用之加減保和丸乃丹溪保和丸加平胃散枳朮丸也惟久積有熱者宜用之祕傳保和丸又上加減保和丸家傳保和丸相合變化也久積成疳者宜用之臨病之工擇而用之可也枳實大黃丸見後積症肥兒丸見家傳三法集聖丸見後疳症肺臟證治肺為嬌臟原主氣寒熱蒸侵其氣逆熱壅胸高喘不寧虛羸氣短難報息肺最居上為臟腑之華蓋口鼻相通息之出入氣之升降必由之路故主氣錢氏云肺主喘實則悶亂喘促有飲水者有不飲水者虛則哽氣長出氣此肺病之症也難經曰形寒則傷肺兒之衣太薄則傷寒內經曰熱傷肺兒之衣太厚則傷熱寒熱傷肺則氣逆為喘為咳鼻者肺之竅肺受風則噴嚏鼻流清涕受寒則鼻塞呼吸不利受熱則鼻乾或為衄血肺疳則鼻下赤爛肺主皮毛肺虛則皮乾毛焦病喘咳者喘不止則面腫咳不止則胸骨高謂之龜胸變驚者死證也肺屬金其體燥病則渴不止好飲水謂之膈消真膈肺氣與天通藥用清陽以類從肺實麻黃強瀉白阿膠虛補有奇功內經曰天氣通於肺輕清為天清陽出上竅本乎天者親上也故治肺病者宜用辛苦升浮之藥如苦酸必用酒炒使上升也錢氏立方肺實者以瀉白散葶藶丸虛者以阿膠散祖訓云其法太簡肺主喘咳因於寒者麻黃湯為主因於熱者以瀉白散肺熱在胸者以東垣涼膈散渴飲水者人參白虎湯咽喉痛者甘桔牛蒡子湯咳有痰者玉液丸肺虛甚者調元湯肺乃脾之子虛則補其母也或加以生脈散其法始備如肺久病咳嗽連綿喘息不休或肩息或龜胸或咳血不止或咳而驚或鼻乾黑燥或鼻孔張開而喘或瀉痢不休大吼如筒或面目虛浮上氣喘逆此皆肺絶之候不治瀉白散治咳嗽而後喘面腫身熱桑白皮蜜炒黃地骨皮焙洗等分甘草炙減半上㕮咀入粳米同煎食後服葶藶丸治乳食沖脾傷風咳嗽面赤身熱痰甚喘促者甜葶藶去土隔紙略炒黑牽牛炒杏仁去皮尖炒黃另研雙仁者殺人漢防己各等分為末入杏泥取蒸陳棗肉和搗為劑丸如麻子大每服五丸至七丸淡生薑湯乳食後或臨臥服量兒加減此方因乳食沖脾痰甚者及壯實小兒可用之苟不因乳食所傷而痰甚者如怯弱者宜去牽牛加真蘇子炒各等分為丸阿膠散治久咳嗽肺無津液阿膠一兩五錢蛤粉炒黍黏子二錢半炒馬兜鈴半兩炙甘草一錢杏仁七分去皮尖糯米一兩為粗末煎食後溫服小阿膠散治風熱痰涎潮熱喘促搐掣竄視透明阿膠炒二錢半紫蘇一錢為末每服一錢入烏梅肉少許同煎灌下神效熱出於肺熱則生風阿膠清肺行便故也肺風用之尤效麻黃湯玉液丸兩方見後咳嗽調元湯見前脾臟東垣涼膈散見後發熱人參白虎湯見前脾臟甘桔湯治涎熱咽喉不利甘草炒二兩桔梗泔浸二時焙乾用一兩半加牛蒡子炒五錢為末每服入阿膠少許水煎食後溫服生脈散此孫真人所立方使人夏月常服人參麥冬五味子三味見大人科中暑門腎臟證治天一真精聚命門人無天脈水無根內行骨髓宜堅固一水難勝二火焚腎屬水乃天一真精之所生也人之有腎猶木之有根其脈在尺腎之虛實以尺脈候之命門在腎之間為元氣聚會之處兒之強弱壽夭尤繫於斯全主實無虛也腎氣不足則下竄蓋骨重惟欲下墜而縮身腎水陰也腎虛則目畏明兒本虛怯由胎氣不成則神不足目中白睛多其顱即解色㿠白此皆難養或有因病而致非腎虛也此屬病之證也腎主骨腎虛者骨髓不滿也兒必畏寒多為五軟之病尻骨不成則不能坐臏骨不成則不能行齒乃骨之餘骨不余則齒生遲腎之液為血發乃血之餘腎虛則發稀不黑腎之竅在耳腎虛則耳薄熱則耳中出膿腎主齒熱則生疳即走馬疳也腎開竅於二陰腎熱則大小便不通腎冷則小便下如米泔二火者乃君相火也經曰一水不勝二火者正此謂也陰常不足腎常虛筋骨難成貌必癯錢氏立方惟有補經云瘡疹瀉其餘水為陰火為陽一水不勝二火此陽常有餘陰常不足腎之本虛也明矣故錢氏只用補腎地黃丸一方不敢瀉者因無實證也或謂痘疹腎不可實當瀉之此言甚謬蓋腎主液痘中之血化為水水化為膿皆腎之津液所化也若無腎水則瘡枯黑而死矣豈可瀉之痘疹曰歸腎者蓋瘡疹之毒內發於骨髓外發於皮毛者為順變黑復陷入於骨髓之中故為害此非順之為害也乃火旺水衰之病錢氏以百祥丸牛李膏治黑陷者以瀉腎中之邪非腎中之真陰也詳見痘疹心要腎熱大便不通者宜以豬膽汁導之豬者水畜也小便不利者宜五苓散瀉其膀胱腑也東垣滋陰丸以瀉腎火如腎病久身下竄目中如見鬼狀或骨萎弱臥不能起或二便遺失皆腎敗之候不治錢氏地黃丸治肝疳白膜遮睛瀉血失音身瘦瘡疹又治腎怯不言解顱小兒長大不能行者專服即效熟地黃酒洗焙乾山茱萸乾山藥各四兩澤瀉牡丹皮白茯苓各三兩蜜丸如梧桐子大三歲以下兒二丸至三丸空心溫水化下活幼補腎地黃丸治稟賦不足腎氣虛弱骨髓枯竭囟大頭縫不合體瘦語遲行步多艱齒生緩者乾山藥去黑皮山茱萸酒浸去核熟地酒洗焙各五錢鹿茸酒洗炙牛膝酒洗各四兩牡丹皮去心白茯苓去皮澤瀉各二兩一方不用鹿茸有川續斷酒洗四錢蜜丸如上法五苓散治傷寒中渴煩躁小便不利而渴或霍亂吐瀉不止澤瀉一兩五錢白朮赤茯苓豬苓各一兩肉桂半兩為末每服二錢或白湯或清米飲任服東垣曰五苓散乃太陽里之下藥也夫太陽高則汗而發之下則引而竭之渴者邪入太陽本也當下之使邪從膀胱出也其腎燥膀胱熱小便不利此藥主之小便利者不宜用然太陽病熱而渴小便雖利亦宜此藥下之當服不服則谷消水去形亡必就陽明燥火伐胃發黃此太陽入本失下也東垣滋腎丸治腎熱小便不利黃柏三兩知母二兩肉桂一兩半熱水為丸每服食前沸湯下本臟自病論精神補瀉分明有定方若是相傳作兼病更宜通變五提綱按難經有五邪之論論本臟自病者為正邪自前來者為實邪自後來者為虛邪自所勝來者為微邪自所不勝來者為賊邪此以五行生剋之理論之也錢氏所論肝主風心主驚脾主困肺主喘腎主虛此皆本臟自病者謂之正邪故立五補六瀉之方以主之潔古先生乃取難經之言以明五臟傳變之證補錢氏之所未及者其法始備故風傷肝熱傷心濕傷肺寒傷腎飲食勞倦則傷脾此五臟自受之邪為本病也如肝主風其中風者本病也謂之正邪由傷熱得之乃心乘肝自前來者為實邪由傷濕得之乃肺承肝自所不勝來者為賊邪由傷寒得之乃腎乘肝自後來者為虛邪由飲食勞倦得之乃脾乘肝自所勝來者為微邪餘臟仿此語見四十九難潔古論其治五臟之法如肝臟自病者只治其肝宜瀉青丸若心乘肝者宜以導赤瀉心實則瀉其子也腎傷肝者宜以姜附四逆湯補腎虛則補其母也肺傳肝者宜以瀉白散瀉肺地黃丸補肝先補而後瀉也脾乘肝者宜調元湯以益脾制肝余仿此推之其餘方法不必拘定以意會而通之可也是皆治其初得之病也又有一臟之病而傳別臟者謂之兼證當視標本之緩急而治之先見病謂之本後見病謂之標急如大小便不通或吐瀉不止或咽喉腫痛飲食不入或心腹急痛之類雖後得之當先治之故曰急則治其標也如無急證只從先得之病治之以後病之藥隨其證而治加之所謂緩則治其本也大抵嬰兒脾病多只因乳食缺調和知他臟病須調胃若到成疳受折磨胃主納穀脾主消穀飢則傷胃飽則傷脾小兒之病多過於飽也或母有氣實形壯者其乳必多求兒不哭縱乳飲之定乃傷於乳也母之氣弱形瘦者其乳必少恐子之哭必取穀肉粑果之類嚼而哺之不飽不止定乃傷於食也故小兒之病胃最多也五臟以胃氣為本賴其滋養也胃者中和之氣也非若五性之偏也如五臟有病或瀉或補慎勿犯其胃氣胃氣若傷則不食而瘦或善食而瘦疳病成矣不可治經曰全谷則昌絶谷則亡誠醫科之龜鑑也
