body:
  text: 卷之四瘧疾瘧論經中五六般時師總號是脾寒治分三法須求瘥不及家傳平瘧丸瘧疾之候始而呵欠繼而足冷面色青黃身體拘急戰慄鼓頷腰脊俱痛寒去未幾內外皆熱頭痛而渴但欲飲水嘔惡煩滿而不嗜食者皆其候也按內經有五臟瘧有六經瘧之病名世人總論之曰脾寒蓋脾胃者五臟六腑之本也經云邪之所湊其氣必虛惟小兒脾胃素弱故邪乘虛入隨其所入而為五臟六腑諸瘧之名也故吾之先人分為七瘧風寒暑濕食鬼勞也治瘧之法初則截之謂邪氣初中正氣未傷故先驅之使去不可養以為患也中則和之謂邪氣漸入正氣漸傷或於補氣血藥中加截藥或於截藥中加補氣血藥務適其中以平為期末用補法謂邪久不去正氣已衰當以補其脾胃為主使正氣復強邪氣自退矣余各因七瘧條陳三法於後以為後學之繩墨也風瘧者因感風得之惡風自汗煩渴頭疼風陽氣也故先熱後寒初得之宜發散麻黃白朮湯主之不退者小柴胡湯加常山檳榔烏梅截之久瘧不已宜補中益氣湯主之麻黃白朮湯治感風發熱麻黃去節桂枝青皮陳皮川芎白芷半夏曲紫蘇白茯苓白朮桔梗甘草炙加細辛檳榔等分為散量兒加減棗姜引煎未發前二時服寒瘧者因感寒得之無汗惡寒攣疼面慘陰氣也故先寒後熱宜與發散寒邪養胃湯加桂主之如不止以平胃散加檳榔草果截之瘧久不止白朮散去乾葛加乾薑主之養胃湯治感寒發瘧草果藿香各五錢陳皮七分半甘草肉桂各二錢為末入生薑烏梅煎服量兒大小暑瘧者因傷暑得之陰氣獨微陽氣獨發但熱不寒食不泄煩渴且嘔肌肉消爍宜解暑毒柴胡白虎湯主之不止者去石膏加貝母常山檳榔截之又不止者補中益氣湯主之柴胡白虎湯治傷暑發瘧即小柴胡合白虎湯也濕瘧者因冒襲雨濕汗出澡浴坐臥濕地得之身體重痛肢節煩疼嘔逆脹滿宜胃苓湯主之不退以平胃散加茯苓檳榔常山截之久不退宜參苓白朮散主之胃苓湯治傷濕發瘧即平胃五苓二方相合也食瘧者一名痰瘧飲食不節飢飽有傷致然也凡食啖生冷醃臢魚肉肥膩中脘生痰皆為食瘧其候若飢而不食食則中滿嘔逆腹痛宜去其食積四獸飲主之不止以二陳湯送下紅丸子截之久不已宜六君子湯加青皮主之四獸飲治食積和胃消痰半夏人參茯苓白朮橘皮生薑烏梅大棗各等分甘草炙減半上㕮咀用鹽少許水浸濕紙厚裹慢火煨宜量兒大小水煎服紅丸子治食瘧食積氣滯腹脹三稜水浸軟切片莪朮煨青皮陳皮各五錢胡椒乾薑各三錢米醋煮粳米粉糊丸粟米大紅丹為衣每服十丸至十五丸二陳湯下鬼瘧者如疫癘傳染之病山溪巒瘴之毒客忤無辜寤寐驚怖之變皆是也氣之所中化為毒涎乃生寒熱是也名鬼瘧俗用符水退之此龍術王所咒留祝由科及有針間使穴而愈者有針鞋帶五毒而愈者至一草一蟲皆可怯之信乎治病尚無正方也宜先用截藥逐出惡涎後用發散之藥解其毒氣不退用柴胡湯調之鬼哭飲治瘧久不愈者常山檳榔白茯苓鱉甲酥炙各等分上㕮咀用桃柳枝七寸同煎臨發日五更服略吐惡涎四聖丸治諸瘧不分遠近穿山甲二錢半灰炒至胖黃另研末雞骨常山檳榔烏梅炒各一兩水煎糯米糊丸隨大小為丸紅丹為衣十五丸至三十丸臨發五更溫酒送下神應丸祛瘧有驗當歸酒蒸曬乾柴胡各一兩穿山甲灰炒切知母酒糊丸臨發前夜用清茶朝北服一次至發日五更又朝北服一次五神丸治瘧疾萬應東方巴豆五錢麝香二分半南方官桂五分硃砂白礬各二錢北方青黛五錢黑附子三錢中央硫磺五錢雄黃一錢定於五月五日各修為末按方包放至午時取五家粽尖為丸梧桐大每服一丸綿裹於未發前一日晚男左女右塞鼻孔中立效六和湯發散毒氣人參草果知母貝母烏梅白芷檳榔柴胡各等分常山加倍㕮咀大棗調水各半未發前一日煎露一宿臨發五更服或香蘇散加川芎白芷蒼朮當歸烏梅柴胡湯治瘧久不愈柴胡半夏與黃芩甘草常山白茯苓蒼朮烏梅姜草果檳榔蘇葉及青陳水煎服如前數症經久不瘥真氣已耗邪氣猶存則有所謂勞瘧者焉治法又不同勞瘧者表裡俱虛真元未復疾雖暫止小勞復發謂之勞瘧久瘧成勞者是也當調養氣血加減十全大補湯主之十全大補湯即八物湯加黃耆官桂是也再加陳皮半夏薑棗煎服瘧母者彌年越歲經汗吐下榮衛虧損邪氣伏藏脅間結癥痞謂之瘧母此症不可急攻當補其胃氣以漸而攻經云衰其半而止也鱉甲飲子主之鱉甲飲治瘧久不愈腸中結為癥瘕名曰瘧母鱉甲君醋炙倍用黃耆蜜炙人參當歸白朮茯苓川芎白芍甘草陳皮青皮半夏曲三稜檳榔厚朴柴胡各等分上㕮咀加生薑大棗烏梅水煎家傳秘法治瘧不問遠年近月不發不截通用平瘧養脾丸主之試甚驗誠治瘧之仙法也人參白朮白茯苓炙甘草陳皮青皮半夏曲蒼朮制厚朴炒草果仁柴胡黃耆豬苓澤瀉桂枝常山末鱉甲醋炙當歸川芎各等分十九味各取末和勻酒糊丸黍米大米飲下有癖塊加三稜莪朮各煨研入內有食瘧成疳又復傷食腹中有癖按之堅硬漸熱無時多哭者前方去蒼朮草果常山黃芩豬苓澤瀉加炙黃耆黃連木香砂仁夜明砂乾蟾炙使君子肉神麯麥芽等分為末神麯糊丸米飲下有病瘧又發搐者此亦食瘧積瘧也熱甚生風痰壅作搐只止瘧掠搐亦止矣宜小柴胡湯加大黃常山檳榔主之如不止驚瘧俱發以致肝旺脾衰變為疳症囟陷唇白頭髮成穗宜兩治之用加減當歸龍薈丸以平肝內帶治疳之藥又用加減參苓白朮散為丸以補其脾內帶退驚之藥試之甚驗加減當歸龍薈丸治疳熱發搐又治驚疳當歸川芎龍膽草龍薈黃耆黃連半夏曲青皮柴胡人參白茯苓木香甘草炙梔子仁等分神麯糊丸竹葉湯下加減參苓白朮丸治瘧久成疳謂之疳瘧又名勞瘧兼治脾虛生風發搐者用之神效人參白朮白茯苓甘草炙黃耆白芍官桂陳皮山藥蓮肉使君子肉鱉甲神麯夜明砂龍膽草天南星等分荷葉浸水煮糊丸黍米大米飲下此與上二方同量兒病制而裁之也有驚後變瘧者此脾虛也宜平瘧養脾丸琥珀抱龍丸相間服之有瘧後變驚者此脾胃虛也亦如前二方相間服之有瘧後變驚者此脾胃虛極也乃慢驚風症難治宜加減參苓白朮丸琥珀抱龍丸主之有瘧痢並作者初用小柴胡加當歸白芍常山檳榔大黃主之不已者只用參苓丸和之瘧後變痢者此胃氣下陷也宜補中益氣湯加白朮黃連木香有瘧泄並作者初用柴苓湯主之瘧後變泄者宜胃苓丸和肉豆蔻丸服之有瘧後變咳嗽者此因瘧退後復傷風也宜微發散參蘇飲主之有瘧後浮腫者此病極多宜胃苓丸五皮湯下或用胃苓湯合五皮湯同服有瘧後腹脹者看有癖無癖有痞者從痞治宜前平瘧養脾丸加治癖腹脹法治之無癖者治腹脹胃苓丸宜多服有瘧後食少黃瘦不長肌肉者此疳也謂之疳虛宜肥兒丸和平瘧丸主之瘧疾灸法如久不止灸大椎一穴內庭二穴在足大指次指外間陷中各一壯凡瘧之晝發者宜用前法有夜發者此邪在血分也宜麻黃桂枝湯加地黃紅花主之不止者以小柴胡湯合四物湯加升麻治之提至陽分然後用當歸茯苓主之以常山檳榔烏梅截之瘧有一日一發者易已有間日一發二日一發者難已惟平瘧養脾丸服久則以漸移近至一日二發者得大汗而解俗人見其服藥之後反近日發有疑而不肯服者不可與言藥者也腫病證治面目浮腫先受風濕從足起變形容補中上下分消去下水通腸是下工按幼科論小兒腫病與大人同法率用行水之藥誤人甚多惟錢氏之論可宗錢氏云腎熱傳於膀胱膀胱熱甚逆於脾胃脾胃虛而不制水腎水反克脾隨水而行脾主四肢而身面皆腫也若大喘者重也何以然腎水勝而克退脾土土勝心火火勝肺金肺為心克故喘或問心刑肺本見虛金何喘實曰此有二一者肺大喘此五臟逆一者腎水氣上行傍侵於肺故令大喘此皆為難治也腫病之後目胞上下微起肢體重著陽咳怔忡股間清冷小便澀黃皮薄而光按即成窟舉手即滿是也治腫之方諸家只知治濕多利小便之說執此一端遽用泄水之藥則一泄而水消乃曰得泄之力殊不知脾愈泄而愈虛不逾旬日腫復如初此世人只知泄水為最而不知十補勿一攻之論往往多死者矣吾之家傳大兒用胃苓湯小兒用胃苓丸以五皮湯送下甚驗胃苓湯治腫之要藥也方見脾胃即五苓散以滲濕平胃散以燥濕二方相合是也五皮湯桑白皮大腹皮茯苓皮生薑皮五加皮各等分喘甚者加真蘇子以上二方有加減法上半身腫多者加蘇葉訶子葛根下半身腫多者加木通木瓜腹脹者加木香藿香枳殼大便秘者加枳實大黃微利之或枳樸大黃丸亦效方見傷食飲食之忌惟鹽醬薤鮮濕面皆味鹹能助水者並他生冷毒物亦宜戒之恐傷脾胃重則半載輕者三月須待脾胃平復血氣充實然後於飲食中旋以少炒鹽徐徐投之不至驟吃咸物則腫自不再作故劉云治腫非難補養尤難丹溪治腫大法云宜補中行濕利小便腰以上腫宜發汗若遍身腫煩渴小便赤澀大便秘結此屬陽水先用五皮散次用四磨飲加生枳殼重則疏鑿飲子若遍身腫不煩渴大便溏小便清少此屬陰水宜實脾飲或木香流氣飲主之氣若陷下用二陳湯加升提之藥能使大便潤而小便長如腹脹少加厚朴佐之氣不運加木香木通以調之按丹溪治腫之法大人小兒同用方見各書可尋用之今予仿其法以治小兒之腫如在表有熱可汗者用五皮湯加麻黃葛根紫蘇葉杏仁以發之如身無熱水氣在裡者用五苓散加醋炒芫花黑棗以下之陽水之大便秘小便澀煩渴者用五苓散作湯送下枳樸大黃丸陰水之不渴清便自調者用平胃散加生薑白茯苓草果木香藿香主之病有瘧後腫者有泄痢後腫者有因咳嗽腫者有因疥瘡腫洗後腫者腫雖不同治法則一也經云去菀陳莝者謂腹有積聚宜去之也開鬼門謂發其汗也潔淨府者謂利其小便也溫衣者謂常宜和暖使水氣得行也大抵痢瘧後腫者難治脾胃極也咳嗽而腫者宜五皮湯去五加皮加地骨皮陳皮去白紫蘇葉主之氣上逆者更加杏仁葶藶瘡毒痛者通聖散大凡腫先起於腹而散於四肢者可治先起於四肢後歸於腹者不可治若臌脹而肚上有青筋脹滿大便滑泄久瘧而轉作虛浮與夫肉黑傷肝缺盆平傷心臍實傷脾足平傷腎背平傷肺凡此皆為不治之症又男從腳下腫而上女從身上腫而下或肉硬或掌平或卵腫脛長或面黧黑者皆不可治也此一段依原本脾肺經兮屬太陰喘呼腫脹每相尋視其標本分先後秘訣家傳記在心病腫者未必不喘病喘者未有不腫皆濕土之病也蓋脾肺者手足太陰皆屬濕土故腫乃濕土敦阜之象喘乃濕土熏蒸之氣治者須以標本先後立法也如先腫後喘者此脾傳肺也以脾為本肺為標宜胃苓丸五皮湯如上法合而用之如先喘後腫者此肺傳脾也以肺為本脾為標宜蘇子降氣湯主之腹脹腹中脹滿受虛寒秘結須從實熱看熱多寒少休妄議虛虛實實夭人年大抵小兒多因飲食飢餓生冷甜膩聚結不散或因久患疳積及瘧後癖塊不消皆能為脹按之如鼓膨脝者是也故有疳脹蟲脹積脹食脹虛脹冷脹種種不同一言以約之寒脹是也故疳虛者皆屬寒宿食積癖皆屬熱各隨虛實主治庶不差誤錢氏云小兒腹脹由脾胃虛寒攻作也實者悶亂喘滿也可下之不喘喘者虛也不可下若誤下致脾虛氣上附肺而行肺與脾子母皆虛肺主目胞腮之類脾主四肢母衰甚必主目胞腮腫也黃色者屬脾治用塌氣丸漸消之使上下分消其氣則愈也小兒易為虛實脾虛不受寒溫服寒則生冷服熱則生熱當識此意勿誤也凡治小兒虛腹脹先服塌氣丸不愈腹中有食積結糞小便黃時時微喘脈伏而實時時飲水能食者可下瘥木香檳榔丸主之脾初虛而後有積者不可便下以肥兒丸調之不愈以三稜丸主之塌氣丸治小兒虛腹脹大者加蘿蔔子名褐丸子胡椒一兩蠍尾去毒五錢蘿蔔子炒加陳皮青皮木香各三錢末麵糊為丸粟米大服五七丸陳米飲下三稜丸治先脾虛後傷食不可下者及疳疾腹脹三稜醋炒煨莪朮制青皮陳皮枳實厚朴麥焙半夏薑汁炒黃連炒香附醋焙川芎使君子肉夜明砂神麯麥芽乾蟾燒存性檳榔木香砂仁各三錢半當歸一錢另取神麯煮糊丸黍米大服二十丸至五十丸米飲下大便黃涎臭穢為度此積滯去也治小兒腹脹法用蘿蔔子炒紫蘇根乾葛陳皮等分甘草少許煎服食少加白朮一法用蝦䗫一個入豬肚內煮熟去蝦䗫將肚食盡效如有因食積而腹脹者有熱用木香檳榔丸有寒用丁香脾積丸有因食多肉多腹脹者用三黃枳朮丸料內加香附半夏蒸餅丸服實者宜下之消之次補之虛者溫之升之補為要也針經曰夫脹者皆在臟腑之外排靠臟腑而廓離脅脹滿皮膚故曰脹大抵寒脹多而熱脹少治宜詳辨之如腹脹時減者為虛腹滿不減者為實按之濡者為虛按之堅者為實如大病瘧痢之後脹者為虛外感風邪寒邪入里者及傷飲食者其脹為實虛者補之內加行氣之藥勿太犯溫及成熱中也實者下之內加補脾之藥或先補脾而後下之勿太下之恐傷胃氣常用家秘胃苓丸以紫蘇湯下多服病脹氣喘者宜分氣飲主之分氣飲治腫脹桔梗赤茯苓陳皮桑白皮炒大腹皮枳殼半夏藿香紫蘇等分甘草減半每服一錢水一小盞姜三棗二煎服病脹者腹堅而大腹皮無紋臍突背平胸高而喘或滑泄皆不可治內經曰五實者死腹緊脹一也氣上喘二也身壯熱三也脈洪數四也大小便秘五也如此五實者宜急下之得利者生神效丸主之方用大戟芫花甘遂醋炒澤瀉葶藶子炒連翹桑白皮木香赤小豆炒黑牽牛炒取頭末各等分大棗蒸去核搗泥丸麻子大量兒檳榔湯下以利為度此乃救急之方非可常用得利後用參苓白朮散去甘草補之黃疸濕熱食傷總髮黃是名疸病屬純陽熱宜寒治濕宜利食積還從消導良錢氏曰凡小兒身皮面目皆黃者黃病也身痛轉背強大小便澀一身面目指爪皆黃小便如屋塵色著物皆黃渴者難治此黃疸也二症多得於大病之後又有生下百日及半年不因病遍身微黃胃熱也大人亦同又有面黃腹大大渴者脾疳也又有自生而身黃者胎黃也經云諸疸皆屬於熱色深黃者是也若淡黃兼白色胃怯不和也按論小兒黃疸病錢氏甚詳如因熱者其色黃而明因濕者其色黃而黯因食積者其色黃而淡以此辨之丹溪云不必分五疸總是濕熱如盒曲相似此理甚明按經中只言癉俗稱為疸癉者單也謂單陽而無陰也因於熱者用涼驚丸因於濕者用胃苓丸內加茵陳作丸服之因於食積同疳黃者集聖丸脾胃虛怯而黃者肥兒丸此家秘之法也方見前大抵治黃疸者茵陳五苓散尤為穩當錢氏瀉黃散治脾熱發黃大概治小兒季夏之時身體蒸熱胸膈煩悶如爛橘之黃眼中白睛赤黃筋骨痿弱不能行立用加減瀉黃湯主之加減瀉黃湯黃連茵陳各五錢黃柏黃芩茯苓山梔仁各二錢澤瀉二錢㕮咀作一服水煎稍熱服此方治濕熱發黃甚效丹溪治小兒吐泄黃疸方三稜莪朮青皮陳皮神麯麥芽黃連甘草白朮茯苓各等分末溫水調服傷乳食吐泄加山楂時氣吐泄加滑石發熱加薄荷此方治傷食及食積發黃甚效凡小兒有食積者面色多帶黃白宜肥兒丸調之健脾益胃出積消食脾胃既和飲食消退運化精微灌溉臟腑流行榮衛自然五色修明其黃去矣腹中有癖者宜化癖丸方見癖有積者三稜丸方見脹各依其法治之無有不驗者惟初生小兒胎黃用生地湯與母服之兒食乳其黃自退生地黃湯生地赤芍藥川芎當歸天花粉各等分水煎服腹痛小兒腹痛哭聲連大者能言何處疼冷熱積蟲分四症盤腸內吊察根源仁齋云腹痛之病因邪正交攻與臟氣相擊而作也挾冷痛者於面色或青或白見之冷甚者則面色黯黑唇爪甲皆青矣輕者當歸散重者燒脾散主之有吐痛者保童丸當歸散治腹痛有寒無熱當歸倍用木香辣桂人參甘草等分生薑大棗引溫服燒脾散治傷生冷果菜停積中焦心脾冷痛乾薑炙厚朴姜炒草果仁砂仁甘草炙神麯炒麥芽陳皮良薑炒等分末熱鹽湯點服或煉蜜丸如圓眼大薑湯化一丸下保童丸治因寒傷風冷食積肚疼吐泄嘔惡人參白朮甘草炙蒼朮泔厚朴姜陳皮茯苓豬苓澤瀉藿香丁香半夏曲乾薑炒肉桂白豆蔻青皮檳榔肉豆蔻麵煨滑石炒全蠍木香訶子肉等分神麯糊丸龍眼大一丸米飲下或用理中九胃苓丸合杵細煨薑湯調服已見驗挾熱痛者於面赤壯熱四肢煩痛手足心熱見之宜四順清涼飲加青皮枳殼大便秘者枳樸大黃丸主之方見積聚大便調者芍藥甘草湯四順清涼飲白芍當歸甘草大黃等分芍藥甘草湯白芍倍用甘草減半以上二方並用水煎服錢氏云小兒積痛口中氣溫面黃白目無精光或白睛多及多睡畏食及大便或酸臭者當磨積宜三稜消積丸主之甚者脾積丸下之後和胃胃苓丸養脾丸肥兒丸參苓白朮散擇而用之三稜消積丸治積痛胃脘痛心腹痛小便痛痞痛蟲痛三稜煨莪朮煨半夏曲枳實麩黃連吳茱萸水拌炒陳皮青皮木香檳榔厚朴姜川楝子肉小茴等分末另取神麯糊丸黍米大服二三十丸米飲下蟲痛面㿠白心腹痛口中涎沫及清水出發痛時烏梅丸主之小兒本怯者多此病積痛食積虛痛大同小異惟蟲痛口涎而沫出甚者化蟲丸萬應丸看病輕重用烏梅丸治胃冷蛔攻心痛嘔吐四肢冷烏梅三十個黃柏炒細辛肉桂附子炮各六錢黃連一兩六錢蜀椒去閉口者炒潤當歸各四錢姜泡一錢末取烏梅肉酒浸杵爛和蜜丸麻子大服十丸日二次忌生冷化蟲丸治蟲咬心痛去來不定不思乳食鶴蝨檳榔錫灰苦楝根白皮各一錢白枯礬三錢半生半熟麵糊丸黍米大服二三十丸熟水入香油三滴吞下食前服如有小蟲皆化大蟲自利下初服甚效凡病腹痛喜手按及熱熨者為虛為寒宜用溫補法如手不可按者為實宜下之盤腸內吊痛見前驚風及後疝痛癖病癖居脅下狀如龜寒熱潮時似瘧臨虛實從容衰半止若逢乳痞不須醫仁齋云癖者血膜包水側癖脅傍時時作痛惟癖能發潮熱生寒熱故瘧家中脘多蓄黃水日久而成癖寒熱往來不已者成此疾也蓋小兒臟腑和平榮衛和暢則津液自然流通縱使多飲水漿不能為病惟乳哺失調三焦閉隔水飲停滯腸胃不能宣暢冷氣搏之結聚而成癖也錢氏云腹中有癖不食但飲乳不早治必成疳幼科治癖輕則木香丸重者取痞丸似乎太峻今予立法輕則消痞丸主之如氣壯實者代赭石挨癖丸下之按大概云一小兒病癖積在左脅下硬如覆盂肚大筋青發熱肌瘦咳嗽自汗日晡尤甚牙疳口臭宣露出血四肢困倦飲食減少病甚篤太醫劉中安先與沉香海金沙丸一服下穢物兩三行次日服塌氣丸十日後隨以沉香海金沙丸下之久服塌氣丸如此五換服至月餘其癖減百日良愈近年有此疾獲愈者多故予家秘訣先服消癖丸五日乃服挨癖丸以微下之又服消癖丸十日又以挨癖丸下之內經曰大積大聚乃可攻也衰其半而止如上法治之待其衰去大半不可再下只以消癖丸服之消癖丸治痞在脅下面黃肌瘦午後發熱似瘧者人參白朮白茯苓陳皮青皮厚朴姜枳實麩半夏砂仁神麯麥曲俱炒各二錢鱉甲九肋醋炙三錢三稜酒煨莪朮酒木香各一錢半辣桂乾薑炒各一錢黃連三錢同姜炒丸如黍米大服二十丸至五十丸米飲下代赭石挨癖丸治腹中痞塊或生寒熱或作痛者代赭石火煉醋淬至淬研極細末青皮去白莪朮煨木香不見火山稜煨辣桂川大黃各三錢巴霜一錢除巴霜外研末入巴霜再研勻醋煮麵糊丸麻子大服五丸薑湯下小兒病瘧腹中有痞發熱者連年不已欲成疳癆者宜用鱉甲豬肚丸主之鱉甲豬肚丸北柴胡一兩黃連七錢枳實木香青皮各兩半九肋鱉甲醋炙一兩大蝦䗫乾者一個炙焦青蒿乾者七錢用獖豬肚一個重一斤半者去脂將前藥末在內柳木甑蒸熟同搗和丸麻子大服二三十丸人參湯下食後服凡小兒奶癖不必攻治待至長大脾胃漸強自不見矣蟲痛個個孩兒腹有蟲胃虛蛔動痛相攻眼翻吐沫如驚癇寸白為疳法不同古方論臟腑九蟲一曰伏蟲二曰白蟲三曰肉蟲四曰肺蟲五曰胃蟲六曰弱蟲七曰赤蟲八曰蟯蟲九曰蛔蟲蛔蟲俗呼食蟲者是也或長一尺或五六寸蓋因臟腑虛弱而動或因食甘肥而動其動則腹中痛發則腫聚痛有去來乍作乍止嘔惡吐涎口出清沫胃傷心者死自鼻出者死先察其脈或腹中痛者脈常沉伏弦細今反脈大則是蛔痛也蓋因小兒食物太早或傷生冷油膩之物留而成積積化為蟲也凡有蟲者口饞好甜或喜食泥土茶腳火灰之類宜用取蟲之藥如烏梅丸化蟲丸方見前木香檳榔丸蝦䗫丸萬應丸秘傳賽寶丹皆可擇而用之木香檳榔丸殺諸蟲雞心檳榔一兩木香鶴蝨貫眾錫灰乾漆炒盡煙使君子肉各半兩輕粉二錢雷丸白者巴豆肉另研各二錢半末飛白麵糊丸麻子大服一二十丸五更苦楝根白皮煎湯下蝦䗫殺疳蟲丸大蝦䗫炙焦一個木香雞心檳榔貫眾桃仁水浸去皮尖另研苦楝根白皮酸石榴皮各三錢蕪荑鶴蝨各二錢巴豆肉二錢另研糯米糊丸麻子大五更後菖蒲下十五丸萬應丸下諸蟲檳榔末五錢大黃末八錢黑牽牛頭末四兩皂角十皮不蛀者苦楝根白皮一斤將前三味末和勻用皂角捶碎與苦楝根皮二味水一大碗熬成膏入藥末搗丸小豆大用沉香白雷丸木香三味各研細末為衣先用沉香衣次用雷丸衣後用木香衣每三丸五更砂糖水送下秘傳賽寶丹追蟲取積神效黑醜十個頭末四兩錫灰醋炒一兩檳榔末二兩雷丸白者末二兩陳皮青皮各二兩三稜醋莪朮醋鶴蝨皂角各二兩使君子肉二兩將各末和勻卻以各藥粗渣煎湯去渣搗丸麻子大每服五分至一錢四更時用冷茶清吞下復睡至天明不可洗手洗面吃湯物待取下或蟲或積惡毒滯氣並原藥下盡方用冷水洗面其藥未下寧耐半時見藥下終藥食哺之凡欲取蟲宜在上半月蟲頭向上若下半月蟲頭向下不受其藥徒傷胃氣也取蟲之時預將清油煎肉或煎卵餅令兒嗅之勿與食也引蟲得聞香味皆聚而求食也急投下蟲湯藥乃中病也取寸白諸蟲貫眾酒方隔夜取貫眾煮酒收起至次日五更將炙肉一塊與兒銜口中勿令吞下蟲聞肉香其頭向上卻取去肉以使君子肉三個煨令香熟與兒嚼爛同輕粉數釐吞下少頃以貫眾酒下雄黃解毒丸三五七粒則泄下皆蟲也小兒病蟲多出於脾胃怯弱者如上攻取之藥豈可常服乃當作腹痛之時然後用之也有於未發之時常宜服肥兒丸安蟲丸所謂防患於未然使之不發也安蟲丸治蛔蟲寸白蟲䘌蟲一切諸蟲木香雞心檳榔使君子肉白蕪荑仁綠色貫眾苦楝根白皮蝦蟆燒存性夜明砂末粳米丸黍米大二三十丸蜜水下㿗疝疝腫須分內外因內因氣動外寒侵病因肝氣原非腎本腫呼為氣卵名疝者寒氣結聚之所為故令內則臍腹絞痛外則卵丸腫大是也專屬肝經與腎無干蓋肝善怒大叫哭小兒性急多哭得之者此氣動於內謂之氣疝宜行氣開鬱加減二陳湯木香內消丸主之如因久坐寒濕之地得之者此冷氣入腹謂之寒疝宜溫中散寒加減當歸散茱萸內消丸主之有腫而不痛者此濕也宜行濕消腫加減守效丸主之並外敷方加減二陳湯治性急多哭卵腫痛連小腹謂之氣疝陳皮去白半夏洗白茯苓附子童便浸木香川芎小茴炒等分甘草減半姜三片水煎木香內消丸治疝氣木香三稜煨豬苓澤瀉川楝子肉陳皮青皮小茴香炒各等分海藻洗二錢香附酒浸七錢半酒糊丸黍米大空心鹽湯下二三十丸加減當歸散治受寒濕之氣小腹絞痛外腎紅腫並內瘹腹痛啼哭多當歸酒洗吳茱萸炒官桂去皮川芎乾薑炮木香小茴香炒等分甘草炙末服五分至一錢鹽湯調家傳茱萸內消丸治寒濕所襲留伏作痛㿗疝偏大吳茱萸酒醋浸一宿焙乾山茱萸蒸去核馬蘭花醋浸焙川楝子蒸去皮核桂心舶上茴香鹽炒玄胡索略焙橘紅青皮去白海藻洗去鹽各一兩桃仁炒去皮尖白蒺藜炒去刺木香各半兩酒糊丸麻子大服二十丸至五十丸溫酒鹽湯下加減守效丸治卵腫不痛者此濕也又名木腎蒼朮泔浸鹽炒南星炮白芷山楂肉各一兩川芎橘核炒半夏洗神麯炒各半兩海藻洗垢吳萸炒三錢半酒糊丸麻子大服二十至五十丸茴香湯下一方治疝初起者用五苓散料內加小茴香川楝肉服時入鹽少許效又方治偏墜痛甚者用川楝肉小茴香炒各等分沒藥全蠍減半末空心用熱酒調服或以五苓散煎調更佳敷法外腎腫大光明者先用蟬煎水乘熱洗過後用牡蠣灰乾地龍糞焙乾等分末唾津調敷腫上痛者雞子清調敷又方用乾地龍末不拘多少先以蔥椒湯洗次以津調之小兒素有疝氣或一年或半年發者發則有形外連睪丸內貫小腹腫硬一條如小杵約五六寸長大小便不通者宜用當歸身梢川芎山梔仁山楂子木香青皮不去穰木通小茴香炒川楝子肉澤瀉豬苓作大劑水煎小兒木腎腫大連年不消者不早治之便為終身痼疾也宜用前家傳茱萸內消丸內加黑醜半生半炒取頭末二兩為丸服更灸臍傍二穴即章門穴大效又取穴法以本兒手掌小指後側橫紋按臍中心中指頭盡處是穴小腸氣一名盤腸氣痛發則腰不得伸乾哭無淚額上汗出詳見前內吊病中有方如痛連外腎者宜加減川楝子散主之舶上茴香鹽炒破故紙炒各二錢吳萸根醋酒浸一宿焙木香各一錢末溫酒調服小兒氣卵謂之偏墜得之於父年已老或年少多病陰痿精少強力入房因有此者謂之胎疝難治小兒濕地上坐或為蚯蚓呵其卵腫長大而垂者鹽湯洗之蓋鹽能殺蚯蚓毒也或用浸蒼朮泔煎熱少以鹽在內洗之小兒疝痛及盤腸痛者以鹽一合炒熱放兒臍中熨之待冷更以艾在臍上灸之溫氣既入邪氣隨散其痛立止小兒陰囊生瘡潰爛者謂之脫囊用紫蘇葉研末敷之以荷葉包之或用生荷葉火烘令軟包之雖囊丸露亦可治之神效又治外腎燥癢潰爛用龍骨煅石膏爐甘石煅多年爛蚌殼各一錢五倍子白及黃連各五分末先以苦參大腹皮紫蘇露蜂房煎湯先洗拭乾敷藥神效小兒外腎臊臭時復濕癢宜用柴胡澤瀉各一錢車前子木通各五分生地當歸尾龍膽草各三分㕮咀作一服水三大盞煎一碗去渣待宿食消盡空心服更以美膳壓之外腎癢甚不可止者用胡椒煎湯洗之立效啼哭孩兒多哭事堪憐何事漣洳晝夜間飢渴癢疴如不中拂其心意自煩冤小兒初生百日一周之內神安意靜不妄笑多哭者易養如日夜啼哭不止者難養啼與哭不同啼者無時有聲而死淚也哭者時作時止大號跳而有淚也小兒啼哭非飢則渴非癢則痛為父母者心誠求之渴則飲之飢則哺之痛則摩之癢則抓之其哭止者中其心也如哭不止當以意度蓋兒初生性多執拗凡有親狎之人玩弄之物一時不在其心不悅而哭矣謂之拗哭急與之勿使怒傷肝氣生病也假如又不止請醫視之如大叫哭晝夜不止者肝熱也宜瀉青丸主之淡竹葉湯入砂糖一豆許化下如日夜啼哭身熱煩躁者心熱也宜導赤散加黃連燈心湯服或用東垣硃砂安神丸燈心湯下神效方俱見心肝二臟夜啼夜啼四症驚為一無淚見燈心熱煩面瑩頰青下臍痛睡中頻笑是邪干夜啼者臟冷也陰虛於夜則冷動冷動則為陰極發燥寒甚作痛所以夜啼而不歇也鉤藤散益黃散主之鉤藤散腹痛夜啼晝則安靜者又治內瘹鉤藤茯苓茯神川芎當歸木香各三分甘草減半量兒大小或末五分至一錢薑棗略煎服又方治夜啼不止腹中疼痛甘草炙黃耆炙當歸赤芍木香等分末每少許塗乳頭上吮之又方木香磨水半盞調乳香沒藥末少許數沸服之立效其心熱煩啼者必有臉紅舌白赤澀之病宜導赤散加麥冬燈心或東垣安神丸甚效又方黃連分半薑汁炒甘草一分人參半分末竹葉水煎服又方花火膏燈花二枚或四枚硼砂硃砂各少許末以燈心湯調搽兒口中以乳汁嚥下一日三服小兒夜啼見燈即止者此由點燈習慣乃拗哭也驚啼者常在夢中哭而作宜錢氏安神丸主之又方胎中受驚生未滿月而驚啼者用硃砂牛黃麝香各少許末取豬乳汁調搽兒口中又方蟬蛻十四枚全者去足入硃砂少許蜜調服有因客忤觸犯禁忌而夜啼者宜四聖保命丹用燈草燒灰和藥杵細乳汁調塗乳上令兒吮之更以術法驗之一法於兒臍下用硃筆書田字一個即瘥又法用火柴頭一個長四五寸削平一面硃砂水寫云撥火杖撥火杖差來作神將捉著夜啼鬼打殺不要放急急如律令敕又方用仙人杖安睡處身伴此杖即筍欲成竹者立死又方用抱雞婆草一束置兒簟下勿令人知諸汗額頭有汗不須疑漿漿渾身早問醫若待陽虛成脫病縱逢國手也虛題內經曰陽者衛外而為固也陰者內之守也氣為陽血為陰心主血汗者心之液也肺主氣皮毛腠理肺之合也小兒心火太盛上熏於肺則皮毛不斂腠理不密失其衛外之職矣故汗出焉或為自汗或為盜汗血亦失其守矣汗出不止心亦虛也氣弱血虛大病生焉縱遇良工不可為也自汗者或昏或醒浸浸而出不止也盜汗者睡困則出醒而復收也並宜黃耆六黃湯止汗散主之當歸六黃湯此治自汗之聖藥也當歸生地黃熟地黃黃柏黃連黃芩各等分黃耆加倍先用浮麥熬成湯去麥入藥煎成劑去渣調止汗散服止汗散用故蒲扇燒灰又方用牡蠣米泔浸洗煅透末麻黃根黃耆蜜炙各末取浮麥一百粒煎湯調煎一沸服效錢氏云上至頭下至項謂之六陽虛汗不須治之小兒睡而自汗者肌肉虛也止汗散主之遍身汗出者香瓜丸主之上至胸下至臍胃虛也當補脾益黃散主之幼科執此殊不知自汗者心火旺而肺金虛也反用丁香以助火青皮以瀉肺其失甚矣東垣有論見脾臟本方當歸調元湯加芍藥黃耆建中湯穩當黃耆建中湯治脾胃虛自汗黃耆蜜炙白芍等分甘草炙杜桂減半姜三棗引又方黃耆六錢炙甘草一錢名黃耆六一湯加白朮白芍各三錢末薑棗引治脾胃虛汗甚效凡兒初生周歲不可自汗勿用他藥宜用白朮一錢小麥百粒水煮令乾去麥為末以黃耆湯調服愈為度有傷風寒熱症自汗宜小柴胡湯加膽草治之有夏月中暑濕發熱汗多者宜人參白虎湯加蒼朮治之效有傷食積者胸腹多熱有汗宜先去積三黃枳朮丸下之後以肥兒丸調理自愈有因瘧後自汗者宜小柴胡湯加黃耆桂枝主之有因瀉痢後自汗者宜黃耆建中湯加當歸白朮主之有急驚風自汗者遍身如水之冷此危症也難治凡大病後有自汗盜汗者宜調元湯加白芍白朮主之如汗出太多不止者宜養心血團參湯聖藥也團參湯治虛汗或心血液盛亦發汗此藥收斂心氣新羅人參川當歸各三分咀作三服獖豬心一個切三片每片入藥二錢井水碗半煎一碗食後服又治睡中汗方酸棗仁人參茯苓等分蜜丸芡實入麥冬湯一丸下汗出不治症汗出不流而發潤一不治也汗出如油者二不治也汗凝如珠者三不治也君子見機而作不可不早大小便病腎竅便開前後陰便溺有病屬肝經血虛大便多硬結氣熱常為小便淋內經曰腎開竅於二陰二陰者前陰竅出小便後陰竅出大便也又曰肝病者則大小難故中風者多便溺之阻隔也又云前陰主氣後陰主血者語其用也蓋膀胱之津液血所化也由氣而後能出太陰之傳送氣之運也由血而後能潤此便溺之流通然後見氣血之依附也夫人之所以有生者以有出入也如清陽出上竊謂呼吸也濁陰出下竅謂大小便也一息不運則機緘窮而死矣故二便不通加以腹脹氣喘嘔噦煩躁者不可治也宜服八正散外用掩臍法蜜導法則前後俱通矣八正散治熱聚下焦二便不通木通滑石山梔仁車前子瞿麥甘草大黃芒硝等分水一碗先煎上六味二沸入大黃煎至半碗去渣入硝煎一沸頃熱服掩臍法治驚風積熱大小便閉塞用連須蔥七根不洗帶土生薑一塊淡豆豉二十一粒鹽兩匙同研爛作餅銚子烘熱掩臍中以綿扎定良久氣通自利不然再換一餅又方用大田螺三五枚和殼杵爛掩臍下即通異人加鹽半匙更良蜜導法治二便不通以此通其大便則下焦氣行而小便自通矣用蜜煉成珠滴水不散入皂角末和丸如小指頭大似蔥管送入穀道中氣通則便通矣治小便膀胱不利號為癃不約遺尿夢寐中如此兩端分冷熱還來水火覓真蹤經曰膀胱不利為癃不約為遺尿癃者小便不通也又曰肝有熱則小便先赤凡小便赤澀為熱小便自遺為寒熱者火有餘水不足治宜瀉心火滋腎水加味導赤散主之寒者火不足水有餘也治宜溫腎水益心火益智仁散主之加味導赤散治心熱肝熱小便赤澀者木通生地甘草梢條芩梔子仁澤瀉車前子柴胡梢等分末每一二錢淡竹葉七片燈心二十一寸水煎食前服益智仁散治遺尿益智仁破故紙炒白茯苓等分細末炒鹽湯調服小便不通乃內臟氣虛受熱壅滯宣化不行非塞非痛但閉不通腹脹緊滿宜五苓散加車前子燈心主之有大病後氣虛津液少者不可利之利則氣益虛津液日枯宜人參麥冬甘草梢各等分黃柏鹽水炒減半末煉蜜丸薑湯下小兒諸淋不問五者皆屬於熱並用香附子川芎赤茯苓各半兩海金沙滑石各一兩枳殼澤瀉石葦檳榔各二錢半糯米粉煮糊丸麻子大服二三十丸順取長流水入鹽少許煎湯下如小兒氣病常病淋者不可服上藥宜補腎地黃丸甚效小便自出而不禁者謂之遺溺睡里自出者謂之尿床此皆腎與膀胱虛寒所致也宜雞腸散主之用雞腸一具燒牡蠣煅灰白茯苓真桑螵蛸白之者微炒各半兩辣桂龍骨各二錢半末服一錢薑棗引或與益智仁散合末煉蜜丸鹽湯下尤妙小便出血者謂之尿血用生地木通甘草梢赤茯苓山梔仁生蒲黃滑石等分末每一錢淡竹葉七片水煎去渣入車前草自然汁同服又方用升麻甘草煎湯調一元散服小兒初出便黃赤落地良久凝如白膏者謂之尿白幼科云久則成疳是也宜用胃苓丸鹽湯下效如小便出而色白渾濁謂之白濁宜清心蓮子飲主之石蓮肉白茯苓各一錢益智仁遠志肉去心麥冬去心人參各五分石菖蒲車前子白朮澤瀉甘草炙各二分半豬苓三分末每一錢燈心同煎又方分清飲益智仁去殼川萆薢石菖蒲天台烏藥等分末或和白茯苓尤妙燈心湯服治大便大便鞕結須宜下亦有諸般不可攻食少氣虛脈濡弱不如膽導有奇功夫飲食之物有入必有出也苟大便不通宜急下之使舊谷去而新谷得入也然有實秘者有虛秘者臨病之時最宜詳審如形實氣實脈實又能食者的有可下之症則下之如河間涼膈散承氣湯八正散三黃枳朮丸木香檳榔丸丁香脾積丸擇而用之中病即止不可過也如形虛氣虛脈虛又食少者雖有可下之症緩則救其本用保和丸枳朮丸大黃丸微利之如常便難者血不足也宜潤腸丸主之急則治其腸使其通利豬膽汁導法神效此家秘之法也潤腸丸治老人虛人小兒產婦大便秘結者良驗麻子仁去殼杏仁去皮尖略炒桃仁去皮尖各半兩歸梢枳殼炒各七分半阿膠蛤粉炒二分半紫蘇炒蘿蔔子炒各三分煉蜜丸如麻子二三十丸陳米湯下膽導法豬膽一個以小竹管放口內用線紮緊勿使移動吹氣一口另用一線從管下近氣處系定勿使泄了氣插入穀道中解去系氣線一手拿住膽筒一手捏膽汁入腹直待氣通隨捏隨起便即通矣如不通又有別法口言不盡凡小兒病有可下不可下者說見第一卷歌中凡小兒大便下血者宜四物湯加枳殼荊芥穗及柏葉主之小兒目病存乎人者惟眸子五臟真邪並見此一點塵埃不可侵風熱肝虛為病耳目主五臟瞳人屬腎黑珠屬肝白珠屬肺兩角屬心上下胞屬脾目內五臟症錢氏云赤者心熱導赤散主之淡紅者心虛熱生犀散主之青者肝熱瀉青丸主之淺淡者地黃也補之黃者脾熱瀉黃散主之無精光者腎虛地黃丸主之白而澀者肺熱瀉白散主之生犀散地骨皮赤芍藥柴胡葛根各一兩甘草一兩半生犀角銼二錢每一錢水煎服眼目視物不明不腫不痛不赤無翳膜或目緊小無精光者是肝腎俱虛不可便服涼藥宜地黃丸主之目者肝之竅瞳人者通竅於腎腎屬水肝屬木母子相依者也故肝腎之氣實則精彩光明氣衰則昏矇暈眩烏輪赤暈痛淚漿流此肝熱也眼生清淚黏臉遮睛此肝虛也瞳人散大淡白偏斜此腎虛也瞳人焦小或帶微黃此腎熱也一虛一實以此驗之然心者神之舍也又為腎之主也心主血目得血而能視心主熱目因熱而昏昧故四物湯與地黃丸要藥也補腎水制心火養肝血莫有加於是方者矣目痛赤腫有二症或因天行時氣症候暴赤腫痛晝夜若啼哭不止或因臟腑積熱兩目赤腫並宜瀉青丸方加蟬蛻白蒺藜炒蔓荊子荊芥穗柴胡黃連酒炒車前子甘草等分每末一錢生蜜水調細服之外用金沙散點洗之方見下目內翳膜有二症或肝腎俱虛眼生翳膜及肝疳白膜遮睛者宜用地黃丸加五味子人參當歸川芎黃連蘆薈蜜丸服或因痘疹之後毒氣入目生翳膜者用白菊花綠豆穀精草等分咀每二錢乾柿餅一枚粟米泔汁一碗慢火煎乾去渣於食後臨臥只吃柿肉一日三枚如兒不能服者將煮過柿餅母嚼爛喂之此二症不可用點藥有初生下眼閉不開者其症有二或因產母食熱毒物以致斯疾治當以膽草少許蘸洗眼上一日七次或用黃連磨乳點之乳母服生地黃湯生地赤芍藥川芎當歸酒洗瓜蔞根加黃連燈心引水煎或以本方為細末燈心湯調少許搽兒口中或因初生洗眼不淨穢汁浸漬於眼目中不能開者宜真金散方淨黃連黃柏當歸赤芍杏仁去皮尖各五分切乳汁浸一宿曬為極細末以生地汁調一字點眼中自開凡初生小兒頭洗令淨使瞼赤爛至長不瘥名曰胎赤見下爛弦疳眼者肝風入眼赤腫目生眵淚爛弦痛癢揉擦昏暗雀盲甚經目合不開宜天麻丸天麻丸真青黛黃連天麻五靈脂夜明砂川芎蘆薈各二錢膽草防風蟬蛻去足一錢半全蠍二枚焙乾蟾炙焦三錢麝香少許獖豬膽汁浸膏糊丸麻子大每十丸薄荷湯下又方治小兒疳眼赤爛用苦參蔓荊子防風龍膽草玄參各等分豬膽糊丸麻子大數量大小茶清下疳眼生瘴者用瓜蘆根甘草赤芍草決明等分每五分蜜湯調下爛弦者脾有濕熱也或初生洗不淨所致者用淨黃連炒蒼朮童便浸焙防風等分末每服一字蜜水調外用綠豆爐甘石煅童便淬七次半兩海螵蛸一錢膽礬輕粉雄黃各五分用黃連乳汁浸清汁調藥以鵝羽蘸藥搽上一日三五次以瘥為度有因塵埃入目揩摩成腫啼哭不已作痛者用油煙金墨新汲水磨濃入玄明粉五分如無以馬牙硝代之和勻為膏取新筆蘸點目中以瘥為度忌熱物凡眼暴赤腫初起勿服寒涼之藥不能愈疾又損脾胃氣使兒不能飲食也蓋藥之味辛甘發散為陽酸苦湧泄為陰故清陽出上竅辛甘溫平是也酸苦寒涼之藥不能上升耳宜先服九仙散發散之此火鬱則發之也不已者以瀉青丸合小柴胡湯加酒黃連作丸服有大奇功外當用金沙散洗之黃連膏點之以愈此治風熱眼病之要法也九仙散時行目病暴赤腫痛以此發之柴胡蒼朮童便浸各一兩赤芍荊芥穗甘草各六錢半麻黃不去根節滾水泡川芎薄荷和梗半兩旋覆花去毛梗三分末每一錢水一小碗姜一片蔥一莖無時頻服金沙散時行赤眼腫痛或腎熱多淚淨黃連一兩硼砂寒水石大黃各二錢海螵蛸銅青各一錢玄明粉二錢半全蠍去毒七枚麝香少許爛弦加輕粉五分末每服一字至五分涼水化澄清去渣無時頻洗效忌酒暈黃連膏用淨黃連半斤苦參四兩秦皮二兩杏仁四十九粒冬月制取雪水四碗煎二碗放淨瓷器內又以水煎取一碗放前汁內又以水一碗煎取半碗用淨取汁與前汁和一處取淨銅銚子入汁在內慢火熬以桑條不住手攪勿令沉底勿動灰塵入汁中務宜仔細待熬至一碗再入馬牙硝半兩同煎至半碗取起以紙蓋定再製過爐甘石末二兩硼砂末半兩乳香沒藥末各一錢膽礬末三錢海螵蛸末二錢和勻入膏中取起攤冷待乾以乳汁磨點之效目直視者肝有熱也目連劄者謂之目闢肝有風也並宜服瀉青丸目下胞腫者水氣也必待作腫宜五苓散加車前子以利其水目中黃者疸也宜服茵陳胃苓丸兒有大病未愈觀其目或直視或斜視不轉睛者或閉目不開者或開目不合者或哭無淚或不哭淚自出者有目胞腫者有目陷者有目中見物而畏怕者皆惡候治鼻鼻中相通呼吸門唇依牙齒齒依唇耳司採聽當嫌塞舌主聲音似鋒鈴肺為氣之主通竅於鼻鼻清氣出入之道路也小兒稟受胎氣充實者三關九竅五臟六臟內外呼吸內外貫通而榮衛行焉若外感風寒內傷元氣傷乳食則清濁不分泥丸相亂諸症疊起矣鼻衄者血與氣相隨而行若臟腑積熱乘於氣血則熱氣逼血而妄行自鼻孔出謂之衄血宜東垣涼膈散加生地黃阿膠炒黃連茅花主之不止者宜服雞蘇丸效雞蘇丸治鼻熱胸中鬱熱衄血不止雞蘇葉八分即薄荷葉蒲黃炒一兩麥冬二錢阿膠炒一錢甘草七分半人參黃耆各五分木香柴胡生地黃各一錢煉蜜丸如小豆大每一丸食後茅花湯下又方山梔和殼燒存性油發灰研勻吹入鼻又槐花半生半熟末吹鼻又人中白成塊者燒去穢氣為末入油發灰麝少許吹入鼻又生蘿蔔搗汁或生藕汁仰頭滴入鼻中或血妄行取汁飲之效又用大蒜煨香研爛塗腳底鼻中有蒜氣即去之用上方法不止以白紙一張作八摺冷水濕紙放頭頂中以熨斗熨至一重或二重紙干立止此數方救急之要法也鼻流清涕者熱則津液流鼻塞不通者冷則收閉也鼻流清涕其癥有二或外因傷風得之噴嚏流清涕風屬陽其病為熱宜東垣涼膈散加防風芥穗主之內因腦熱鼻流濁涕不止名曰鼻淵久而不已必衄血涼膈散加羌活川芎白芷主之又方蒼耳散辛夷仁半兩蒼耳子炒三錢半白芷一兩薄荷葉五分末茶清調服有因胃中食積熱痰流注者當消食積用南星炮半夏洗藁本白芷神麯炒酒芩辛荑荊芥各等分末薑湯調服二症有並用辛夷膏貼之辛夷膏治流涕不止辛夷葉洗焙二兩細辛木通白芷木香各半兩杏仁一兩去皮尖研上末入杏仁泥羊腦髓豬脂各一兩和勻於瓦器中慢火熬成膏赤黃色為度放地上冷入腦麝各一錢拌勻塗囟門上更用少許塗鼻中鼻塞其症有二或因傷寒得之者寒則傷肺肺氣不利則塞也宜禦寒湯主之若冷氣久不散濃涕結聚使鼻不聞香臭則為齆鼻宜萬全膏主之凡新產芽兒或十日一月之內忽然鼻塞因吮乳不能呼吸者多是乳母睡時不知所忌抱兒身側鼻口中氣出吹著兒冷氣自囟而入成鼻塞並宜貼囟法及塞鼻法萬全膏治齆鼻羌活川芎細辛石菖蒲木通麻黃各一錢腦麝各一字煉蜜丸芡實大服一丸燈心湯化下或用一丸綿包塞鼻中禦寒湯治寒邪傷於皮毛令兒鼻塞上喘黃柏二錢黃耆一錢人參五分炙甘草款冬花各三分羌活黃連各二錢白芷防風各三分陳皮升麻各五分佛甘三錢蒼朮七分末蔥湯調服貼囟法一名通散香附炒川芎荊芥穗殭蠶炒細辛荷葉牙皂用末生蔥白搗膏以帛盛之夜貼囟上塞鼻法治齆鼻瓜蒂明礬細辛各一分雄黃五分麝香少許末以雄犬膽汁和丸綿包塞鼻中鼻疳者肺疳也鼻下兩傍赤癢瘡濕其瘡不痛汁所流處隨即生瘡一名疳垚宜清肺飲化垚丸主之清肺飲治肺疳垚蝕鼻穿孔汁臭或生息肉桑白皮炒半兩紫蘇葉前胡黃芩當歸天冬連翹防風赤茯苓桔梗生地黃甘草炙各二錢半末水煎服次服化䘌丸化䘌丸蕪荑蘆薈真青黛川芎白芷梢胡黃連乾蟾燒存性各等分末豬膽汁浸膏糊丸麻子大二十丸食後臨臥杏仁湯下其鼻昂用雄膽泡湯小筆蘸洗俟煎藥各進數服卻用青黛當歸赤小豆瓜蒂地榆黃連蘆薈等分雄黃少許細末入鼻內斂瘡鼻瘡用黃連黃柏檳榔研末以豬骨髓和敷或用青黛槐花杏仁研敷鼻赤用雄黃黃丹研末無根水調敷又用蒼耳葉酒蒸乾末調服最解食毒鼻乾者肺熱也用涼膈散加桑白皮蜜水炒木通大病鼻乾黑燥者火剋金也鼻昂氣喘者肺絕也小兒山根青者多病年上赤者有血光病小兒腦疳鼻癢頭髮作穗面黃肌瘦用鯽魚膽滴鼻中連三五日效傷風寒頭痛加川芎白芷藁本蔓荊子細辛眼痛加酒黃連羌活防風柴胡膽草酒洗鼻病加升麻酒洗白芷細辛蘇葉耳病加柴胡木香蔓荊子全蠍口病加石膏防風咽喉痛加玄參牛蒡子炒山豆根龍腦川芎丸消風化滯除熱清痰通利七竅精神氣爽桔梗二錢半片腦六分砂仁二分白豆蔻去殼五分薄荷一錢三分川芎防風炙甘草酒芩連翹各一錢煉蜜丸每兩作二十丸服則一二丸茶清化下頭病小兒頭病亦多般散出方書不多言感謝岐師施指教法留後學作諦筌解顱者生下惟囟不合氣衰不盛也多憂多笑更有目白睛多光白色嫩者多愁多喜以年久頭縫開解而不合腎生髓腦為髓海腎氣有虧故髓不滿所以頭囟開而不合也名曰解顱凡得此疾不及千日之內間有數歲者偶因他疾攻擊遂成廢人不可復藥也氣色清明能飲食者多服補腎地黃丸及調元湯百日內須見效者次第調理或有可治若投藥石如故亦難治錢氏云兒本虛怯由胎氣不成則神氣不足目中白睛多其顱即解面色㿠白此皆難養縱長不過二八之數若縱色欲多不過四旬而亡因病而成致腎虛者此也家秘云解顱有二初生後頭骨漸開此胎氣怯弱腎不足也有閉而後開者自囟至印堂有破痕可開一分又有頭四破成縫者此皆解顱由病後腎虛水不勝火火氣上熏其髓則熱髓熱則解而頭骨復分開矣腎虛者宜服地黃丸以補腎之不足調元湯十全大補湯母子共服之以補脾胃使氣血漸實其顱自合矣其髓熱者宜通聖散為丸服去硝不用外用封囟法或用新綿緊束之有作巾遮護之久而自合亦良法也封囟法防風南星白蘞白及等分末豬夾車髓搗和封囟上一日三易之又方顱頭骨不拘多少燒灰存性研末以清油調敷頭縫腦疳者頭皮光急髮結如穗滿頭餅瘡腦熱如火者是也用川芎酒洗片芩酒炒白芍陳皮去白各半兩白朮酒當歸酒洗各一兩半天麻酒炒蒼朮蒼耳子各七錢酒柏酒粉草各四錢防風三錢末水煎日服四五次服後睡片時乳母宜服溯源解毒湯溯源解毒湯酒芩蒼朮酒炒白蒺藜酒浸炒去刺蔓荊子酒炒何首烏酒炒胡麻炒升麻酒末酒糊丸麻子大服三五十丸防風湯下外用敷藥松樹厚皮燒灰二兩白膠香二兩黃丹水飛一兩枯白礬五錢黃芩黃連大黃各七錢蛇床子寒水石各三錢無名異少許木香少許輕粉少許末熬熱調敷瘡上先用椒鹽湯洗去瘡痂敷之佳又治白禿又有兒生後其頭漸大頭皮赤光眼小此亦腦疳也乃受父母熱毒之氣藏於腎中上熏於腦故頭大漸紅也此難養不出二八之數其未周歲滿頭生瘡結餅作癢作痛兒不能忍日夜啼哭者亦難養也宜服前苦參丸及松皮散敷之癩頭者一名白禿或父母之傳或兄弟姊妹之相授乃遺毒之氣也初起可治待皮毛光不必治也宜服消風通聖散除大黃另研酒蒸炒末再酒拌曬乾每一錢水煎熱服外用炭燒紅以長流水淬之乘熱炭擦頭皮以前松皮散敷之又方胡荽子伏龍肝龍尾黃連枯白礬末熬熱清油調敷初頭上散生成片時當帶瘙癢毛髮稀少有類白癩此禿瘡之根也用臘豬油搽之自不成白禿矣囟填囟陷訣云熱甚則腫虛熱則陷囟填者囟門腫起骨高突也經云熱甚則腫由邪火炎上使清明之氣上升而不降其證有二以手摸之腫堅實者此有寒邪在表腠理閉寒熱不得出所謂氣上衝則堅勁者是也宜升陽散火湯此鬱則發之也如摸之其腫虛浮者此積熱在裡熏蒸於上所謂氣上衝則柔軟者是也宜酒製神芎丸此高則抑之也一發一下中病即止升陽散火湯治風寒外感或胃虛過食生冷抑遏陽氣脾土火鬱則發之升麻葛根獨活羌活人參白芍各五分防風二分半柴胡八分甘草生二分炙三分水煎熱服令睡有微汗酒製神芎丸治一切積熱大黃酒蒸黃芩酒洗二錢黑醜半生半熟取頭末滑石各四錢黃連酒洗薄荷川芎各五錢用無灰酒丸黍米大服五丸十五丸溫水下囟陷者謂囟門陷下成坑也其症有二經云陷者下氣虛也大病之後津液不足其氣下陷成坑窟者宜大補元氣調元湯加升麻主之有脾胃虛弱飲食減少脾主肌肉肉去皮薄囟門露見非陷也宜服肥兒丸參苓白朮散補脾胃則能飲食肌肉自平囟不露矣又有後枕陷者活幼心書謂其症尤重於囟陷者此太虛極百無一雌殊不知此非病也乃父母之過也初生兒頭骨未合當用綠豆作枕枕之常與移動勿使只在一邊則頭骨不正矣此後枕骨陷下者乃兒臥日久之所致也若難養則頭骨四破高下成縫者皆非壽子也頭仰者頸軟也頸者頭之莖也一名天柱骨頸軟者乃天柱骨不能任元而前後左右傾倒也此惡病也其症有二小兒初生便頸軟者皆胎稟不足腎氣虛弱也腎主骨肝主筋筋不束骨其骨則折母能令子虛也此兒難養縱長不及四旬腎氣虛矣宜服地黃丸加當歸續斷主之有因大病之後頭骨不能起者此血氣虛弱也宜十全大補湯煉蜜丸服經云頭者精明之府也頭仰邪欹神將去矣凡大病人有是症難治有病驚風者或病痙痓者勿作項軟論傷風寒痛者用細根子黃芩半生半熟三錢半炙甘草錢半羌活藁本各一錢柴胡七錢川芎五錢或五分一錢以茶湯調成膏抹兒口中少用白湯下頭搖者頭戰者腎風熱也宜瀉青湯丸加全蠍主之頭生胞瘡者初因皮破成瘡膿水不幹頭毛黏結內生蝨癢則抓之年久不愈有成癩頭當先去其蝨用石菖蒲煎湯洗之其蝨盡死待乾用水銀膩粉二味放碗中以指研勻入津調濕指蘸藥搽瘡上四畔及發內蝨盡去方用秋牛皮窯口上煙膠不拘多少松香研末入輕粉少許雄黃少許熬熱上油調塗患處頭生軟節者年久不愈用紫金丹塗之效方見心虛諸疾下頭之有發猶山之有草木也發者血之餘發之多寡由於血之盛衰也坎為血卦血者腎之液發者腎之苗也故其色黑也兒發久不生生不黑者皆腎虛也宜地黃丸主之大病後其發成穗或稀少者乃津液不足疳癆之外候也宜集聖散主之面部五臟英華面部間知其有病望中看色宜明潤昏枯暗瘡癬斑痕貌不妍詩曰五氣入鼻藏於心肺上使五色修明聲音能彰則面者心肺之所主也五臟部位說見一卷歌中五色者五臟之英華發見於面者也肝色青如翠羽者吉枯草者凶其餘照脈候仿此推之大抵明潤者吉暗黯者凶五色主病赤主熱青主風黃白主疳虛食積青黑主痛五色所忌肝病白者不治謂金剋木也病後面色白者謂之脫色者死肺病面赤者不治謂火剋金也凡痢疾失色面赤者死心病面黑者不治水剋火也脾病面赤青者不治木剋土也腎病面黃浮者不治謂土剋水也面浮腫者風也宜五皮湯加防風蘇葉主之頭面紅腫者風熱也用通聖散除大黃另用酒蒸入藥同末酒拌濕曬乾如此三拌三曬或半字一字淡竹瀝調細細服之連進三五次立止以忍冬藤煎湯洗之麵皮黃中有白隱者此傷食也宜三稜散人參七錢半三稜炮香附一兩半青皮去穰益智仁陳皮去白枳殼麩炒神麯炒麥芽炒半夏炮莪朮醋煮焙山楂肉蘇葉各五分白茯苓粉草半生半炙各一兩末服一錢小者五分陳倉米百粒姜引或加大黃半生半煨五錢粳米糊丸陳米飲下面上生瘡如火燒用黃蠟米粉蜜水調敷或雞子清和敷兒疳瘡不愈多生於面部兩耳乳母嚼白米成膏治之不過三五日愈並母禁雞魚附錄醫案小兒始病天疱瘡後發瘧發驚癇密翁因育嬰書問答證治開陳於後育書云此子先受暑濕之氣暑則為瘧濕則為瘡又傷飲食助其暑濕之邪暑則傷心濕則傷脾暑生熱濕生痰脾土亦虧肝木隨旺此所以為瘧為癇也瘧曰食癇久則成疳觀其色㿠白毛髮必疏疳之候也當從虛治凡瘧間日發難止謂受病深也夜發者難已謂邪在陰分必調至晝發一日一發然後可以稱退此理醫者當知今將其病細解於後問瘧發於子午時又咬齒呻喚又努責出大便其色黃綠又大哭手足一撒何也答曰此肝膽病也子屬膽咬齒者心肝俱熱肝木心火子以母病也大叫哭者肝病也呻喚者腎病也腎水肝木母以子病也肝者厥陰風木心腎者少陰君火也木火相搏則作內搐故大便努責而出瘧發於已午時多而他時少其理何哉答曰巳為厥陰風木午為少陰君火且巳為陽極午為陰生此水火相搏而陰陽分爭之時也況瘧疾之作因暑以傷心心本屬火火之性又旺於巳陽火乘旺陰水觸動陽動於陰陰爭陽陰陽交戰寒暑交爭此瘧來一時憎寒一時發熱者此也謂之巳午者不亦宜乎瘧發時頭痛惡寒顫脊強者其理何哉答曰此邪並於太陽經也蓋膀胱所化此則陰實陽虛陽虛生外寒陰實生內寒中外皆寒故見其鼓頷而戰慄惡寒莫任也況太陽之脈從頭頂連風府在頭腦後行於腰脊故見頭疼腰脊強痛之症也故名寒瘧麻黃羌活太陽經之汗藥也故以為君防風乃諸藥之卒徒也故以為佐甘草能和諸藥而兼解散故以為使首方乃攻實之劑臨病用藥不可拘泥而昧於通變也瘧發時大熱大渴自汗不得眠者其理何哉答曰此邪並於陽明經也蓋胃腑陽實而陰虛陰虛生內熱陽實生外熱中外皆熱故見其煩渴而身熱惡熱莫任況陽明者胃土也蒸蒸發熱而汗出者胃之汗也通身皆出者胃主肌肉也土得熱則主燥燥則主煩而心腎不安故不得眠也當用白芷以解陽明之經石膏以清陽明之府知母以養陽明之陰虛也若便實者此藥不足與也宜下之後以本方調之瘧發時寒熱往來口苦喜嘔者其理何哉答曰此邪並於少陽經也邪在表則惡寒邪在裡則發熱邪在半表半裡則惡寒且熱故令寒熱交集矣其經屬於膽膽汁上溢故自口苦膽者肝之腑邪初入腑裡氣逆而煩嘔此所以寒熱往來而口苦喜嘔之症見矣當用柴胡黃芩能和解少陽經之邪半夏生薑能散經之嘔人參甘草能補中氣之虛所以防邪之入里也瘧有一日一發有二日一發三日一發者其理何哉答曰氣舍於皮膚與衛氣並居衛氣者日行於陽夜行於陰此氣得陽而外出得陰而內薄是以而作此受之淺也其氣之舍深內薄於陰陽氣獨發陰邪內著陰與陽爭不得出故間日作此受之深也邪氣與衛氣客於六腑而有時相失不能相爭故數日作此受之最深也問發瘧之時兒常用口吮母之乳得乳即止者何也答曰此內熱作渴也兒不能言故欲得乳以解耳瘧後汗出初發無汗退而有汗何也答曰初發時邪氣鬱寒多熱少故無汗及其退也寒去而熱盛此真氣外泄故有汗也凡治無汗者要有汗以散邪為主有汗者要無汗以養正為主此汗泄於外便瀉於內心下跳腹中鳴皆火證也肝膽從火治此其法也瘧退時後覺頭頂上常有小汗何也答曰頂巔者乃足厥陰肝經之脈所會處以上所開條論其大略也若夫治法當專以治疳為主蓋小兒易虛易實病不已虛則成疳當分二方治之一方治癇以平肝為主內帶補脾藥一方治瘧以補脾為主內帶平肝之藥可收全效幸遇秋金正旺木因水衰治不難矣此疾勿圖速效幸遇吾家世醫治病有法若遇粗工欲求速效則攻補妄行欲速之害可勝言哉其母當忌雞魚生冷諸物有衄血亦內熱也宜亟調之治癇平肝加減當歸龍薈丸當歸酒洗曬乾一錢人參川芎雀腦各一錢膽草酒浸山梔仁各五分青皮蘆薈各七分甘草軟古柴胡各一錢半夏大者三個泡七次切生薑自然汁浸一時又以白礬水洗之用水煮神麯糊丸粟米大二十五丸寅卯時淡竹葉湯下治瘧補脾加味參苓白朮散丸人參炙耆白朮歸身酒各一錢炙草青皮各八分陳皮七分柴胡夜明砂木香厚桂去皮澤瀉各五分鱉甲九肋醋炙去爪二錢使君子肉白芍酒炒各一錢山藥一兩煮糊丸粟米大巳戍時每三十五各一服炒米湯下乳母服加味四物湯當歸川芎赤芍生地俱酒洗柴胡升麻麥冬木通去皮黃芩酒炒桔梗各五分薄荷一分燈心十食後服
