body:
  text: 幼科發微賦醫道至博幼科最難如草之芽兮貴於調養似蠶之苗兮慎於保全血氣未充兮脈無可診神識未開兮口不能言誠求於心詳察乎面苟得其要也握造化於妙手未達其旨也摘章句於殘編調護若失疾病乃生頭要涼而背要暖食勿飽而衣勿綿腸胃脆薄兮乳哺傷而成積精神怯弱兮聞見異而成癇嗟哉慈母兮過於姑息笑彼粗工兮誤於湯丸伐其發生之氣夭其童稚之年徒啼號於邱隴休禱祀於旃壇證候要識夭壽須知不在手指之側但憑面部之間心火上而天庭可察腎水下而地角宜觀右頰金而屬肺左頰木而屬肝脾土之位鼻準之端青驚赤熱黃積白疳如煤之黑兮必中惡毒似赭之紫兮斯感乎風寒胎稟虛損兮則發稀而頭軟賦質充實兮自肉厚而骨堅性靜兮少笑神困兮多眠肺熱兮濁涕結於鼻內脾冷兮清涎滯於頤間兩目連劄兮肝風之鼓雙瞳直視兮心火之炎氣不足而囟陷突起則為熱也血有餘而臉鮮萎黃則為虛焉行坐遲者腎弱啼哭多者心煩脾熱者弄舌肝強者握拳發豎作穗兮疳癆漸起顱解欲破兮短折可占皮聚肉脫兮元氣損而欲逝鼻昂唇縮兮穀氣絶而難全赤蚓入眼兮不必問夫盧扁青蛇繞口兮何須問乎神丹五臟各證一言可參肝主風而叫哭頓悶心主熱而驚悸呵欠肺主氣而喘嗽善嚏脾主困而吐泄喜眠惟腎本虛為命所關肝常有餘兮實則生風脾常不足兮虛則成疳木乘於土兮泄痢久而發搐者不治火刑于金兮咳嗽久而成癇者必殘一臘之中臍風最險百晬之內痰嗽尤難證莫危於中惡勢莫急於流丹變蒸盡於周歲必計日以為準驚搐發於期月難引日以求安有所苦者呻吟失所欲者咨煎晝常叫兮肝臟之熱夜多啼哭兮脾臟之寒也出胎而疾者胎毒之發能食而疾者食積之干胎毒之變也為黃為瘤為瘡毒食積之變也為癥為痛為痞滿吐瀉有寒有熱有食咳嗽有虛有實有痰痢因積得瘧以痞延脹乃脾胃之虛腫則風濕之感疝本肝來淋以膀胱之熱疸因脾致渴以津液之干風從肝起熱自心生風熱並而搐急吐瀉久而成慢證分八候治貴十全痰涎未去兮為言語之謇澀氣血未復兮成手足之拘攣天吊如痓而上竄內吊似疝而里疼客忤輕於中惡蟲痛類於發癇形症既混於雷同診治宜詳於藻鑑眼中白膜兮肝疳已現鼻下赤爛兮肺疳所傳壯熱而渴兮邪火熏於絳宮多瘡而瘠兮真水涸於玄關飲食傷而脾損津液亡而胃干干奚手足之漸細哺露糟粕之不斂愛吃泥土兮面黃齒白而頭皮光急喜啖瓜果兮口饞肉削而腹皮滿堅論病之證已明立治之法尤簡平胃燥濕五苓利水二藥合而吐瀉兼調瀉青疏風導赤瀉火兩方並而驚風可蠲金花涼驚而退熱玉液寧嗽以化痰保和消積兮同香連又治痢疾異功補脾兮助集聖可救癆疳理中止吐瀉而寒熱通用保命鎮驚癇而急慢相兼抱龍主驚風而平痰火惺惺解變蒸而散風寒養脾平瘧兮瘧久有母者消癖豆蔻止泄兮泄久生風者調元白朮救虛渴之仙藥丁香取蟲積之神丹五色泄臟中之熱三聖除膈上之痰口舌生瘡者洗心胸脅急痛者控涎參苓肥兒兮虛羸甚者勿棄地黃補腎兮稟氣怯弱者有驗嗟夫嬰兒稚弱兮豈堪藥石良工調理兮尤貴精專或補或泄兮中病即止易虛易實兮其證勿犯治不乖方兮有如援溺救焚藥不對病兮何異帶刀背劍發吾心之祕兮為取兔以彀罝獲斯術之利兮勿得魚而忘筌
